<style>
  /* --- 1. RESET E SCROLLBAR --- */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }

  ::-webkit-scrollbar-track {
    background: #121212;
  }

  ::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 3px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: #666;
  }

  /* --- 2. ESTRUTURA GERAL --- */
  .video-view {
    display: none;
    animation: fadeIn 0.3s;
    padding-top: 20px;
    padding-bottom: 40px;
  }

  /* --- 3. ABAS --- */
  .v-tabs {
    display: flex;
    gap: 20px;
    margin-bottom: 25px;
    border-bottom: 1px solid #333;
    padding-bottom: 0;
  }

  .v-tab {
    padding: 12px 20px;
    cursor: pointer;
    color: #888;
    font-weight: 500;
    font-size: 1rem;
    border-bottom: 3px solid transparent;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .v-tab:hover {
    color: #ccc;
  }

  .v-tab.active {
    color: #fff;
    border-bottom-color: #FFD700;
  }

  /* --- 4. GRID --- */
  .rank-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }

  .rank-card {
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 25px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  }

  .rank-card:hover {
    transform: translateY(-4px);
    border-color: #FFD700;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
  }

  .rank-icon {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 1.2rem;
    margin-bottom: 15px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
    text-transform: uppercase;
  }

  .rank-title {
    font-weight: bold;
    color: #fff;
    font-size: 1.1rem;
    margin-bottom: 5px;
  }

  .rank-subtitle {
    font-size: 0.85rem;
    color: #888;
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
  }

  /* Cores das Faixas */
  .bg-branca {
    background: #fff;
    color: #000;
    border: 1px solid #999;
  }

  .bg-amarela {
    background: #FFD700;
    color: #000;
  }

  .bg-laranja {
    background: #FF8C00;
    color: #fff;
  }

  .bg-verde {
    background: #2E8B57;
    color: #fff;
  }

  .bg-azul {
    background: #1E90FF;
    color: #fff;
  }

  .bg-marrom {
    background: #8B4513;
    color: #fff;
  }

  .bg-preta {
    background: #000;
    color: #fff;
    border: 1px solid #555;
  }

  /* --- 5. PLAYER OVERLAY --- */
  #player-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    z-index: 3000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }

  .player-box {
    width: 100%;
    max-width: 900px;
    height: auto;
    max-height: 90vh;
    background: #121212;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
    border: 1px solid #333;
    position: relative;
  }

  .video-frame {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    flex-shrink: 1;
    min-height: 200px;
    max-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
  }

  .video-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Estilo para Vídeo Indisponível (Em Breve) */
  .video-unavailable {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #666;
    background: #1a1a1a;
    text-align: center;
    padding: 20px;
  }

  .video-unavailable .material-icons {
    font-size: 48px;
    margin-bottom: 10px;
    opacity: 0.5;
    color: #FFD700;
  }

  .unavailable-title {
    font-size: 1.2rem;
    font-weight: bold;
    color: #ccc;
    margin-bottom: 5px;
  }

  .unavailable-desc {
    font-size: 0.9rem;
    color: #888;
  }

  .player-controls {
    padding: 10px 20px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .player-info {
    padding: 15px 20px;
    background: #121212;
    color: #ccc;
    flex-grow: 1;
    overflow-y: auto;
    min-height: 100px;
  }

  .p-title {
    color: #FFD700;
    font-size: 1.2rem;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .p-desc {
    font-size: 0.9rem;
    line-height: 1.5;
    white-space: pre-line;
  }

  .ctrl-btn {
    background: #333;
    color: #fff;
    border: 1px solid #444;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: bold;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .ctrl-btn:hover:not(:disabled) {
    background: #555;
    border-color: #666;
  }

  .ctrl-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .close-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    color: #fff;
    cursor: pointer;
    font-size: 28px;
    z-index: 3001;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 50%;
    padding: 4px;
  }

  .close-btn:hover {
    background: rgba(255, 82, 82, 0.9);
  }

  /* --- 6. MODAL CONFIRM & SUCCESS --- */
  #confirm-modal,
  #completion-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    z-index: 3100;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(5px);
  }

  .modal-box {
    background: #262626;
    padding: 30px;
    border-radius: 16px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    border: 1px solid #444;
  }

  .modal-title {
    font-size: 1.5rem;
    color: #fff;
    margin-bottom: 10px;
    font-weight: bold;
  }

  .modal-desc {
    color: #aaa;
    margin-bottom: 25px;
    font-size: 1rem;
  }

  .modal-actions {
    display: flex;
    justify-content: center;
    gap: 15px;
  }

  .btn-confirm-yes {
    background: transparent;
    border: none;
    color: #81d4fa;
    cursor: pointer;
    font-weight: bold;
    font-size: 1rem;
    padding: 10px 20px;
  }

  .btn-confirm-yes:hover {
    background: rgba(129, 212, 250, 0.1);
    border-radius: 8px;
  }

  .btn-confirm-no {
    background: #333;
    border: none;
    color: #fff;
    cursor: pointer;
    font-weight: bold;
    font-size: 1rem;
    padding: 10px 25px;
    border-radius: 8px;
  }

  .btn-confirm-no:hover {
    background: #444;
  }

  #completion-screen {
    flex-direction: column;
    z-index: 3200;
    animation: zoomIn 0.4s;
  }

  .success-icon {
    font-size: 80px;
    color: #4CAF50;
    margin-bottom: 20px;
  }

  .success-title {
    font-size: 24px;
    font-weight: bold;
    color: #fff;
    margin-bottom: 10px;
    text-align: center;
  }

  .success-msg {
    font-size: 16px;
    color: #ccc;
    margin-bottom: 30px;
    text-align: center;
  }

  .btn-back-success {
    background-color: #1e1e1e;
    color: #81d4fa;
    border: 1px solid #333;
    padding: 12px 24px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    font-size: 15px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-back-success:hover {
    background-color: #333;
    border-color: #81d4fa;
    transform: scale(1.05);
  }

  .spinner {
    border: 4px solid rgba(255, 255, 255, 0.1);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border-left-color: #FFD700;
    animation: spin 1s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  @keyframes zoomIn {
    from {
      transform: scale(0.8);
      opacity: 0;
    }

    to {
      transform: scale(1);
      opacity: 1;
    }
  }
</style>

<div id="videoteca-screen" class="video-view">
  <div class="profile-header-nav">
    <button class="btn-back" onclick="fecharVideoteca()">
      <span class="material-icons" style="font-size: 32px;">arrow_back</span>
    </button>
    <h2 style="margin:0; font-size:1.8rem;">Central de Treinamento</h2>
  </div>

  <div class="v-tabs">
    <div class="v-tab active" onclick="mudarAba('treino')">
      <span class="material-icons">ondemand_video</span> Treino por Faixa
    </div>
    <div class="v-tab" onclick="mudarAba('exame')">
      <span class="material-icons">task_alt</span> Simular Exame
    </div>
  </div>

  <div id="loading-vid" style="text-align:center; margin-top:50px;">
    <div class="spinner"></div>
    <p style="color:#888; margin-top:10px;">Carregando conteúdo blindado...</p>
  </div>

  <div id="videos-grid" class="rank-grid"></div>
</div>

<div id="player-overlay">
  <span class="material-icons close-btn" onclick="solicitarSaida()">close</span>
  <div class="player-box">
    <div class="video-frame" id="player-container-inner"></div>
    <div class="player-controls">
      <button class="ctrl-btn" id="btn-prev" onclick="mudarVideo(-1)">
          <span class="material-icons">skip_previous</span> Anterior
       </button>
      <span id="vid-counter" style="color:#888; font-size:0.9rem;">-- / --</span>
      <button class="ctrl-btn" id="btn-next" onclick="mudarVideo(1)">
          Próximo <span class="material-icons">skip_next</span>
       </button>
    </div>
    <div class="player-info">
      <div class="p-title" id="vid-title">Carregando...</div>
      <div class="p-desc" id="vid-desc">...</div>
    </div>
  </div>
</div>

<div id="confirm-modal">
  <div class="modal-box">
    <div class="modal-title">Confirmar Saída</div>
    <div class="modal-desc">Você tem certeza que deseja encerrar este treino?</div>
    <div class="modal-actions">
      <button class="btn-confirm-yes" onclick="confirmarSaida()">Sim, encerrar</button>
      <button class="btn-confirm-no" onclick="cancelarSaida()">Não, continuar</button>
    </div>
  </div>
</div>

<div id="completion-screen">
  <span class="material-icons success-icon">check_circle</span>
  <div class="success-title" id="msg-parabens">Parabéns!</div>
  <div class="success-msg">Playlist de treino concluída com sucesso.</div>
  <button class="btn-back-success" onclick="finalizarTreino()">
    <span class="material-icons">arrow_back</span> Voltar para a Videoteca
  </button>
</div>

<script>
  console.log("✅ [SAFE MODE] Videoteca.html (Blindada v4.0 Final) carregada!");

  // --- VARIAVEIS GLOBAIS BLINDADAS ---
  // Inicialização segura para evitar undefined
  var acervo = {};
  var faixasPermitidas = [];
  var playlistAtual = [];
  var indiceAtual = 0;
  var modoAtual = 'treino';

  /**
   * Abre a tela da videoteca e gerencia o carregamento (Cache ou Backend)
   */
  function abrirVideoteca() {
    try {
        // Gestão de visibilidade segura
        const dashGrid = document.getElementById('dashboard-grid');
        const dashHeader = document.querySelector('.dashboard-header');
        const videoScreen = document.getElementById('videoteca-screen');
        
        if (dashGrid) dashGrid.style.display = 'none';
        if (dashHeader) dashHeader.style.display = 'none';
        if (videoScreen) videoScreen.style.display = 'block';
        
        // --- CACHE ENGINE IMPLEMENTADA ---
        // Chave única por usuário para garantir que, se ele subir de faixa, o cache invalide ou seja diferente
        // Utiliza currentUser global se disponível, senão fallback seguro
        const userLogin = (typeof currentUser !== 'undefined' && currentUser.LOGIN) ? currentUser.LOGIN : 'anon';
        const userGrad = (typeof currentUser !== 'undefined' && currentUser.graduacao) ? currentUser.graduacao : 'branca';
        var cacheKey = 'videoteca_' + userLogin + '_' + userGrad;
        
        // Tenta carregar do Cache primeiro
        if (typeof CacheSystem !== 'undefined') {
            var cached = CacheSystem.get(cacheKey);
            if (cached) {
                console.log("⚡ [CACHE] Videoteca carregada da memória.");
                acervo = cached.acervo || {};
                faixasPermitidas = cached.faixasPermitidas || [];
                renderizarGrid();
                return; // Interrompe para não chamar o servidor
            }
        }

        const loadingVid = document.getElementById('loading-vid');
        const videosGrid = document.getElementById('videos-grid');
        
        if (loadingVid) loadingVid.style.display = 'block';
        if (videosGrid) videosGrid.innerHTML = '';

        // Chamada segura ao backend
        if (typeof google !== 'undefined' && google.script) {
            google.script.run
              .withSuccessHandler(function(dados) {
                 if (loadingVid) loadingVid.style.display = 'none';
                 
                 if (!dados || !dados.acervo) {
                     console.error("Dados de videoteca vazios ou inválidos recebidos.");
                     alert("Erro: Dados de videoteca vazios.");
                     return;
                 }
                 
                 // Salva no Cache por 60 minutos (3600 min na verdade, pois a engine espera min)
                 if (typeof CacheSystem !== 'undefined') {
                     CacheSystem.set(cacheKey, dados, 60); 
                 }

                 acervo = dados.acervo || {};
                 faixasPermitidas = dados.faixasPermitidas || [];
                 renderizarGrid();
              })
              .withFailureHandler(function(err) {
                 if (loadingVid) loadingVid.style.display = 'none';
                 console.error("Erro de conexão Videoteca:", err);
                 alert("Erro de conexão: " + err.message);
              })
              .listarVideoteca(typeof currentUser !== 'undefined' ? currentUser : {});
        } else {
            console.error("Ambiente Google Script não detectado.");
        }
    } catch (e) {
        console.error("Erro crítico em abrirVideoteca:", e);
    }
  }

  /**
   * Alterna entre abas de Treino e Exame
   */
  function mudarAba(modo) {
    try {
        modoAtual = modo;
        var tabs = document.querySelectorAll('.v-tab');
        for(var i=0; i<tabs.length; i++) tabs[i].classList.remove('active');
        if(event && event.currentTarget) event.currentTarget.classList.add('active');
        renderizarGrid();
    } catch (e) {
        console.error("Erro em mudarAba:", e);
    }
  }

  /**
   * Renderiza a grade de faixas disponíveis
   */
  function renderizarGrid() {
    try {
        var grid = document.getElementById('videos-grid');
        if (!grid) return;
        
        grid.innerHTML = '';

        if (!faixasPermitidas || faixasPermitidas.length === 0) {
            grid.innerHTML = '<p style="color:#666; grid-column:1/-1; text-align:center">Nenhuma faixa disponível para seu nível atual.</p>';
            return;
        }

        for(var i = 0; i < faixasPermitidas.length; i++) {
            var faixa = faixasPermitidas[i];
            var listaVideos = acervo[faixa] || [];
            var qtdTotal = listaVideos.length; 
            
            var card = document.createElement('div');
            card.className = 'rank-card';
            // Tratamento seguro para split
            var corClasse = 'bg-' + (faixa ? faixa.split(' ')[0].toLowerCase() : 'branca');
            
            var textoBotao = (modoAtual === 'treino') ? (qtdTotal + " Vídeos") : "Iniciar Simulação";
            var iconBotao = (modoAtual === 'treino') ? "play_circle_outline" : "emergency_recording";

            var html = '<div class="rank-icon ' + corClasse + '">' + (faixa ? faixa.substring(0,2) : '??') + '</div>';
            html += '<div class="rank-title">Faixa ' + faixa + '</div>';
            html += '<div class="rank-subtitle"><span class="material-icons" style="font-size:16px">' + iconBotao + '</span> ' + textoBotao + '</div>';

            card.innerHTML = html;
            // Closure para capturar a variável faixa corretamente no loop
            (function(f) { 
                card.onclick = function() { preparingPlaylistSeguro(f); }; 
            })(faixa);
            
            grid.appendChild(card);
        }
    } catch (e) {
        console.error("Erro em renderizarGrid:", e);
    }
  }

  /**
   * Prepara a playlist com base na seleção e modo (Treino vs Exame)
   * Nome alterado para evitar conflitos e indicar blindagem
   */
  function preparingPlaylistSeguro(faixaAlvo) {
    try {
        playlistAtual = [];
        if (modoAtual === 'treino') {
            if (acervo[faixaAlvo]) playlistAtual = acervo[faixaAlvo];
        } else {
            // Modo Exame: Pega todas as faixas acumuladas até a alvo
            for (var i = 0; i < faixasPermitidas.length; i++) {
                var f = faixasPermitidas[i];
                if (acervo[f]) playlistAtual = playlistAtual.concat(acervo[f]);
                if (f === faixaAlvo) break;
            }
        }

        if (playlistAtual.length > 0) {
            indiceAtual = 0;
            abrirPlayer();
        } else {
            alert("Nenhum conteúdo encontrado nesta seleção.");
        }
    } catch (e) {
        console.error("Erro em preparingPlaylistSeguro:", e);
    }
  }

  function abrirPlayer() {
    const overlay = document.getElementById('player-overlay');
    if (overlay) overlay.style.display = 'flex';
    carregarVideoNoPlayer();
  }

  function solicitarSaida() { 
      const modal = document.getElementById('confirm-modal');
      if (modal) modal.style.display = 'flex'; 
  }
  
  function cancelarSaida() { 
      const modal = document.getElementById('confirm-modal');
      if (modal) modal.style.display = 'none'; 
  }
  
  function confirmarSaida() {
    const modal = document.getElementById('confirm-modal');
    const overlay = document.getElementById('player-overlay');
    const container = document.getElementById('player-container-inner');
    
    if (modal) modal.style.display = 'none';
    if (overlay) overlay.style.display = 'none';
    if (container) container.innerHTML = ""; // Limpa iframe para parar som
  }

  function mostrarConclusao() {
    const overlay = document.getElementById('player-overlay');
    const container = document.getElementById('player-container-inner');
    const completion = document.getElementById('completion-screen');
    const msgPara = document.getElementById('msg-parabens');
    
    if (overlay) overlay.style.display = 'none';
    if (container) container.innerHTML = "";
    
    var nome = "Aluno";
    if(typeof currentUser !== 'undefined') {
       nome = currentUser.nomeCompleto || currentUser['Nome Completo'] || currentUser.LOGIN || "Aluno";
    }
    
    if (msgPara) msgPara.textContent = "Parabéns, " + nome + "!";
    if (completion) completion.style.display = 'flex';
  }

  function finalizarTreino() {
    const completion = document.getElementById('completion-screen');
    if (completion) completion.style.display = 'none';
  }

  function carregarVideoNoPlayer() {
    try {
        if (!playlistAtual || playlistAtual.length === 0 || indiceAtual < 0 || indiceAtual >= playlistAtual.length) {
            console.error("Índice ou playlist inválidos.");
            return;
        }

        var video = playlistAtual[indiceAtual];
        var container = document.getElementById('player-container-inner');
        
        if (!container) return;
        
        // Verifica se tem ID válido (>5 chars) e se não é o placeholder
        var temVideo = video.youtubeId && video.youtubeId.length > 5 && video.youtubeId !== "YOUTUBE_ID_AQUI";

        if (!temVideo) {
           // VISUAL "EM BREVE" / INDISPONÍVEL
           container.innerHTML = `
              <div class="video-unavailable">
                 <span class="material-icons">videocam_off</span>
                 <div class="unavailable-title">Conteúdo não disponível</div>
                 <div class="unavailable-desc">Este vídeo será adicionado em breve à plataforma.</div>
              </div>
           `;
        } else {
           // VISUAL PLAYER (YouTube)
           var urlEmbed = "https://www.youtube.com/embed/" + video.youtubeId + "?autoplay=1&rel=0&modestbranding=1";
           container.innerHTML = `<iframe id="yt-player" src="${urlEmbed}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="width:100%; height:100%"></iframe>`;
        }
        
        // Proteção XSS nos textos
        var titleEl = document.getElementById('vid-title');
        var descEl = document.getElementById('vid-desc');
        var counterEl = document.getElementById('vid-counter');
        
        if (titleEl) titleEl.textContent = video.titulo || "Sem Título";
        if (descEl) descEl.innerText = video.descricao || "Descrição indisponível.";
        if (counterEl) counterEl.textContent = (indiceAtual + 1) + " / " + playlistAtual.length;
        
        var btnPrev = document.getElementById('btn-prev');
        if (btnPrev) btnPrev.disabled = (indiceAtual === 0);
        
        var btnNext = document.getElementById('btn-next');
        if (btnNext) {
            // Remove listeners antigos para evitar duplicação (embora reatribuição onclick resolva)
            btnNext.onclick = null;
            
            if (indiceAtual === playlistAtual.length - 1) {
                btnNext.innerHTML = 'Concluir <span class="material-icons">check</span>';
                btnNext.onclick = mostrarConclusao;
            } else {
                btnNext.innerHTML = 'Próximo <span class="material-icons">skip_next</span>';
                btnNext.onclick = function() { mudarVideo(1); };
            }
        }
    } catch (e) {
        console.error("Erro em carregarVideoNoPlayer:", e);
    }
  }

  function mudarVideo(delta) {
    indiceAtual += delta;
    carregarVideoNoPlayer();
  }

  function fecharVideoteca() {
    try {
        const videoScreen = document.getElementById('videoteca-screen');
        const dashHeader = document.querySelector('.dashboard-header');
        const dashGrid = document.getElementById('dashboard-grid');
        
        if (videoScreen) videoScreen.style.display = 'none';
        if (dashHeader) dashHeader.style.display = 'flex';
        if (dashGrid) dashGrid.style.display = 'grid';
    } catch (e) {
        console.error("Erro em fecharVideoteca:", e);
    }
  }
</script>
