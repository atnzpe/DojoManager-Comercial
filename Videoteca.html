<style>
  /* ============================================================================
     INJEÇÃO DE CORES COM FALLBACK SEGURO
     ============================================================================ */
  :root {
    --dynamic-bg: <?=typeof bgColor !=='undefined'&& bgColor ? bgColor: '#121212'?> !important;
    --dynamic-prim: <?=typeof primaryColor !=='undefined'&& primaryColor ? primaryColor: '#FFD700'?> !important;
    --dynamic-sec: <?=typeof secondaryColor !=='undefined'&& secondaryColor ? secondaryColor: '#1e1e1e'?> !important;
    --dynamic-text: <?=typeof textColor !=='undefined'&& textColor ? textColor: '#ffffff'?> !important;
    --dynamic-btn-text: <?=typeof btnTextColor !=='undefined'&& btnTextColor ? btnTextColor: '#000000'?> !important;
  }

  /* --- 1. RESET E SCROLLBAR --- */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }

  ::-webkit-scrollbar-track {
    background: var(--dynamic-bg);
  }

  ::-webkit-scrollbar-thumb {
    background: var(--dynamic-prim);
    border-radius: 3px;
  }

  /* --- 2. ESTRUTURA GERAL --- */
  .video-view {
    display: none;
    animation: fadeIn 0.3s;
    padding-top: 20px;
    padding-bottom: 40px;
    max-width: 1000px;
    margin: 0 auto;
  }

  /* CABEÇALHO PADRÃO */
  .profile-header-nav {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
    padding: 0 20px;
  }

  .btn-back-vid {
    background: transparent;
    border: 1px solid var(--dynamic-text);
    color: var(--dynamic-text);
    opacity: 0.6;
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
  }

  .btn-back-vid:hover {
    opacity: 1;
    border-color: var(--dynamic-prim);
    color: var(--dynamic-prim);
    transform: translateX(-3px);
  }

  /* --- 3. ABAS --- */
  .v-tabs {
    display: flex;
    gap: 20px;
    margin-bottom: 25px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    padding: 0 20px;
  }

  .v-tab {
    padding: 12px 20px;
    cursor: pointer;
    color: var(--dynamic-text);
    opacity: 0.5;
    font-weight: 900;
    font-size: 1rem;
    border-bottom: 3px solid transparent;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
    text-transform: uppercase;
  }

  .v-tab:hover {
    opacity: 0.8;
  }

  .v-tab.active {
    color: var(--dynamic-prim);
    border-bottom-color: var(--dynamic-prim);
    opacity: 1;
  }

  /* --- 4. GRID DE CARTÕES DE FAIXA --- */
  .rank-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    padding: 0 20px;
  }

  .rank-card {
    background-color: var(--dynamic-sec) !important;
    border: 2px solid var(--dynamic-prim) !important;
    border-radius: 12px;
    padding: 25px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s, filter 0.2s, box-shadow 0.2s;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
  }

  .rank-card:hover {
    transform: translateY(-5px);
    filter: brightness(1.15);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
  }

  /* Cores das Faixas (Mantidas semanticamente fixas) */
  .rank-icon {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 1.2rem;
    margin-bottom: 15px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
    text-transform: uppercase;
    border: 2px solid rgba(255, 255, 255, 0.2);
  }

  .bg-branca {
    background: #ffffff;
    color: #000;
  }

  .bg-amarela {
    background: #FFD700;
    color: #000;
  }

  .bg-laranja {
    background: #FF8C00;
    color: #fff;
  }

  .bg-verde {
    background: #2E8B57;
    color: #fff;
  }

  .bg-azul {
    background: #1E90FF;
    color: #fff;
  }

  .bg-marrom {
    background: #8B4513;
    color: #fff;
  }

  .bg-preta {
    background: #000000;
    color: #fff;
    border: 2px solid #555;
  }

  .bg-vermelha {
    background: #E53935;
    color: #fff;
  }

  .rank-title {
    font-weight: 900;
    color: var(--dynamic-text);
    font-size: 1.1rem;
    margin-bottom: 5px;
    text-transform: uppercase;
  }

  .rank-subtitle {
    font-size: 0.85rem;
    color: var(--dynamic-text);
    opacity: 0.7;
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
    font-weight: bold;
  }

  /* --- 5. PLAYER OVERLAY --- */
  #player-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    z-index: 100000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
    backdrop-filter: blur(8px);
  }

  .player-box {
    width: 100%;
    max-width: 900px;
    height: auto;
    max-height: 90vh;
    background-color: var(--dynamic-sec);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 10px 50px rgba(0, 0, 0, 0.9);
    border: 2px solid var(--dynamic-prim);
    position: relative;
  }

  .video-frame {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    flex-shrink: 1;
    min-height: 200px;
    max-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .video-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .video-unavailable {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--dynamic-text);
    background: #111;
    text-align: center;
    padding: 20px;
  }

  .video-unavailable .material-icons {
    font-size: 48px;
    margin-bottom: 10px;
    opacity: 0.5;
    color: var(--dynamic-prim);
  }

  .unavailable-title {
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--dynamic-text);
    margin-bottom: 5px;
  }

  .unavailable-desc {
    font-size: 0.9rem;
    color: var(--dynamic-text);
    opacity: 0.6;
  }

  .player-controls {
    padding: 15px 20px;
    background: rgba(0, 0, 0, 0.4);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .player-info {
    padding: 20px;
    background-color: var(--dynamic-sec);
    color: var(--dynamic-text);
    flex-grow: 1;
    overflow-y: auto;
    min-height: 100px;
  }

  .p-title {
    color: var(--dynamic-prim);
    font-size: 1.3rem;
    font-weight: 900;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .p-desc {
    font-size: 0.95rem;
    line-height: 1.5;
    white-space: pre-line;
    opacity: 0.8;
  }

  .ctrl-btn {
    background: transparent;
    color: var(--dynamic-text);
    border: 2px solid var(--dynamic-text);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 900;
    font-size: 0.85rem;
    transition: 0.2s;
    text-transform: uppercase;
  }

  .ctrl-btn:hover:not(:disabled) {
    background: var(--dynamic-prim);
    border-color: var(--dynamic-prim);
    color: var(--dynamic-btn-text);
  }

  .ctrl-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    color: #fff;
    cursor: pointer;
    font-size: 32px;
    z-index: 100001;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 50%;
    padding: 5px;
    transition: 0.2s;
  }

  .close-btn:hover {
    background: #ff5252;
    transform: scale(1.1);
  }

  /* --- 6. MODAIS DE CONFIRMAÇÃO --- */
  #confirm-modal,
  #completion-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    z-index: 110000;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(5px);
  }

  .modal-box-vid {
    background-color: var(--dynamic-sec);
    padding: 30px;
    border-radius: 16px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    border: 2px solid var(--dynamic-prim);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
  }

  .modal-title {
    font-size: 1.5rem;
    color: var(--dynamic-prim);
    margin-bottom: 10px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .modal-desc {
    color: var(--dynamic-text);
    opacity: 0.8;
    margin-bottom: 25px;
    font-size: 1rem;
    font-weight: bold;
  }

  .modal-actions {
    display: flex;
    justify-content: center;
    gap: 15px;
  }

  .btn-confirm-yes {
    background: transparent;
    border: 1px solid var(--dynamic-text);
    color: var(--dynamic-text);
    cursor: pointer;
    font-weight: 900;
    font-size: 1rem;
    padding: 12px 20px;
    border-radius: 8px;
    transition: 0.2s;
  }

  .btn-confirm-yes:hover {
    background: #ff5252;
    color: #fff;
    border-color: #ff5252;
  }

  .btn-confirm-no {
    background: var(--dynamic-prim);
    border: none;
    color: var(--dynamic-btn-text);
    cursor: pointer;
    font-weight: 900;
    font-size: 1rem;
    padding: 12px 25px;
    border-radius: 8px;
    transition: 0.2s;
  }

  .btn-confirm-no:hover {
    filter: brightness(1.15);
    transform: translateY(-2px);
  }

  #completion-screen {
    flex-direction: column;
    z-index: 120000;
    animation: zoomIn 0.4s;
  }

  .success-icon {
    font-size: 80px;
    color: #4CAF50;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
  }

  .success-title {
    font-size: 28px;
    font-weight: 900;
    color: var(--dynamic-prim);
    margin-bottom: 10px;
    text-align: center;
    text-transform: uppercase;
  }

  .success-msg {
    font-size: 16px;
    color: var(--dynamic-text);
    opacity: 0.8;
    margin-bottom: 30px;
    text-align: center;
    font-weight: bold;
  }

  .btn-back-success {
    background-color: transparent;
    color: var(--dynamic-prim);
    border: 2px solid var(--dynamic-prim);
    padding: 14px 28px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 900;
    font-size: 15px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    text-transform: uppercase;
  }

  .btn-back-success:hover {
    background-color: var(--dynamic-prim);
    color: var(--dynamic-btn-text);
    transform: scale(1.05);
  }

  .spinner-vid {
    border: 4px solid rgba(255, 255, 255, 0.1);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border-left-color: var(--dynamic-prim);
    animation: spin 1s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  @keyframes zoomIn {
    from {
      transform: scale(0.8);
      opacity: 0;
    }

    to {
      transform: scale(1);
      opacity: 1;
    }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>

<div id="videoteca-screen" class="video-view">
  <div class="profile-header-nav">
    <button class="btn-back-vid" onclick="fecharVideoteca()">
      <span class="material-icons" style="font-size: 28px;">arrow_back</span>
    </button>
    <h2 style="margin:0; font-size:1.8rem; font-weight:900; color:var(--dynamic-text);">Central de Treinamento</h2>
  </div>

  <div class="v-tabs">
    <div class="v-tab active" onclick="mudarAba('treino', this)">
      <span class="material-icons">ondemand_video</span> Treino por Faixa
    </div>
    <div class="v-tab" onclick="mudarAba('exame', this)">
      <span class="material-icons">task_alt</span> Simular Exame
    </div>
  </div>

  <div id="loading-vid" style="text-align:center; margin-top:50px;">
    <div class="spinner-vid"></div>
    <p style="color:var(--dynamic-text); opacity:0.6; font-weight:bold; margin-top:15px;">Carregando videoteca...</p>
  </div>

  <div id="videos-grid" class="rank-grid"></div>
</div>

<div id="player-overlay">
  <span class="material-icons close-btn" onclick="solicitarSaida()">close</span>
  <div class="player-box">
    <div class="video-frame" id="player-container-inner"></div>
    <div class="player-controls">
      <button class="ctrl-btn" id="btn-prev" onclick="mudarVideo(-1)">
          <span class="material-icons">skip_previous</span> Anterior
       </button>
      <span id="vid-counter" style="color:var(--dynamic-text); font-weight:bold; font-size:0.9rem;">-- / --</span>
      <button class="ctrl-btn" id="btn-next" onclick="mudarVideo(1)">
          Próximo <span class="material-icons">skip_next</span>
       </button>
    </div>
    <div class="player-info">
      <div class="p-title" id="vid-title">Carregando...</div>
      <div class="p-desc" id="vid-desc">...</div>
    </div>
  </div>
</div>

<div id="confirm-modal">
  <div class="modal-box-vid">
    <div class="modal-title">Confirmar Saída</div>
    <div class="modal-desc">Deseja realmente encerrar a reprodução do treino?</div>
    <div class="modal-actions">
      <button class="btn-confirm-yes" onclick="confirmarSaida()">ENCERRAR</button>
      <button class="btn-confirm-no" onclick="cancelarSaida()">CONTINUAR</button>
    </div>
  </div>
</div>

<div id="completion-screen">
  <span class="material-icons success-icon">check_circle</span>
  <div class="success-title" id="msg-parabens">Parabéns!</div>
  <div class="success-msg">Treino concluído com sucesso.</div>
  <button class="btn-back-success" onclick="finalizarTreino()">
    <span class="material-icons">arrow_back</span> Voltar para Videoteca
  </button>
</div>

<script>
  console.log("✅ [SAFE MODE] Videoteca.html (White-Label) carregada!");

  var acervo = {};
  var faixasPermitidas = [];
  var playlistAtual = [];
  var indiceAtual = 0;
  var modoAtual = 'treino';

  function abrirVideoteca() {
    try {
        const dashGrid = document.getElementById('dashboard-grid');
        const dashHeader = document.querySelector('.dashboard-header');
        const videoScreen = document.getElementById('videoteca-screen');
        
        if (dashGrid) dashGrid.style.display = 'none';
        if (dashHeader) dashHeader.style.display = 'none';
        if (videoScreen) videoScreen.style.display = 'block';
        
        const userLogin = (typeof currentUser !== 'undefined' && currentUser.LOGIN) ? currentUser.LOGIN : 'anon';
        const userGrad = (typeof currentUser !== 'undefined' && currentUser.graduacao) ? currentUser.graduacao : 'branca';
        var cacheKey = 'videoteca_' + userLogin + '_' + userGrad;
        
        if (typeof CacheSystem !== 'undefined') {
            var cached = CacheSystem.get(cacheKey);
            if (cached) {
                acervo = cached.acervo || {};
                faixasPermitidas = cached.faixasPermitidas || [];
                renderizarGrid();
                return; 
            }
        }

        const loadingVid = document.getElementById('loading-vid');
        const videosGrid = document.getElementById('videos-grid');
        
        if (loadingVid) loadingVid.style.display = 'block';
        if (videosGrid) videosGrid.innerHTML = '';

        if (typeof google !== 'undefined' && google.script) {
            google.script.run
              .withSuccessHandler(function(dados) {
                 if (loadingVid) loadingVid.style.display = 'none';
                 if (!dados || !dados.acervo) {
                     alert("Erro: Dados de videoteca vazios.");
                     return;
                 }
                 if (typeof CacheSystem !== 'undefined') CacheSystem.set(cacheKey, dados, 60); 

                 acervo = dados.acervo || {};
                 faixasPermitidas = dados.faixasPermitidas || [];
                 renderizarGrid();
              })
              .withFailureHandler(function(err) {
                 if (loadingVid) loadingVid.style.display = 'none';
                 alert("Erro de conexão: " + err.message);
              })
              .listarVideoteca(typeof currentUser !== 'undefined' ? currentUser : {});
        }
    } catch (e) {
        console.error(e);
    }
  }

  function mudarAba(modo, el) {
    modoAtual = modo;
    var tabs = document.querySelectorAll('.v-tab');
    tabs.forEach(t => t.classList.remove('active'));
    if(el) el.classList.add('active');
    renderizarGrid();
  }

  function renderizarGrid() {
    var grid = document.getElementById('videos-grid');
    if (!grid) return;
    grid.innerHTML = '';

    if (!faixasPermitidas || faixasPermitidas.length === 0) {
        grid.innerHTML = '<p style="color:var(--dynamic-text); opacity:0.5; grid-column:1/-1; text-align:center; font-weight:bold; padding:20px; border:1px dashed rgba(255,255,255,0.2); border-radius:8px;">Nenhuma faixa disponível para o seu nível atual.</p>';
        return;
    }

    faixasPermitidas.forEach(function(faixa) {
        var listaVideos = acervo[faixa] || [];
        var qtdTotal = listaVideos.length; 
        
        var card = document.createElement('div');
        card.className = 'rank-card';
        var primeiraPalavra = faixa ? faixa.split(' ')[0].toLowerCase() : 'branca';
        var corClasse = 'bg-' + primeiraPalavra;
        
        var textoBotao = (modoAtual === 'treino') ? (qtdTotal + " Vídeos") : "Iniciar Simulação";
        var iconBotao = (modoAtual === 'treino') ? "play_circle_outline" : "emergency_recording";

        var html = '<div class="rank-icon ' + corClasse + '">' + (faixa ? primeiraPalavra.substring(0,2) : '??') + '</div>';
        html += '<div class="rank-title">Faixa ' + faixa + '</div>';
        html += '<div class="rank-subtitle"><span class="material-icons" style="font-size:16px; color:var(--dynamic-prim);">' + iconBotao + '</span> ' + textoBotao + '</div>';

        card.innerHTML = html;
        card.onclick = function() { preparingPlaylistSeguro(faixa); }; 
        grid.appendChild(card);
    });
  }

  function preparingPlaylistSeguro(faixaAlvo) {
    playlistAtual = [];
    if (modoAtual === 'treino') {
        if (acervo[faixaAlvo]) playlistAtual = acervo[faixaAlvo];
    } else {
        for (var i = 0; i < faixasPermitidas.length; i++) {
            var f = faixasPermitidas[i];
            if (acervo[f]) playlistAtual = playlistAtual.concat(acervo[f]);
            if (f === faixaAlvo) break;
        }
    }

    if (playlistAtual.length > 0) {
        indiceAtual = 0;
        abrirPlayer();
    } else {
        alert("Nenhum vídeo registrado para esta seleção.");
    }
  }

  function abrirPlayer() {
    const overlay = document.getElementById('player-overlay');
    if (overlay) overlay.style.display = 'flex';
    carregarVideoNoPlayer();
  }

  function solicitarSaida() { document.getElementById('confirm-modal').style.display = 'flex'; }
  function cancelarSaida() { document.getElementById('confirm-modal').style.display = 'none'; }
  
  function confirmarSaida() {
    document.getElementById('confirm-modal').style.display = 'none';
    document.getElementById('player-overlay').style.display = 'none';
    document.getElementById('player-container-inner').innerHTML = ""; 
  }

  function mostrarConclusao() {
    document.getElementById('player-overlay').style.display = 'none';
    document.getElementById('player-container-inner').innerHTML = "";
    
    var nome = (typeof currentUser !== 'undefined') ? (currentUser.nomeCompleto || currentUser.LOGIN || "Aluno") : "Atleta";
    document.getElementById('msg-parabens').textContent = "Parabéns, " + nome.split(' ')[0] + "!";
    document.getElementById('completion-screen').style.display = 'flex';
  }

  function finalizarTreino() { document.getElementById('completion-screen').style.display = 'none'; }

  function carregarVideoNoPlayer() {
    if (!playlistAtual || playlistAtual.length === 0) return;

    var video = playlistAtual[indiceAtual];
    var container = document.getElementById('player-container-inner');
    
    var temVideo = video.youtubeId && video.youtubeId.length > 5 && video.youtubeId !== "YOUTUBE_ID_AQUI";

    if (!temVideo) {
        container.innerHTML = `
           <div class="video-unavailable">
              <span class="material-icons">videocam_off</span>
              <div class="unavailable-title">Conteúdo não disponível</div>
              <div class="unavailable-desc">O vídeo oficial desta técnica será adicionado em breve.</div>
           </div>`;
    } else {
        var urlEmbed = "https://www.youtube.com/embed/" + video.youtubeId + "?autoplay=1&rel=0&modestbranding=1";
        container.innerHTML = `<iframe id="yt-player" src="${urlEmbed}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="width:100%; height:100%"></iframe>`;
    }
    
    document.getElementById('vid-title').textContent = video.titulo || "Sem Título";
    document.getElementById('vid-desc').innerText = video.descricao || "Sem descrição informada.";
    document.getElementById('vid-counter').textContent = (indiceAtual + 1) + " de " + playlistAtual.length;
    
    document.getElementById('btn-prev').disabled = (indiceAtual === 0);
    
    var btnNext = document.getElementById('btn-next');
    btnNext.onclick = null;
    if (indiceAtual === playlistAtual.length - 1) {
        btnNext.innerHTML = 'CONCLUIR <span class="material-icons">task_alt</span>';
        btnNext.style.background = "var(--dynamic-prim)";
        btnNext.style.color = "var(--dynamic-btn-text)";
        btnNext.onclick = mostrarConclusao;
    } else {
        btnNext.innerHTML = 'PRÓXIMO <span class="material-icons">skip_next</span>';
        btnNext.style.background = "transparent";
        btnNext.style.color = "var(--dynamic-text)";
        btnNext.onclick = function() { mudarVideo(1); };
    }
  }

  function mudarVideo(delta) { indiceAtual += delta; carregarVideoNoPlayer(); }

  function fecharVideoteca() {
    document.getElementById('videoteca-screen').style.display = 'none';
    document.querySelector('.dashboard-header').style.display = 'flex';
    document.getElementById('dashboard-grid').style.display = 'grid';
  }
</script>
