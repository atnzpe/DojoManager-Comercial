<!DOCTYPE html>
<html lang="pt-br">

<head>
  <base target="_top">
  <title>Portal do Aluno | DojoManager</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Acesse a plataforma oficial da sua academia.">
  <meta name="theme-color" content="<?= primaryColor ?>">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="icon" href="<?= logoUrl ?>" type="image/x-icon">

  <style>
    /**
     * ============================================================================
     * INJEÇÃO DE VARIÁVEIS DO BACKEND (WHITE-LABEL)
     * O Apps Script troca as tags do servidor pelos valores reais do Sheets 
     * ANTES de enviar o HTML para o navegador do cliente.
     * ============================================================================
     */
    :root {
      /* Mapeia a 5ª Cor (Fundo Geral) */
      --dynamic-bg: <?=bgColor ?> !important;

      /* Cor da marca da academia (Ex: Dourado, Vermelho) */
      --dynamic-prim: <?=primaryColor ?> !important;

      /* Cor de fundo do Card de Login (Superfície) */
      --dynamic-sec: <?=secondaryColor ?> !important;

      /* Cor da fonte principal do cliente */
      --dynamic-text: <?=textColor ?> !important;

      /* Cor do texto DENTRO dos botões principais */
      --dynamic-btn-text: <?=btnTextColor ?> !important;
    }

    body {
      background-color: transparent !important;
    }

    .bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('<?= bgUrl ?>');
      background-color: var(--bg-color);
      background-size: cover;
      background-position: center;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.65);
      z-index: -1;
    }

    .scroll-wrapper {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .login-card {
      background-color: var(--secondary-color);
      padding: 40px 30px;
      border-radius: 16px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
      border: 1px solid var(--primary-color);
      backdrop-filter: blur(10px);
    }

    .logo-img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      border-radius: 50%;
      border: 3px solid var(--primary-color);
      margin-bottom: 25px;
      background-color: var(--secondary-color);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
    }

    .support-links {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      font-size: 13px;
    }

    .link-gold {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: bold;
    }

    .link-gray {
      color: var(--text-color);
      opacity: 0.7;
      text-decoration: none;
    }

    .divider {
      margin: 25px 0;
      border-top: 1px solid var(--text-color);
      opacity: 0.2;
    }
  </style>

  <?!= include('Style'); ?>
</head>

<body>
  <div class="bg-layer"></div>
  <div class="overlay"></div>

  <div class="scroll-wrapper">
    <div class="login-card">
      <img src="<?= logoUrl ?>" class="logo-img" alt="Logo" onerror="this.src='https://ui-avatars.com/api/?name=Dojo+Manager'">

      <form onsubmit="handleLogin(event)">
        <div class="form-field">
          <label for="login">Usuário</label>
          <input type="text" id="login" class="input-field" placeholder="Digite seu login" required>
        </div>

        <div class="form-field">
          <label for="senha">Senha</label>
          <input type="password" id="senha" class="input-field" placeholder="Sua senha" required>
        </div>

        <div id="feedback-area" style="min-height: 24px; margin-bottom: 15px;">
          <div id="msg" class="error-message" style="display:none;"></div>
          <div id="spin" class="spinner"></div>
        </div>

        <button id="btn-login" type="submit" class="primary-button">ENTRAR</button>

        <div class="support-links">
          <a href="#" onclick="alert('Procure a administração!'); event.preventDefault();" class="link-gold">Como me
            cadastrar?</a>
          <a href="#" onclick="event.preventDefault(); nav('recuperar');" class="link-gray">Esqueci a senha</a>
        </div>
      </form>

      <div class="divider"></div>

      <button class="text-button" onclick="nav('agendar')">
        <span class="material-icons">calendar_today</span> Agendar Aula Experimental
      </button>

      <button class="text-button" onclick="nav('cursos')">
        <span class="material-icons">school</span> Eventos Disponíveis
      </button>

    </div>

  </div>
  <div class="developer-footer">
    ⚡ Powered by <a href="https://wa.me/5581992467787?text=Olá! Gostaria de saber mais sobre o sistema DojoManager."
      target="_blank">DojoManager SaaS</a>
  </div>


  <script>
    function handleLogin(e) {
      e.preventDefault(); 
      const loginVal = document.getElementById('login').value.trim(); 
      const senhaVal = document.getElementById('senha').value.trim(); 
      
      if(!loginVal || !senhaVal) { showMsg("Preencha login e senha.", true); return; }
      
      toggleLoading(true); 

      google.script.run
        .withSuccessHandler(function(res) { 
          if(res.success) { 
            try { localStorage.setItem('userSession', JSON.stringify(res.user)); } catch(err) {} 
            showMsg("Sucesso! Redirecionando...", false);
            window.top.location.href = res.redirectUrl; 
          } else { 
            toggleLoading(false); 
            showMsg(res.message, true); 
          }
        })
        .withFailureHandler(function(err) { 
          toggleLoading(false);
          showMsg("Erro de conexão com o servidor.", true);
        })
        .verificarCredenciais({login: loginVal, senha: senhaVal}); 
    }

    function toggleLoading(isLoading) {
      const btn = document.getElementById('btn-login');
      const spin = document.getElementById('spin');
      const msg = document.getElementById('msg');
      if (isLoading) {
        btn.disabled = true; btn.style.opacity = 0.5; btn.textContent = "VERIFICANDO...";
        spin.style.display = 'block'; msg.style.display = 'none'; 
      } else {
        btn.disabled = false; btn.style.opacity = 1; btn.textContent = "ENTRAR";
        spin.style.display = 'none';
      }
    }

    function showMsg(text, isError) {
      const msg = document.getElementById('msg');
      msg.textContent = text; 
      msg.style.color = isError ? 'var(--error-color)' : 'var(--success-color)';
      msg.style.display = 'block';
    }

    function nav(page) {
      google.script.run.withSuccessHandler(url => { 
        window.top.location.href = url + "?page=" + page; 
      }).getScriptUrl();
    }
  </script>
</body>

</html>
