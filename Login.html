  <script>
    // 1. Monitor de Erros Global
    window.onerror = function (msg, url, line, col, error) {
      console.error(`🚨 [ERRO FATAL NO LOGIN] ${msg} (Linha ${line})`);
      return false; // Silencia o alert para UX, mantém no console
    };

    console.log("✅ [INIT] Tela de Login carregada (SEO Otimizado).");

    /**
     * Gerencia o processo de login
     */
    function handleLogin(e) {
      e.preventDefault();
      console.group("🔒 [FLUXO] Tentativa de Login");
      
      // Coleta dados
      const loginVal = document.getElementById('login').value.trim();
      const senhaVal = document.getElementById('senha').value.trim();
      
      console.log(`Usuário informado: "${loginVal}"`);

      // Validação no Frontend
      if(!loginVal || !senhaVal) {
        console.warn("⚠️ Validação falhou: Campos vazios.");
        showMsg("Preencha login e senha.", true);
        console.groupEnd();
        return;
      }

      // Ativa Estado de Carregamento
      toggleLoading(true);

      console.log("📡 [BACKEND] Enviando credenciais para verificarCredenciais()...");

      google.script.run
        .withSuccessHandler(function(res) {
          console.log("[BACKEND] Resposta:", res);
          
          if(res.success) {
            console.log("✅ Login SUCESSO. Salvando sessão...");
            
            try {
              localStorage.setItem('userSession', JSON.stringify(res.user));
              console.log("📦 Sessão salva no localStorage.");
            } catch(storageErr) {
              console.error("❌ Erro ao salvar no localStorage:", storageErr);
            }

            showMsg("Sucesso! Redirecionando...", false);
            
            // Redirecionamento IMEDIATO
            console.log(`🚀 Redirecionando para: ${res.redirectUrl}`);
            
            try {
                window.top.location.href = res.redirectUrl;
            } catch (e) {
                // Plano B: Botão manual
                console.error("Bloqueio de popup detectado", e);
                document.getElementById('feedback-area').innerHTML = 
                    `<a href="${res.redirectUrl}" target="_top" class="primary-button" style="background:#00e676;text-decoration:none; display:block; line-height:40px;">CLIQUE PARA ENTRAR</a>`;
            }

          } else {
            console.warn("⛔ Login FALHOU:", res.message);
            toggleLoading(false);
            showMsg(res.message, true); 
          }
          console.groupEnd();
        })
        .withFailureHandler(function(err) {
          console.error("🔴 [ERRO] Falha de conexão:", err);
          toggleLoading(false);
          showMsg("Erro de conexão com o servidor.", true);
          console.groupEnd();
        })
        .verificarCredenciais({login: loginVal, senha: senhaVal});
    }

    /**
     * Alterna o estado visual de carregamento
     */
    function toggleLoading(isLoading) {
      const btn = document.getElementById('btn-login');
      const spin = document.getElementById('spin');
      const msg = document.getElementById('msg');

      if (isLoading) {
        btn.disabled = true;
        btn.style.opacity = 0.5;
        btn.textContent = "VERIFICANDO...";
        spin.style.display = 'block';
        msg.style.display = 'none';
      } else {
        btn.disabled = false;
        btn.style.opacity = 1;
        btn.textContent = "ENTRAR";
        spin.style.display = 'none';
      }
    }

    function showMsg(text, isError) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.style.color = isError ? '#ff5252' : '#00e676';
      msg.style.display = 'block';
    }

    /**
     * Navegação segura
     */
    function nav(page) {
      console.log(`[NAV] Navegando para rota: ${page}`);
      google.script.run
        .withSuccessHandler(url => {
          window.top.location.href = url + "?page=" + page;
        })
        .withFailureHandler(err => console.error("Erro nav:", err))
        .getScriptUrl();
    }
  </script>
