<!DOCTYPE html>
<html lang="pt-br">

<head>
  <base target="_top">
  <title>Portal do Aluno | DojoManager</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Acesse a plataforma oficial da sua academia.">
  <meta name="theme-color" content="<?= primaryColor ?>">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="icon" href="<?= logoUrl ?>" type="image/x-icon">

  <?!= include('Style'); ?>

  <style>
    /**
     * ============================================================================
     * INJEÇÃO DE VARIÁVEIS DO BACKEND (WHITE-LABEL)
     * ============================================================================
     */
    :root {
      --dynamic-bg: <?=bgColor ?> !important;
      --dynamic-prim: <?=primaryColor ?> !important;
      --dynamic-sec: <?=secondaryColor ?> !important;
      --dynamic-text: <?=textColor ?> !important;
      --dynamic-btn-text: <?=btnTextColor ?> !important;
    }

    body {
      background-color: transparent !important;
    }

    .bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('<?= bgUrl ?>');
      background-color: var(--dynamic-bg);
      background-size: cover;
      background-position: center;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.65);
      z-index: -1;
    }

    .scroll-wrapper {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      flex-direction: column;
    }

    .login-card {
      background-color: var(--dynamic-sec);
      padding: 40px 30px;
      border-radius: 16px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
      border: 1px solid var(--dynamic-prim);
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 2;
    }

    .logo-img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      border-radius: 50%;
      border: 3px solid var(--dynamic-prim);
      margin-bottom: 25px;
      background-color: var(--dynamic-sec);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
    }

    /* 🛡️ TRUQUE DOS ÍCONES NO INPUT */
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
    }

    .input-wrapper .material-icons.icon-left {
      position: absolute;
      left: 12px;
      color: var(--dynamic-prim);
      pointer-events: none;
      /* Deixa o clique passar direto para o input */
    }

    .input-wrapper .material-icons.icon-right {
      position: absolute;
      right: 12px;
      color: #888;
      cursor: pointer;
      transition: color 0.2s;
    }

    .input-wrapper .material-icons.icon-right:hover {
      color: var(--dynamic-text);
    }

    /* Sobrescreve O SEU .input-field APENAS dentro do Login para caber os ícones */
    .input-wrapper .input-field {
      padding-left: 40px !important;
      padding-right: 40px !important;
      margin-bottom: 0 !important;
      /* Retira margem porque o form-field já tem */
    }

    /* LINKS DE SUPORTE */
    .support-links {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      font-size: 13px;
    }

    .link-gold {
      color: var(--dynamic-prim);
      text-decoration: none;
      font-weight: bold;
    }

    .link-gray {
      color: var(--dynamic-text);
      opacity: 0.7;
      text-decoration: none;
    }

    .divider {
      margin: 25px 0;
      border-top: 1px solid var(--dynamic-text);
      opacity: 0.2;
    }
  </style>

</head>

<body>
  <div class="bg-layer"></div>
  <div class="overlay"></div>

  <div class="scroll-wrapper">
    <div class="login-card">
      <img src="<?= logoUrl ?>" class="logo-img" alt="Logo" onerror="this.src='https://ui-avatars.com/api/?name=Dojo+Manager'">

      <form onsubmit="handleLogin(event)">

        <div class="form-field">
          <label for="login">Usuário</label>
          <div class="input-wrapper">
            <span class="material-icons icon-left">person</span>
            <input type="text" id="login" class="input-field" placeholder="Digite seu login" required>
          </div>
        </div>

        <div class="form-field">
          <label for="senha">Senha</label>
          <div class="input-wrapper">
            <span class="material-icons icon-left">lock</span>
            <input type="password" id="senha" class="input-field" placeholder="Senha" required>
            <span class="material-icons icon-right" id="btn-olho" onclick="toggleSenha('senha', 'btn-olho')">visibility</span>
          </div>
        </div>

        <div id="feedback-area" style="min-height: 24px; margin-bottom: 15px;">
          <div id="msg" class="error-message" style="display:none;"></div>
          <div id="spin" class="spinner"></div>
        </div>

        <button id="btn-login" type="submit" class="primary-button">ENTRAR</button>

        <div class="support-links">
          <a href="#" onclick="alert('Procure a administração!'); event.preventDefault();" class="link-gold">Como me
            cadastrar?</a>
          <a href="#" onclick="event.preventDefault(); nav('recuperar');" class="link-gray">Esqueci a senha</a>
        </div>
      </form>

      <div class="divider"></div>

      <button class="text-button" onclick="nav('agendar')" style="margin-bottom: 10px;">
        <span class="material-icons">calendar_today</span> Agendar Aula Experimental
      </button>

      <button class="text-button" onclick="nav('cursos')">
        <span class="material-icons">school</span> Eventos Disponíveis
      </button>

    </div>

    <div class="no-print" style="
        background-color: #111111 !important; 
        text-align: center; 
        padding: 15px 10px !important; 
        margin: 20px 10px 15px 10px !important; 
        border-radius: 8px !important;
        border-top: 3px solid var(--dynamic-prim, #FFD700) !important;
        box-shadow: 0 4px 8px rgba(0,0,0,0.5) !important;
        display: block !important;
        ">

      <p
        style="margin: 0 0 8px 0 !important; font-size: 13px !important; font-weight: bold !important; color: var(--dynamic-prim, #FFD700) !important; background: transparent !important; line-height: 1.2 !important; white-space: normal !important;">
        ⚡ Quer um sistema igual na SUA academia?
      </p>

      <p
        style="margin: 0 0 12px 0 !important; font-size: 11px !important; color: #cccccc !important; background: transparent !important; line-height: 1.3 !important; white-space: normal !important;">
        O DojoManager SaaS é a solução definitiva.
      </p>

      <a href="https://wa.me/5581992467787?text=Olá, vi o App DojoManager e gostaria de saber mais sobre como implementá-lo na minha academia."
        target="_blank" style="
            background-color: #25D366 !important; 
            color: #ffffff !important; 
            padding: 8px 10px !important; 
            border-radius: 5px !important; 
            text-decoration: none !important; 
            font-weight: bold !important;
            font-size: 12px !important;
            display: block !important;
            width: 100% !important;
            box-sizing: border-box !important;
      ">
        <span class="material-icons" style="vertical-align: middle; font-size: 14px; margin-right: 3px; background: transparent !important; color: #fff !important;">chat</span>
        Falar com o Dev
      </a>

    </div>

  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault(); 
      const loginVal = document.getElementById('login').value.trim(); 
      const senhaVal = document.getElementById('senha').value.trim(); 
      
      if(!loginVal || !senhaVal) { showMsg("Preencha login e senha.", true); return; }
      
      toggleLoading(true); 

      google.script.run
        .withSuccessHandler(function(res) { 
          if(res.success) { 
            try { localStorage.setItem('userSession', JSON.stringify(res.user)); } catch(err) {} 
            showMsg("Sucesso! Entrando no sistema...", false);
            
            // 🛡️ NAVEGAÇÃO SEGURA (Anti-Sandbox / Anti-Apagão)
            google.script.run
               .withFailureHandler(err => {
                   document.getElementById('feedback-area').innerHTML = `
                     <div style="margin-top:10px;">
                        <a href="${res.redirectUrl}" target="_top" style="display:inline-block; padding:10px 20px; background:var(--dynamic-prim); color:var(--dynamic-btn-text); border-radius:8px; font-weight:bold; text-decoration:none;">Acessar Painel</a>
                     </div>
                   `;
               })
               .withSuccessHandler(url => {
                   try {
                       window.top.location.href = url + "?page=dashboard";
                   } catch(e) {
                       document.getElementById('feedback-area').innerHTML = `
                         <div style="margin-top:10px;">
                            <a href="${url}?page=dashboard" target="_top" style="display:inline-block; padding:10px 20px; background:var(--dynamic-prim); color:var(--dynamic-btn-text); border-radius:8px; font-weight:bold; text-decoration:none;">Acessar Painel</a>
                         </div>
                       `;
                   }
               }).getScriptUrl();

          } else { 
            toggleLoading(false); 
            showMsg(res.message, true); 
          }
        })
        .withFailureHandler(function(err) { 
          toggleLoading(false);
          showMsg("Erro de conexão com o servidor.", true);
        })
        .verificarCredenciais({login: loginVal, senha: senhaVal}); 
    }

    function toggleLoading(isLoading) {
      const btn = document.getElementById('btn-login');
      const spin = document.getElementById('spin');
      const msg = document.getElementById('msg');
      if (isLoading) {
        btn.disabled = true; btn.style.opacity = 0.5; btn.innerHTML = "VERIFICANDO...";
        spin.style.display = 'block'; msg.style.display = 'none'; 
      } else {
        btn.disabled = false; btn.style.opacity = 1; btn.innerHTML = "ENTRAR";
        spin.style.display = 'none';
      }
    }

    function showMsg(text, isError) {
      const msg = document.getElementById('msg');
      msg.textContent = text; 
      msg.style.color = isError ? 'var(--error-color, #ff5252)' : 'var(--success-color, #00e676)'; // 👈 Trazendo sua cor de sucesso
      msg.style.display = 'block';
    }

    function nav(page) {
      google.script.run.withSuccessHandler(url => { 
          const a = document.createElement('a');
          a.href = url + "?page=" + page;
          a.target = '_top';
          document.body.appendChild(a);
          a.click();
      }).getScriptUrl();
    }

    /**
     * 👁️ Alterna a visualização da senha
     */
    function toggleSenha(inputId, iconId) {
        const campo = document.getElementById(inputId);
        const icone = document.getElementById(iconId);
        
        if (campo.type === "password") {
            campo.type = "text";
            icone.textContent = "visibility_off";
            icone.style.color = "var(--dynamic-prim)"; // Fica destacado
        } else {
            campo.type = "password";
            icone.textContent = "visibility";
            icone.style.color = "#888"; // Volta ao neutro
        }
    }
  </script>
</body>

</html>
