<style>
  /* --- ESTILOS BIBLIOTECA (WHITE-LABEL INTEGRADO) --- */
  .library-view {
    display: none;
    animation: fadeIn 0.3s ease-in-out;
    padding-top: 20px;
    padding-bottom: 40px;
  }

  .library-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 20px;
    max-width: 900px;
    margin: 0 auto;
  }

  .book-card {
    /* Fundo Card e Borda Principal */
    background-color: var(--dynamic-sec) !important;
    border: 2px solid var(--dynamic-prim) !important;
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s, filter 0.2s, box-shadow 0.2s;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    height: 100%;
    /* Sombra igual à dos cards do Dashboard */
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5) !important;
  }

  .book-card:hover {
    transform: translateY(-5px);
    filter: brightness(1.2);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8) !important;
  }

  .book-cover {
    height: 180px;
    width: 100%;
    object-fit: cover;
    /* Fundo da imagem caso ela falhe/seja transparente */
    background-color: rgba(0, 0, 0, 0.3);
    border-bottom: 2px solid var(--dynamic-prim);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dynamic-text);
    opacity: 0.8;
  }

  .book-info {
    padding: 12px;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
  }

  .book-title {
    color: var(--dynamic-text);
    font-size: 0.95rem;
    font-weight: 900;
    margin-bottom: 5px;
    line-height: 1.3;
  }

  .book-desc {
    color: var(--dynamic-text);
    opacity: 0.7;
    font-size: 0.8rem;
    margin-bottom: 10px;
    flex-grow: 1;
  }

  .book-action {
    color: var(--dynamic-prim);
    font-size: 0.8rem;
    font-weight: 900;
    display: flex;
    align-items: center;
    gap: 5px;
    text-transform: uppercase;
  }

  /* Ajuste no Spinner e Loading text */
  .lib-spinner {
    border: 4px solid rgba(255, 255, 255, 0.1);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border-left-color: var(--dynamic-prim);
    animation: spin 1s linear infinite;
    margin: 0 auto;
  }

  /* Cabeçalho de Navegação (Voltar) */
  .profile-header-nav {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 30px;
  }

  .btn-back-lib {
    background: transparent;
    border: 1px solid var(--dynamic-text);
    color: var(--dynamic-text);
    opacity: 0.6;
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
  }

  .btn-back-lib:hover {
    opacity: 1;
    border-color: var(--dynamic-prim);
    color: var(--dynamic-prim);
  }

  /* ============================================================================
       RODAPÉ DO DESENVOLVEDOR (WHITE-LABEL SAAS)
       ============================================================================ */
  .developer-footer {
    text-align: center;
    padding: 20px 10px;
    font-size: 11px;
    color: var(--dynamic-text, #ffffff);
    opacity: 0.5;
    /* Discreto para não roubar a atenção do App */
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: auto;
    /* Empurra para o fundo */
    width: 100%;
    box-sizing: border-box;
    z-index: 10;
    position: relative;
  }

  .developer-footer a {
    color: var(--dynamic-prim, #FFD700);
    text-decoration: none;
    font-weight: 900;
    transition: opacity 0.2s;
  }

  .developer-footer a:hover {
    opacity: 0.8;
    text-decoration: underline;
  }

  @keyframes spin {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>

<div id="biblioteca-screen" class="library-view">
  <div class="profile-header-nav">
    <button class="btn-back-lib" onclick="fecharBiblioteca()">
      <span class="material-icons" style="font-size: 28px;">arrow_back</span>
    </button>
    <h2 style="margin:0; font-size:1.8rem; font-weight:900; color:var(--dynamic-text)">Biblioteca</h2>
  </div>

  <div id="loading-lib" style="text-align: center; margin-top: 50px;">
    <div class="lib-spinner"></div>
    <p style="color: var(--dynamic-text); opacity: 0.6; font-weight: bold; margin-top: 15px;">Carregando acervo...</p>
  </div>

  <div id="library-container" class="library-grid"></div>
</div>


<script>
  console.log("✅ [SAFE MODE] Biblioteca.html carregado e blindado (White-Label Integrado)!");

  function abrirBiblioteca() {
    try {
        const dashGrid = document.getElementById('dashboard-grid');
        const dashHeader = document.querySelector('.dashboard-header');
        const libScreen = document.getElementById('biblioteca-screen');
        
        if (dashGrid) dashGrid.style.display = 'none';
        if (dashHeader) dashHeader.style.display = 'none';
        if (libScreen) libScreen.style.display = 'block';
        
        const loading = document.getElementById('loading-lib');
        const container = document.getElementById('library-container');
        
        if (container) container.innerHTML = '';
        if (loading) loading.style.display = 'block';

        if (typeof CacheSystem !== 'undefined') {
            const cached = CacheSystem.get('biblioteca_list');
            if (cached) {
                console.log("⚡ [CACHE] Biblioteca carregada da memória.");
                renderizarBiblioteca(cached);
                return; 
            }
        }

        if (typeof google !== 'undefined' && google.script) {
            google.script.run
              .withSuccessHandler(function(livros) {
                  if (typeof CacheSystem !== 'undefined') {
                      CacheSystem.set('biblioteca_list', livros, 1440);
                  }
                  renderizarBiblioteca(livros);
              })
              .withFailureHandler(erroLib)
              .listarBiblioteca();
        } else {
            console.error("Ambiente Google Script não detectado.");
        }
    } catch (e) {
        console.error("Erro em abrirBiblioteca:", e);
    }
  }

  function renderizarBiblioteca(livros) {
    try {
        const loading = document.getElementById('loading-lib');
        if (loading) loading.style.display = 'none';
        
        const container = document.getElementById('library-container');
        if (!container) return;

        if (!livros || livros.length === 0) {
            container.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:var(--dynamic-text); opacity:0.6; font-weight:bold;">A biblioteca está sendo organizada. Volte em breve.</p>';
            return;
        }

        livros.forEach(function(livro) {
            const item = document.createElement('a');
            item.className = 'book-card';
            item.href = livro.link || '#';
            item.target = '_blank';

            let htmlImagem = '';
            if (livro.capa) {
                htmlImagem = '<img src="' + livro.capa + '" class="book-cover" onerror="this.onerror=null;this.parentNode.innerHTML=\'<div class=\\\'book-cover\\\'><span class=\\\'material-icons\\\' style=\\\'font-size: 64px;\\\'>menu_book</span></div>\'">';
            } else {
                htmlImagem = 
                    '<div class="book-cover">' +
                        '<span class="material-icons" style="font-size: 64px;">menu_book</span>' +
                    '</div>';
            }

            const titulo = livro.titulo || "Sem Título";
            const desc = livro.descricao || "";

            item.innerHTML = 
                htmlImagem +
                '<div class="book-info">' +
                    '<div class="book-title">' + titulo + '</div>' +
                    '<div class="book-desc">' + desc + '</div>' +
                    '<div class="book-action">' +
                        '<span class="material-icons" style="font-size:16px">download</span> BAIXAR' +
                    '</div>' +
                '</div>';
            
            container.appendChild(item);
        });
    } catch (e) {
        console.error("Erro em renderizarBiblioteca:", e);
    }
  }

  function erroLib(e) {
    try {
        const loading = document.getElementById('loading-lib');
        if (loading) loading.style.display = 'none';
        console.error("Erro crítico na biblioteca:", e);
        
        const container = document.getElementById('library-container');
        if(container) {
          container.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:var(--error-color, #ff5252); font-weight:bold;">Erro ao carregar livros: ${e.message}</p>`;
        }
    } catch (err) {
        console.error("Erro ao tratar falha:", err);
    }
  }

  function fecharBiblioteca() {
    try {
        const libScreen = document.getElementById('biblioteca-screen');
        const dashHeader = document.querySelector('.dashboard-header');
        const dashGrid = document.getElementById('dashboard-grid');

        if (libScreen) libScreen.style.display = 'none';
        if (dashHeader) dashHeader.style.display = 'flex';
        if (dashGrid) dashGrid.style.display = 'grid';
    } catch (e) {
        console.error("Erro em fecharBiblioteca:", e);
    }
  }
</script>
