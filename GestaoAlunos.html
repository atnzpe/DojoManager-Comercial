<style>
  /* ============================================================================
     INJEÇÃO DE CORES COM FALLBACK SEGURO
     ============================================================================ */
  :root {
    --dynamic-bg: <?=typeof bgColor !=='undefined'&& bgColor ? bgColor: '#121212'?> !important;
    --dynamic-prim: <?=typeof primaryColor !=='undefined'&& primaryColor ? primaryColor: '#FFD700'?> !important;
    --dynamic-sec: <?=typeof secondaryColor !=='undefined'&& secondaryColor ? secondaryColor: '#1e1e1e'?> !important;
    --dynamic-text: <?=typeof textColor !=='undefined'&& textColor ? textColor: '#ffffff'?> !important;
    --dynamic-btn-text: <?=typeof btnTextColor !=='undefined'&& btnTextColor ? btnTextColor: '#000000'?> !important;
  }

  /* --- ESTILOS GESTÃO DE ALUNOS (WHITE-LABEL) --- */
  .gestao-container {
    background-color: var(--dynamic-sec);
    color: var(--dynamic-text);
    font-family: 'Roboto', sans-serif;
    border-radius: 12px;
    border: 2px solid var(--dynamic-prim);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    overflow: hidden;
    min-height: 80vh;
    margin-top: 10px;
    padding: 25px;
    position: relative;
    animation: fadeIn 0.3s;
  }

  .gestao-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    border-bottom: 2px solid rgba(255, 255, 255, 0.1);
    padding-bottom: 15px;
    flex-wrap: wrap;
    gap: 15px;
  }

  .gestao-title-area {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .btn-back-gestao {
    background: transparent;
    border: 1px solid var(--dynamic-text);
    color: var(--dynamic-text);
    opacity: 0.6;
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
  }

  .btn-back-gestao:hover {
    opacity: 1;
    border-color: var(--dynamic-prim);
    color: var(--dynamic-prim);
    transform: translateX(-3px);
  }

  .gestao-title {
    font-size: 1.5rem;
    font-weight: 900;
    margin: 0;
    color: var(--dynamic-prim);
    text-transform: uppercase;
  }

  /* INPUTS */
  .gestao-input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 13px;
    background-color: #ffffff !important;
    color: #000000 !important;
    box-sizing: border-box;
  }

  /* TABELA UX/UI (ESTILO ADM.HTML) */
  .gestao-table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
  }

  .gestao-table th {
    background: #333;
    color: var(--dynamic-prim);
    text-align: left;
    padding: 15px;
    font-size: 12px;
    text-transform: uppercase;
  }

  .gestao-table td {
    padding: 15px;
    border-bottom: 1px solid #eee;
    font-size: 13px;
    vertical-align: middle;
    color: #333;
  }

  /* FISIOLOGIA VISUAL */
  .fio-stat {
    font-size: 13px;
    font-weight: 900;
    color: #0056b3;
  }

  .fio-label {
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    display: block;
  }

  .badge {
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: bold;
    text-transform: uppercase;
  }

  .badge-ativo {
    background: #e8f5e9;
    color: #2e7d32;
    border: 1px solid #4caf50;
  }

  .badge-inativo {
    background: #ffebee;
    color: #c62828;
    border: 1px solid #f44336;
  }

  .btn-yellow {
    padding: 10px 16px;
    background-color: var(--dynamic-prim) !important;
    color: var(--dynamic-btn-text) !important;
    border: none;
    border-radius: 8px;
    font-weight: 900;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    text-transform: uppercase;
  }

  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100000;
    backdrop-filter: blur(3px);
  }

  .modal-box {
    background: #f8f9fa;
    padding: 30px;
    border-radius: 12px;
    width: 800px;
    max-width: 95%;
    border: 3px solid var(--dynamic-prim);
    max-height: 90vh;
    overflow-y: auto;
    color: #333;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .spin {
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }
</style>

<div id="gestao-alunos-view" style="display:none;">
  <div class="gestao-container">
    <div class="gestao-header">
      <div class="gestao-title-area">
        <button class="btn-back-gestao" onclick="fecharGestaoAlunos()">
          <span class="material-icons" style="font-size: 28px;">arrow_back</span>
        </button>
        <h2 class="gestao-title">Gestão de Alunos</h2>
      </div>
      <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button class="btn-yellow" onclick="GestaoAlunosApp.inicializar()">
          <span class="material-icons">refresh</span> Atualizar
        </button>
        <button class="btn-yellow" onclick="GestaoAlunosApp.abrirModalNovo()">
          <span class="material-icons">add</span> Novo Aluno
        </button>
      </div>
    </div>

    <div class="gestao-toolbar">
      <input type="text" id="filtro-alunos" class="gestao-input" placeholder="🔍 Buscar por nome, login ou CPF..." onkeyup="GestaoAlunosApp.filtrar()">
    </div>

    <div style="overflow-x:auto;">
      <table class="gestao-table">
        <thead>
          <tr>
            <th>Aluno / Login</th>
            <th>Fisiologia / Stats</th>
            <th>Graduação / Modalidade</th>
            <th>Acesso / Aulas</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody id="tabela-alunos-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="modal-editar-aluno" class="modal-overlay">
  <div class="modal-box">
    <div
      style="display:flex; justify-content:space-between; align-items:center; border-bottom:3px solid var(--dynamic-prim); padding-bottom:15px; margin-bottom:20px;">
      <h3 style="margin:0; color:#333; font-weight:900;" id="titulo-modal-gestao">Editar Aluno</h3>
      <button onclick="GestaoAlunosApp.fecharModal()" style="background:none; border:none; cursor:pointer; font-size:24px; color:#ff5252;">✕</button>
    </div>
    <form id="form-gestao-aluno" onsubmit="event.preventDefault(); GestaoAlunosApp.salvarEdicao();">
      <input type="hidden" id="ga-id">
      <div class="form-grid">
        <div>
          <label class="form-label">NOME COMPLETO*</label><input type="text" id="ga-nome" class="gestao-input" required>
          <label class="form-label">CPF</label><input type="text" id="ga-cpf" class="gestao-input">
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label class="form-label">PESO (KG)</label><input type="number" step="0.1" id="ga-peso" class="gestao-input">
            </div>
            <div><label class="form-label">ALTURA (M)</label><input type="number" step="0.01" id="ga-altura" class="gestao-input">
            </div>
          </div>
          <label class="form-label">DATA NASCIMENTO</label><input type="date" id="ga-nasc" class="gestao-input">
        </div>
        <div>
          <label class="form-label">LOGIN*</label><input type="text" id="ga-login" class="gestao-input" required>
          <label class="form-label">SENHA*</label><input type="text" id="ga-senha" class="gestao-input" required>
          <label class="form-label">ACADEMIA</label><select id="ga-acad" class="gestao-input"></select>
          <label class="form-label">GRADUAÇÃO</label><select id="ga-grad" class="gestao-input"></select>
        </div>
      </div>
      <button type="submit" class="btn-yellow" style="width:100%; padding:15px;"><span class="material-icons">save</span> SALVAR DADOS</button>
    </form>
  </div>
</div>

<script>
  const GestaoAlunosApp = {
      cacheLista: [],
      cacheAcademias: [],
      cacheGraduacoes: [],

      inicializar: function() {
          const tbody = document.getElementById('tabela-alunos-body');
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px;"><span class="material-icons spin" style="font-size:40px; color:var(--dynamic-prim)">sync</span></td></tr>';

          google.script.run.withSuccessHandler(academias => {
              this.cacheAcademias = academias;
              google.script.run.withSuccessHandler(graduacoes => {
                  this.cacheGraduacoes = graduacoes;
                  this.carregarDadosServidor();
              }).getListaGraduacoes();
          }).getListaAcademias();
      },

      carregarDadosServidor: function() {
          google.script.run.withSuccessHandler(lista => {
               this.cacheLista = lista;
               this.renderizarTabela(lista);
          }).listarAlunosAdmin();
      },

      renderizarTabela: function(lista) {
          const tbody = document.getElementById('tabela-alunos-body');
          tbody.innerHTML = lista.map(a => {
            const statusClass = (String(a.status).toLowerCase() === 'ativo') ? 'badge-ativo' : 'badge-inativo';
            const dataInicio = a.carimbo ? String(a.carimbo).split(' ')[0] : '--';
            
            return `
                <tr>
                    <td><b>${a.nome || '---'}</b><br><small>Login: ${a.login}</small></td>
                    <td>
                        <span class="fio-label">Idade: ${a.idadeExata || '--'}</span>
                        <span class="fio-stat">${a.peso || '--'}kg | ${a.altura || '--'}m</span>
                    </td>
                    <td><b>${a.graduacao}</b><br><small>${a.modalidade}</small></td>
                    <td>
                        <span class="badge ${statusClass}">${a.status}</span><br>
                        <span style="font-size:11px; color:#0056b3; font-weight:900;">Aulas: ${a.totalAulas}</span><br>
                        <small style="font-size:9px; color:#999;">Início: ${dataInicio}</small>
                    </td>
                    <td>
                        <button class="btn-yellow" style="padding:8px;" onclick="GestaoAlunosApp.prepararEdicao(${a.id})">
                            <span class="material-icons">edit</span>
                        </button>
                    </td>
                </tr>`;
          }).join('');
      },

      filtrar: function() {
          const termo = document.getElementById('filtro-alunos').value.toLowerCase();
          const filtrados = this.cacheLista.filter(a => 
              String(a.nome).toLowerCase().includes(termo) || String(a.login).toLowerCase().includes(termo)
          );
          this.renderizarTabela(filtrados);
      },

      prepararEdicao: function(idLinha) {
          const a = this.cacheLista.find(x => x.id === idLinha);
          if(!a) return;
          const dF = (v) => (v && v.includes('/')) ? v.split('/').reverse().join('-') : v;

          document.getElementById('ga-id').value = a.id;
          document.getElementById('ga-nome').value = a.nome;
          document.getElementById('ga-login').value = a.login;
          document.getElementById('ga-senha').value = a.senha;
          document.getElementById('ga-peso').value = a.peso;
          document.getElementById('ga-altura').value = a.altura;
          document.getElementById('ga-nasc').value = dF(a.nasc);

          this.popularSelects(a.academia, a.graduacao);
          document.getElementById('modal-editar-aluno').style.display = 'flex';
      },

      popularSelects: function(acad, grad) {
          const sA = document.getElementById('ga-acad');
          const sG = document.getElementById('ga-grad');
          sA.innerHTML = this.cacheAcademias.map(x => `<option value="${x}" ${x===acad?'selected':''}>${x}</option>`).join('');
          sG.innerHTML = this.cacheGraduacoes.map(x => `<option value="${x}" ${x===grad?'selected':''}>${x}</option>`).join('');
      },

      fecharModal: function() { document.getElementById('modal-editar-aluno').style.display = 'none'; },
      
      salvarEdicao: function() {
          const btn = document.querySelector('#form-gestao-aluno button[type="submit"]');
          btn.disabled = true; btn.innerHTML = "SALVANDO...";
          
          const form = {
              aluno_id: document.getElementById('ga-id').value,
              aluno_nome: document.getElementById('ga-nome').value,
              aluno_login: document.getElementById('ga-login').value,
              aluno_senha: document.getElementById('ga-senha').value,
              aluno_peso: document.getElementById('ga-peso').value,
              aluno_altura: document.getElementById('ga-altura').value,
              aluno_acad: document.getElementById('ga-acad').value,
              aluno_grad: document.getElementById('ga-grad').value
          };

          google.script.run.withSuccessHandler(res => {
              alert(res); this.fecharModal(); this.inicializar();
          }).salvarAluno(form);
      }
  };

  function abrirGestaoAlunos() {
    document.getElementById('dashboard-grid').style.display = 'none';
    document.getElementById('gestao-alunos-view').style.display = 'block';
    GestaoAlunosApp.inicializar();
  }
  function fecharGestaoAlunos() {
    document.getElementById('gestao-alunos-view').style.display = 'none';
    document.getElementById('dashboard-grid').style.display = 'grid';
  }
</script>
