<style>
  .chamada-wrapper {
    padding: 20px;
    text-align: center;
    color: var(--dynamic-text);
    max-width: 600px;
    margin: 0 auto;
    background-color: var(--dynamic-sec);
    border-radius: 12px;
    min-height: 400px;
    border: 2px solid var(--dynamic-prim);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    position: relative;
    animation: fadeIn 0.4s ease-out;
  }

  .profile-header-nav {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
  }

  .btn-back-inst {
    background: transparent;
    border: 1px solid var(--dynamic-text);
    color: var(--dynamic-text);
    opacity: 0.6;
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
  }

  .btn-back-inst:hover {
    opacity: 1;
    border-color: var(--dynamic-prim);
    color: var(--dynamic-prim);
    transform: translateX(-3px);
  }

  .inst-tabs {
    display: flex;
    background: rgba(0, 0, 0, 0.4);
    border-radius: 12px;
    padding: 6px;
    margin-bottom: 25px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .inst-tab {
    flex: 1;
    text-align: center;
    padding: 12px;
    cursor: pointer;
    color: var(--dynamic-text);
    opacity: 0.5;
    font-weight: 900;
    border-radius: 8px;
    transition: 0.3s;
    font-size: 0.95rem;
    text-transform: uppercase;
  }

  .inst-tab.active {
    background: var(--dynamic-prim) !important;
    color: var(--dynamic-btn-text) !important;
    opacity: 1;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
  }

  .call-grid,
  .filter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    background: rgba(0, 0, 0, 0.2);
    padding: 20px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    margin-bottom: 20px;
  }

  .full-col {
    grid-column: 1 / -1;
  }

  .inst-input {
    width: 100%;
    background: rgba(0, 0, 0, 0.3) !important;
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: var(--dynamic-text) !important;
    padding: 12px;
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 1rem;
    transition: 0.3s;
  }

  .inst-input:focus {
    border-color: var(--dynamic-prim);
    outline: none;
    background: rgba(0, 0, 0, 0.6) !important;
  }

  .adm-label {
    font-size: 11px;
    font-weight: 900;
    color: #FFD700 !important;
    opacity: 1;
    margin-bottom: 5px;
    display: block;
    text-transform: uppercase;
  }

  .hist-date {
    color: #FFD700 !important;
    font-weight: 900;
    font-size: 1rem;
  }

  .pin-box {
    font-size: 4.5rem;
    font-weight: 900;
    color: var(--dynamic-prim);
    border: 4px dashed var(--dynamic-prim);
    padding: 20px;
    border-radius: 16px;
    margin: 20px 0;
    background: rgba(255, 255, 255, 0.05);
    text-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
    letter-spacing: 5px;
  }

  .grid-alunos {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 15px;
    max-height: 400px;
    overflow-y: auto;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    padding-top: 10px;
    text-align: left;
  }

  .grid-alunos::-webkit-scrollbar {
    width: 6px;
  }

  .grid-alunos::-webkit-scrollbar-thumb {
    background: var(--dynamic-prim);
    border-radius: 10px;
  }

  .card-aluno {
    background: rgba(0, 0, 0, 0.3);
    padding: 12px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-left: 5px solid rgba(255, 255, 255, 0.2);
    animation: slideIn 0.3s;
    transition: all 0.3s ease;
  }

  .card-aluno.status-ok {
    border-left-color: #4caf50;
    background: rgba(76, 175, 80, 0.1);
  }

  .card-aluno.status-vis {
    border-left-color: #2196f3;
  }

  .info-flex {
    display: flex;
    align-items: center;
    gap: 15px;
    text-align: left;
  }

  .foto-perfil {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--dynamic-prim);
  }

  .btn-acao {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 18px;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
  }

  .btn-acao:active {
    transform: scale(0.85);
    box-shadow: none;
  }

  .cor-sim {
    background: #4caf50;
    color: white;
  }

  .cor-nao {
    background: #f44336;
    color: white;
  }

  .cor-gold {
    background-color: var(--dynamic-prim) !important;
    color: var(--dynamic-btn-text) !important;
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    font-weight: 900;
    cursor: pointer;
    border: none;
    font-size: 1rem;
    text-transform: uppercase;
    transition: 0.2s;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
  }

  .cor-gold:hover {
    filter: brightness(1.15);
    transform: translateY(-2px);
  }

  .btn-manual-add {
    background: transparent;
    color: var(--dynamic-text);
    border: 1px solid var(--dynamic-text);
    padding: 8px 15px;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 10px;
    opacity: 0.8;
    transition: 0.2s;
  }

  .btn-manual-add:hover {
    background: var(--dynamic-prim);
    color: var(--dynamic-btn-text);
    border-color: var(--dynamic-prim);
    opacity: 1;
  }

  .badge-data {
    background-color: rgba(255, 255, 255, 0.1);
    color: var(--dynamic-prim);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.7rem;
    margin-left: 5px;
    font-weight: normal;
  }

  #modal-manual {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    z-index: 100000;
    display: none;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(3px);
  }

  .modal-box-chamada {
    background-color: var(--dynamic-sec);
    padding: 25px;
    border-radius: 12px;
    width: 90%;
    max-width: 400px;
    border: 2px solid var(--dynamic-prim);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
  }

  .lista-busca {
    max-height: 250px;
    overflow-y: auto;
    margin-top: 15px;
    text-align: left;
  }

  .lista-busca::-webkit-scrollbar {
    width: 6px;
  }

  .lista-busca::-webkit-scrollbar-thumb {
    background: var(--dynamic-prim);
    border-radius: 10px;
  }

  .item-busca {
    padding: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.2s;
    border-radius: 6px;
  }

  .item-busca:hover {
    background: rgba(0, 0, 0, 0.4);
  }

  #toast-box {
    visibility: hidden;
    min-width: 250px;
    background-color: var(--dynamic-sec);
    color: var(--dynamic-text);
    text-align: center;
    border-radius: 50px;
    padding: 16px;
    position: fixed;
    z-index: 110000;
    left: 50%;
    bottom: 30px;
    transform: translateX(-50%);
    font-size: 14px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.1);
    opacity: 0;
    transition: opacity 0.5s, bottom 0.5s;
    font-weight: 900;
  }

  #toast-box.show {
    visibility: visible;
    opacity: 1;
    bottom: 50px;
  }

  .aula-card-aux {
    background: rgba(0, 0, 0, 0.3);
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: 0.2s;
    text-align: left;
  }

  .aula-card-aux:hover {
    border-color: var(--dynamic-prim);
    transform: translateY(-2px);
  }

  .hist-item {
    background: rgba(0, 0, 0, 0.3);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 15px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-align: left;
  }

  .hist-item:hover {
    border-color: var(--dynamic-prim);
    transform: translateY(-2px);
  }

  .hist-info {
    flex: 1;
  }

  .hist-local {
    color: var(--dynamic-text);
    margin: 4px 0;
    font-size: 0.95rem;
    font-weight: bold;
  }

  .hist-detail {
    color: var(--dynamic-text);
    opacity: 0.6;
    font-size: 0.85rem;
  }

  .btn-pdf-mini {
    background: rgba(0, 0, 0, 0.4);
    color: var(--dynamic-text);
    border: 2px solid var(--dynamic-prim);
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: bold;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: 0.2s;
  }

  .btn-pdf-mini:hover {
    background: var(--dynamic-prim);
    color: var(--dynamic-btn-text);
  }

  .adm-btn {
    padding: 14px;
    background-color: var(--dynamic-prim) !important;
    color: var(--dynamic-btn-text) !important;
    border: none;
    border-radius: 8px;
    font-weight: 900;
    cursor: pointer;
    text-transform: uppercase;
    font-size: 12px;
    transition: 0.2s;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
  }

  .adm-btn:hover {
    filter: brightness(1.15);
    transform: translateY(-2px);
  }

  .tag-conteudo {
    background: var(--dynamic-prim);
    color: var(--dynamic-btn-text);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 900;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
    margin-top: 5px;
  }

  .tag-conteudo .close-tag {
    cursor: pointer;
    font-size: 14px;
    opacity: 0.7;
    transition: 0.2s;
  }

  .tag-conteudo .close-tag:hover {
    opacity: 1;
    transform: scale(1.2);
  }

  @keyframes slideIn {
    from {
      transform: translateY(10px);
      opacity: 0;
    }

    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }

    to {
      opacity: 1;
    }
  }
</style>

<div id="screen-chamada-final" class="chamada-wrapper" style="display:none">

  <div id="modal-manual">

<script>
  if (!window.chamadaScriptBlindado) {
      window.chamadaScriptBlindado = true;
      console.log("✅ [SAFE MODE] ChamadaDinamica.html (CASCATA UX/UI Integrada)");
  }

  window.logApp = function(msg, data) { console.log("📍 [SISTEMA] " + msg, data || ""); };
  window.errApp = function(msg, err) { console.error("🚨 [ERRO CRÍTICO] " + msg, err); window.showToast("Erro: " + msg, "erro"); };

  window._prodAulaId = localStorage.getItem('activeAulaId') || null; 
  window._prodPin = localStorage.getItem('activeAulaPin') || null;
  window._prodTimer = null; 
  window._prodCache = [];
  window._prodConfirmadosLocal = {}; 
  window._prodDataAula = ""; 
  window._buscaTimer = null; 
  window._todasTurmasHistDinCache = [];
  
  window.esc = str => String(str).replace(/</g, "&lt;").replace(/>/g, "&gt;");

  window.showToast = function(msg, tipo='info') {
      var x = document.getElementById("toast-box"); if(!x) return;
      x.innerText = msg; x.style.borderLeft = tipo === 'erro' ? "5px solid #f44336" : "5px solid #4caf50"; x.className = "show";
      setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
  };

  window.initChamadaDinamica = function(modo) {
      window.logApp("Iniciando Tela. Modo: " + modo);
      document.getElementById('dashboard-grid').style.display = 'none';
      document.querySelector('.dashboard-header').style.display = 'none';
      const widgetHoje = document.getElementById('widget-treino-hoje'); if(widgetHoje) widgetHoje.style.display = 'none';
      
      var main = document.getElementById('main-content');
      var screen = document.getElementById('screen-chamada-final');
      if(screen.parentElement !== main) main.appendChild(screen);
      screen.style.display = 'block';

      ['painel-aluno','painel-instrutor-menu','painel-instrutor-live'].forEach(function(id){ const el = document.getElementById(id); if (el) el.style.display = 'none'; });

      var user = JSON.parse(localStorage.getItem('userSession'));

  window.processarPollingFinal = function() {
      if (!window._prodAulaId) return;
      google.script.run.withSuccessHandler(function(res) {
          document.getElementById('status-conexao').innerText = "● Sincronizado"; document.getElementById('status-conexao').style.color = "#4caf50";
          if (!res.success || res.status === "ENCERRADA") {
              window.logApp("Aula foi encerrada por outra tela.");
              clearInterval(window._prodTimer); 
              localStorage.removeItem('activeAulaId');
              localStorage.removeItem('activeAulaPin');
              window.showToast("Esta aula foi encerrada no servidor.", "info");
              setTimeout(window.voltarParaMenuInstrutor, 2000); return;
          }
          if (res.checkins) {
              let listaMesclada = res.checkins.map(function(a) { if (window._prodConfirmadosLocal[a.login]) a.status = 'Confirmado'; return a; });
              window.desenharListaFinal(listaMesclada);
          }
      }).withFailureHandler(function(err) {
          window.logApp("Falha no Sincronismo da Sala", err);
          document.getElementById('status-conexao').innerText = "⚠ Falha na Conexão. Tentando..."; document.getElementById('status-conexao').style.color = "#f44336";
      }).buscarCheckinsAula(window._prodAulaId);

  window.desenharListaFinal = function(lista) {
      window._prodCache = lista || [];
      var container = document.getElementById('container-lista-live');
      document.getElementById('contador-live').innerText = window._prodCache.length;
      container.innerHTML = "";

      if (window._prodCache.length === 0) {
          container.innerHTML = "<div style='padding:40px 20px; text-align:center; color:var(--dynamic-text); opacity:0.5; display:flex; flex-direction:column; align-items:center;'><span class='material-icons' style='font-size:48px; margin-bottom:10px;'>qr_code_scanner</span><p style='margin:0; font-size:1rem; font-weight:bold;'>Sala vazia</p><p style='margin:5px 0 0; font-size:0.8rem;'>Alunos devem digitar o PIN de 4 dígitos no app.</p></div>";
          return;
      }
      window._prodCache.sort(function(a,b) { return (a.status === 'Confirmado' ? 1 : -1); });

      window._prodCache.forEach(function(aluno) {
          var div = document.createElement('div');
          var confirmado = aluno.status === 'Confirmado';
          div.className = "card-aluno " + (confirmado ? 'status-ok' : 'status-vis');
          var img = (aluno.foto && aluno.foto.length > 5) ? aluno.foto : 'https://via.placeholder.com/50';

          var statusHtml = !confirmado ? 
              "<button class='btn-acao cor-nao' onclick=\"window.acaoRecusarFinal('" + window.esc(aluno.login) + "')\">✕</button><button class='btn-acao cor-sim' onclick=\"window.acaoAceitarFinal('" + window.esc(aluno.login) + "')\">✓</button>" : 
              "<span class='material-icons' style='color:#4caf50; font-size:32px;'>verified</span>";

          let tagCor = "#666"; let idadeTexto = aluno.idade || "?"; let categoria = aluno.categoria || "N/A";
          if(categoria === "Infantil") tagCor = "#ff9800"; else if(categoria === "Adulto") tagCor = "#2196f3"; else if(categoria === "Visitante") tagCor = "#9c27b0"; else if(aluno.tipo === "Visitante") { categoria = "Externo"; tagCor = "#9c27b0"; } 
          
          const badgeIdade = `<span style="background-color:${tagCor}; color:white; padding:2px 6px; border-radius:4px; font-size:0.65rem; font-weight:900; margin-left:8px; text-transform:uppercase; letter-spacing:1px; box-shadow:0 2px 5px rgba(0,0,0,0.3);">[${categoria} - ${idadeTexto} Anos]</span>`;

          div.innerHTML = "<div class='info-flex'><img src='" + img + "' class='foto-perfil'><div><div style='font-weight:900; color:var(--dynamic-text); font-size:1rem; display:flex; align-items:center;'>" + window.esc(aluno.nome) + badgeIdade + "</div><div style='font-size:0.8rem; color:var(--dynamic-text); opacity:0.7; margin-top:3px;'>" + window.esc(aluno.graduacao) + " • " + (aluno.hora || '--:--') + " <span class='badge-data'>" + window._prodDataAula + "</span></div></div></div><div style='display:flex; gap:10px;'>" + statusHtml + "</div>";
          container.appendChild(div);
      });
  };

  window.acaoAceitarFinal = function(login) {
      window._prodConfirmadosLocal[login] = true;

        turma: document.getElementById('hd-turma').value, 
        aluno: document.getElementById('hd-aluno').value,
        instrutor: user.LOGIN 
    };
    
    google.script.run.withSuccessHandler(function(lista) {
        div.innerHTML = "";
        window.logApp("Histórico Carregado:", lista);
        if(!lista || lista.length === 0) { 
            div.innerHTML = "<p style='text-align:center; color:var(--dynamic-text); opacity:0.5; font-weight:bold; margin-top:20px;'>Nenhum registro encontrado no período.</p>"; 
            return; 
        }
        lista.forEach(function(h) {
            let horaLimpa = h.hora;
            if(horaLimpa.includes("Sat") || horaLimpa.includes("Sun") || horaLimpa.includes("Mon")) horaLimpa = "--:--";

            div.innerHTML += "<div class='hist-item'><div class='hist-info'><div class='hist-date' style='color:#FFD700'>" + h.data + " - " + horaLimpa + "</div><div class='hist-local'>" + window.esc(h.local) + "</div><div class='hist-detail'>" + window.esc(h.instrutor) + " • <b>" + h.qtd + " Alunos Presentes</b></div></div><div class='btn-pdf-mini' onclick=\"window.gerarRelatorioPDF('" + h.id + "')\"><span class='material-icons' style='font-size:24px;'>picture_as_pdf</span> GERAR PDF</div></div>";
        });
    }).withFailureHandler(function(err){
        window.errApp("Falha no Histórico", err);
        div.innerHTML = "<p style='color:#f44336; font-weight:bold;'>Erro ao buscar: "+err.message+"</p>";
    }).getHistoricoFiltrado(filtros);
  };

  window.gerarRelatorioPDF = function(idChamada) {
    window.showToast("Preparando PDF...", "info");
    google.script.run.withSuccessHandler(function(data) {
        if(!data) { alert("Falha ao carregar."); return; }
        
        let horaLimpa = data.hora;
        if(horaLimpa.includes("Sat") || horaLimpa.includes("Sun") || horaLimpa.includes("Mon")) horaLimpa = "--:--";

        document.getElementById('r-data').innerText = data.data; 
        document.getElementById('r-hora').innerText = horaLimpa; 
        document.getElementById('r-local').innerText = data.local; 
        document.getElementById('r-inst').innerText = data.instrutor; 
        document.getElementById('r-id').innerText = data.id; 
        const rCont = document.getElementById('r-conteudo'); if(rCont) rCont.innerText = data.conteudo || "Conteúdo não especificado."; 
        document.getElementById('r-gerado').innerText = new Date().toLocaleString();
        const tbody = document.getElementById('r-lista-body');
        if(tbody) { 
            tbody.innerHTML = ""; const nomes = data.listaNomes ? data.listaNomes.split(",") : []; 
            nomes.forEach(function(nome, idx) { tbody.innerHTML += "<tr><td>" + (idx+1) + "</td><td>" + window.esc(nome.trim()) + "</td><td></td></tr>"; }); 
        }
        document.getElementById('modal-relatorio').style.display = 'flex';
        window.showToast("PDF Gerado!", "sucesso");
    }).getDetalhesChamada(idChamada);
  };

  window.carregarAlunoFinal = function(user) {
      const div = document.getElementById('feed-aulas-aluno');
      div.innerHTML = "<div style='color:var(--dynamic-text); opacity:0.6; text-align:center;'>Procurando aulas...</div>";
      google.script.run.withSuccessHandler(function(aulas) {
          div.innerHTML = "";
          if(aulas.length === 0) div.innerHTML = "<div style='padding:20px; border:1px dashed rgba(255,255,255,0.2); border-radius:8px; color:var(--dynamic-text); opacity:0.6; text-align:center;'>Nenhuma sala aberta para a sua academia. Aguarde o instrutor liberar o PIN.</div>";
          aulas.forEach(function(a) { div.innerHTML += "<div class='aula-card-aux' onclick=\"window.preencherPinFinal('" + a.pin + "')\"><div><h4 style='color:var(--dynamic-prim); margin:0 0 5px 0; font-weight:900;'>" + window.esc(a.instrutor) + "</h4><small style='color:var(--dynamic-text); opacity:0.7;'>📍 " + window.esc(a.academia) + " | 🥋 " + window.esc(a.turma) + " | ⏰ " + a.horario + "</small></div><div style='background:var(--dynamic-sec); border:1px solid var(--dynamic-prim); color:var(--dynamic-prim); padding:8px 12px; border-radius:6px; font-size:0.75rem; font-weight:bold;'>Tocar</div></div>"; });
      }).withFailureHandler(err => window.errApp("Erro ao buscar aulas", err)).buscarAulasDisponiveisAluno(user.academia);
  };
  
  window.preencherPinFinal = function(pin) { const input = document.getElementById('input-pin-aluno'); input.value = pin; input.focus(); };
  
  window.executarCheckinFinal = function() {
      const pin = document.getElementById('input-pin-aluno').value;
      if(!pin || pin.length < 4) { window.showToast("Digite o PIN de 4 dígitos.", "erro"); return; }
      const user = JSON.parse(localStorage.getItem('userSession'));
      const feedback = document.getElementById('feedback-aluno');
      feedback.innerText = "Processando código..."; feedback.style.color = "var(--dynamic-prim)";
      const btnOk = document.querySelector('#painel-aluno .cor-gold'); btnOk.disabled = true;
      google.script.run.withSuccessHandler(function(res) {
          feedback.innerText = res.msg; feedback.style.color = res.success ? "#4caf50" : "#f44336"; btnOk.disabled = false;
          if(res.success) { window.showToast("PRESENÇA CONFIRMADA!", "sucesso"); document.getElementById('input-pin-aluno').value = ""; }
      }).withFailureHandler(function(err) { feedback.innerText = "Erro no servidor."; feedback.style.color = "#f44336"; btnOk.disabled = false; }).realizarCheckinAluno(user.LOGIN, pin);
  };
</script>
