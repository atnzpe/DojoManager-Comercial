<style>
  /* --- ESTILOS VISUAIS (V6 - WHITE-LABEL INTEGRADO) --- */
  .chamada-wrapper {
    padding: 20px;
    text-align: center;
    color: var(--dynamic-text);
    max-width: 600px;
    margin: 0 auto;
    background-color: var(--dynamic-sec);
    border-radius: 12px;
    min-height: 400px;
    border: 2px solid var(--dynamic-prim);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    position: relative;
    animation: fadeIn 0.4s ease-out;
  }

  .pin-box {
    font-size: 4.5rem;
    font-weight: 900;
    color: var(--dynamic-prim);
    border: 4px dashed var(--dynamic-prim);
    padding: 20px;
    border-radius: 16px;
    margin: 20px 0;
    background: rgba(255, 255, 255, 0.05);
    text-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
    letter-spacing: 5px;
  }

  .grid-alunos {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 15px;
    max-height: 400px;
    overflow-y: auto;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    padding-top: 10px;
  }

  .grid-alunos::-webkit-scrollbar {
    width: 6px;
  }

  .grid-alunos::-webkit-scrollbar-thumb {
    background: var(--dynamic-prim);
    border-radius: 10px;
  }

  .card-aluno {
    background: rgba(0, 0, 0, 0.3);
    padding: 12px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-left: 5px solid rgba(255, 255, 255, 0.2);
    animation: slideIn 0.3s;
    transition: all 0.3s ease;
  }

  .card-aluno.status-ok {
    border-left-color: #4caf50;
    background: rgba(76, 175, 80, 0.1);
  }

  .card-aluno.status-vis {
    border-left-color: #2196f3;
  }

  .info-flex {
    display: flex;
    align-items: center;
    gap: 15px;
    text-align: left;
  }

  .foto-perfil {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--dynamic-prim);
  }

  .btn-acao {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 18px;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
  }

  .btn-acao:active {
    transform: scale(0.85);
    box-shadow: none;
  }

  .cor-sim {
    background: #4caf50;
    color: white;
  }

  .cor-nao {
    background: #f44336;
    color: white;
  }

  .cor-gold {
    background-color: var(--dynamic-prim) !important;
    color: var(--dynamic-btn-text) !important;
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    font-weight: 900;
    cursor: pointer;
    border: none;
    font-size: 1rem;
    text-transform: uppercase;
    transition: 0.2s;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
  }

  .cor-gold:hover {
    filter: brightness(1.15);
    transform: translateY(-2px);
  }

  .btn-manual-add {
    background: transparent;
    color: var(--dynamic-text);
    border: 1px solid var(--dynamic-text);
    padding: 8px 15px;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 10px;
    opacity: 0.8;
    transition: 0.2s;
  }

  .btn-manual-add:hover {
    background: var(--dynamic-prim);
    color: var(--dynamic-btn-text);
    border-color: var(--dynamic-prim);
    opacity: 1;
  }

  .input-std {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(0, 0, 0, 0.3) !important;
    color: var(--dynamic-text) !important;
    box-sizing: border-box;
    font-size: 1rem;
    transition: 0.3s;
  }

  .input-std:focus {
    border-color: var(--dynamic-prim);
    outline: none;
    background: rgba(0, 0, 0, 0.6) !important;
  }

  .badge-data {
    background-color: rgba(255, 255, 255, 0.1);
    color: var(--dynamic-prim);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.7rem;
    margin-left: 5px;
    font-weight: normal;
  }

  #modal-manual {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    z-index: 100000;
    display: none;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(3px);
  }

  .modal-box-chamada {
    background-color: var(--dynamic-sec);
    padding: 25px;
    border-radius: 12px;
    width: 90%;
    max-width: 400px;
    border: 2px solid var(--dynamic-prim);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
  }

  .lista-busca {
    max-height: 250px;
    overflow-y: auto;
    margin-top: 15px;
  }

  .lista-busca::-webkit-scrollbar {
    width: 6px;
  }

  .lista-busca::-webkit-scrollbar-thumb {
    background: var(--dynamic-prim);
    border-radius: 10px;
  }

  .item-busca {
    padding: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.2s;
    border-radius: 6px;
  }

  .item-busca:hover {
    background: rgba(0, 0, 0, 0.4);
  }

  #toast-box {
    visibility: hidden;
    min-width: 250px;
    background-color: var(--dynamic-sec);
    color: var(--dynamic-text);
    text-align: center;
    border-radius: 50px;
    padding: 16px;
    position: fixed;
    z-index: 110000;
    left: 50%;
    bottom: 30px;
    transform: translateX(-50%);
    font-size: 14px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.1);
    opacity: 0;
    transition: opacity 0.5s, bottom 0.5s;
    font-weight: 900;
  }

  #toast-box.show {
    visibility: visible;
    opacity: 1;
    bottom: 50px;
  }

  .aula-card-aux {
    background: rgba(0, 0, 0, 0.3);
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: 0.2s;
  }

  .aula-card-aux:hover {
    border-color: var(--dynamic-prim);
    transform: translateY(-2px);
  }

  @keyframes slideIn {
    from {
      transform: translateY(10px);
      opacity: 0;
    }

    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }

    to {
      opacity: 1;
    }
  }
</style>

<div id="screen-chamada-final" class="chamada-wrapper" style="display:none">
  <div id="toast-box">Notificação</div>

  <div id="modal-manual">
    <div class="modal-box-chamada">
      <h3 style="margin-top:0; color:var(--dynamic-prim); font-weight:900;">Adicionar Aluno</h3>
      <input type="text" id="busca-aluno-input" class="input-std" placeholder="Digite o nome..." onkeyup="buscarAlunoDelay()">
      <div id="resultado-busca" class="lista-busca"></div>
      <button onclick="fecharModalManual()" style="width:100%; padding:12px; margin-top:15px; background:transparent; border:1px solid rgba(255,255,255,0.3); color:var(--dynamic-text); border-radius:8px; cursor:pointer; font-weight:bold; transition:0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">Fechar Cancelar</button>
    </div>
  </div>

  <div id="painel-aluno" style="display:none">
    <h2 style="color: var(--dynamic-prim); font-weight:900; text-transform:uppercase;">Check-in de Aula</h2>
    <div id="feed-aulas-aluno" style="margin-bottom: 25px; max-height:200px; overflow-y:auto;">Carregando...</div>
    <div style="display:flex; gap:10px;">
      <input type="number" id="input-pin-aluno" class="input-std" placeholder="Digite o PIN de 4 dígitos" style="font-size:1.2rem; text-align:center; font-weight:bold; letter-spacing:3px;">
      <button onclick="executarCheckinFinal()" class="cor-gold" style="width:100px;">OK</button>
    </div>
    <p id="feedback-aluno" style="margin-top:15px; font-weight:bold; min-height: 20px;"></p>
    <button onclick="voltarDashFinal()" style="background:none; border:none; color:var(--dynamic-text); opacity:0.6; margin-top:20px; text-decoration:underline; cursor:pointer">Voltar ao Início</button>
  </div>

  <div id="painel-instrutor-live" style="display:none">
    <h3
      style="color:var(--dynamic-text); opacity:0.6; margin:0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;">
      Código de Acesso</h3>
    <div id="box-pin-live" class="pin-box">----</div>

    <div
      style="display:flex; justify-content:space-between; align-items:center; margin-top:10px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">
      <div style="text-align:left;">
        <span style="color:var(--dynamic-text); opacity:0.7; font-size:0.9rem;">Alunos na sala:</span>
        <b id="contador-live" style="color:var(--dynamic-text); font-size:1.6rem; margin-left: 5px;">0</b>
      </div>
      <button onclick="abrirModalManual()" class="btn-manual-add">
          <span class="material-icons" style="font-size:16px">person_add</span> Manual
      </button>
    </div>

    <div id="status-conexao"
      style="font-size:0.75rem; color:#4caf50; font-weight:bold; text-align:left; margin-top:10px;">● Sincronizado</div>

    <div id="container-lista-live" class="grid-alunos">
      <div style="padding:40px; color:var(--dynamic-text); opacity:0.5; font-style: italic;">Aguardando alunos
        conectarem...</div>
    </div>

    <div style="margin-top: 25px;">
      <button onclick="acaoFinalizarFinal()" class="cor-gold" style="background-color: #4caf50 !important; color: #fff !important; margin-bottom:15px;">
        <span class="material-icons" style="vertical-align:middle; margin-right:5px;">check_circle</span> FINALIZAR AULA
      </button>
      <button onclick="voltarDashFinal()" style="background:none; border:none; color:var(--dynamic-prim); text-decoration:underline; font-weight:bold; cursor:pointer;">Sair (Manter Aula Rodando)</button>
    </div>
  </div>

  <div id="painel-menu" style="display:none">
    <h2 style="color:var(--dynamic-text); font-weight:900;">Minhas Aulas</h2>
    <button onclick="irParaCriarFinal()" class="cor-gold" style="margin-bottom:25px;">+ CRIAR NOVA AULA</button>
    <div id="feed-aulas-instrutor" style="max-height: 250px; overflow-y:auto;">Buscando...</div>
    <button onclick="voltarDashFinal()" style="background:none; color:var(--dynamic-text); opacity:0.6; margin-top:20px; border:none; cursor:pointer; text-decoration:underline;">Voltar ao Dashboard</button>
  </div>

  <div id="painel-criar" style="display:none; text-align:left;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h3 style="color:var(--dynamic-prim); margin:0; font-weight:900;">Nova Aula</h3>
      <button onclick="voltarDashFinal()" style="background:none; border:none; color:var(--dynamic-text); cursor:pointer;"><span class="material-icons">close</span></button>
    </div>

    <label style="color:var(--dynamic-text); opacity:0.8; font-size:0.8rem; margin-bottom:5px; font-weight:bold; display:block;">1. Local de Treino</label>
    <select id="sel-local-final" class="input-std" style="margin-bottom:15px;" onchange="filtrarTurmasPorLocal()">
      <option value="" disabled selected>Carregando Unidades...</option>
    </select>

    <label style="color:var(--dynamic-text); opacity:0.8; font-size:0.8rem; margin-bottom:5px; font-weight:bold; display:block;">2. Turma Oficial</label>
    <select id="sel-turma-final" class="input-std" style="margin-bottom:15px; border: 2px solid var(--dynamic-prim);">
      <option value="" disabled selected>Selecione a Unidade primeiro...</option>
    </select>

    <label style="color:var(--dynamic-text); opacity:0.8; font-size:0.8rem; margin-bottom:5px; font-weight:bold; display:block;">Data da Aula</label>
    <input type="date" id="txt-data-final" class="input-std" style="margin-bottom:15px;">

    <div style="display:flex; gap:15px; margin-bottom:25px;">
      <div style="flex:1">
        <label style="color:var(--dynamic-text); opacity:0.8; font-size:0.8rem; font-weight:bold;">Início</label>
        <input type="time" id="txt-inicio-final" class="input-std">
      </div>
      <div style="flex:1">
        <label style="color:var(--dynamic-text); opacity:0.8; font-size:0.8rem; font-weight:bold;">Fim</label>
        <input type="time" id="txt-fim-final" class="input-std">
      </div>
    </div>

    <button onclick="salvarAulaFinal()" class="cor-gold">GERAR PIN DE ACESSO</button>
  </div>

</div>

<script>
  console.log("✅ [SAFE MODE] ChamadaDinamica.html (CASCATA UX/UI Integrada)");

  var _prodAulaId = null;
  var _prodTimer = null;
  var _prodCache = [];
  var _prodConfirmadosLocal = {};
  var _prodDataAula = "";
  var _buscaTimer = null; 

  // Variáveis para a cascata de turmas
  var _todasTurmasCache = [];

  function showToast(msg, tipo='info') {
      var x = document.getElementById("toast-box");
      x.innerText = msg;
      x.style.borderLeft = tipo === 'erro' ? "5px solid #f44336" : "5px solid #4caf50";
      x.className = "show";
      setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
  }

  function initChamadaDinamica(modo) {
      document.getElementById('dashboard-grid').style.display = 'none';
      document.querySelector('.dashboard-header').style.display = 'none';
      var main = document.getElementById('main-content');
      var screen = document.getElementById('screen-chamada-final');
      if(screen.parentElement !== main) main.appendChild(screen);
      screen.style.display = 'block';

      ['painel-aluno','painel-menu','painel-criar','painel-instrutor-live'].forEach(function(id){ document.getElementById(id).style.display = 'none'; });

      var user = JSON.parse(localStorage.getItem('userSession'));
      if (modo === 'instrutor') carregarMenuFinal(user);
      else { document.getElementById('painel-aluno').style.display = 'block'; carregarAlunoFinal(user); }
  }

  function iniciarMonitoramentoFinal(id, pin, dataAula) {
      _prodAulaId = id;
      _prodDataAula = dataAula || "";
      document.getElementById('painel-menu').style.display = 'none';
      document.getElementById('painel-criar').style.display = 'none';
      document.getElementById('painel-instrutor-live').style.display = 'block';
      document.getElementById('box-pin-live').innerText = pin;

      if(_prodTimer) clearInterval(_prodTimer);
      processarPollingFinal(); 
      _prodTimer = setInterval(processarPollingFinal, 5000);
  }

  function processarPollingFinal() {
      if (!_prodAulaId) return;
      google.script.run.withSuccessHandler(function(res) {
          document.getElementById('status-conexao').innerText = "● Sincronizado";
          document.getElementById('status-conexao').style.color = "#4caf50";
          if (!res.success || res.status === "ENCERRADA") {
              clearInterval(_prodTimer);
              showToast("Aula encerrada pelo servidor.", "erro");
              setTimeout(voltarDashFinal, 2000);
              return;
          }
          if (res.checkins) {
              let listaMesclada = res.checkins.map(function(a) {
                  if (_prodConfirmadosLocal[a.login]) a.status = 'Confirmado';
                  return a;
              });
              desenharListaFinal(listaMesclada);
          }
      }).withFailureHandler(function(err) {
          document.getElementById('status-conexao').innerText = "⚠ Falha na Conexão. Reconectando...";
          document.getElementById('status-conexao').style.color = "#f44336";
      }).buscarCheckinsAula(_prodAulaId);
  }

  function desenharListaFinal(lista) {
      _prodCache = lista || [];
      var container = document.getElementById('container-lista-live');
      document.getElementById('contador-live').innerText = _prodCache.length;
      container.innerHTML = "";

      if (_prodCache.length === 0) {
          container.innerHTML = "<div style='padding:40px 20px; text-align:center; color:var(--dynamic-text); opacity:0.5; display:flex; flex-direction:column; align-items:center;'><span class='material-icons' style='font-size:48px; margin-bottom:10px;'>qr_code_scanner</span><p style='margin:0; font-size:1rem; font-weight:bold;'>Sala vazia</p><p style='margin:5px 0 0; font-size:0.8rem;'>Alunos devem digitar o PIN de 4 dígitos no app.</p></div>";
          return;
      }

      _prodCache.sort(function(a,b) { return (a.status === 'Confirmado' ? 1 : -1); });

      _prodCache.forEach(function(aluno) {
          var div = document.createElement('div');
          var confirmado = aluno.status === 'Confirmado';
          div.className = "card-aluno " + (confirmado ? 'status-ok' : 'status-vis');
          var img = (aluno.foto && aluno.foto.length > 5) ? aluno.foto : 'https://via.placeholder.com/50';

          var statusHtml = !confirmado ? 
              "<button class='btn-acao cor-nao' onclick=\"acaoRecusarFinal('" + aluno.login + "')\">✕</button><button class='btn-acao cor-sim' onclick=\"acaoAceitarFinal('" + aluno.login + "')\">✓</button>" : 
              "<span class='material-icons' style='color:#4caf50; font-size:32px;'>verified</span>";

          // 🎨 MÓDULO VISUAL: RENDERIZAÇÃO DE TAGS INTELIGENTES
          let tagCor = "#666"; // Padrão
          let idadeTexto = aluno.idade || "?";
          let categoria = aluno.categoria || "N/A";
          
          if(categoria === "Infantil") tagCor = "#ff9800"; // Laranja
          else if(categoria === "Adulto") tagCor = "#2196f3"; // Azul
          else if(categoria === "Visitante") tagCor = "#9c27b0"; // Roxo
          else if(aluno.tipo === "Visitante") { categoria = "Externo"; tagCor = "#9c27b0"; } // Fallback para visitantes manuais
          
          const badgeIdade = `<span style="background-color:${tagCor}; color:white; padding:2px 6px; border-radius:4px; font-size:0.65rem; font-weight:900; margin-left:8px; text-transform:uppercase; letter-spacing:1px; box-shadow:0 2px 5px rgba(0,0,0,0.3);">[${categoria} - ${idadeTexto} Anos]</span>`;

          div.innerHTML = "<div class='info-flex'>" +
                          "<img src='" + img + "' class='foto-perfil'>" +
                          "<div>" +
                          // 👇 INJETAMOS A TAG LOGO APÓS O NOME DO ALUNO 👇
                          "<div style='font-weight:900; color:var(--dynamic-text); font-size:1rem; display:flex; align-items:center;'>" + aluno.nome + badgeIdade + "</div>" +
                          "<div style='font-size:0.8rem; color:var(--dynamic-text); opacity:0.7; margin-top:3px;'>" + aluno.graduacao + " • " + (aluno.hora || '--:--') + " <span class='badge-data'>" + _prodDataAula + "</span></div>" +
                          "</div>" +
                          "</div>" +
                          "<div style='display:flex; gap:10px;'>" + statusHtml + "</div>";
          container.appendChild(div);
      });
  }

  function acaoAceitarFinal(login) {
      _prodConfirmadosLocal[login] = true;
      var item = _prodCache.find(function(a) { return a.login === login; });
      if(item) { item.status = 'Confirmado'; desenharListaFinal(_prodCache); }
      showToast("Check-in validado!", "sucesso");
  }

  function acaoRecusarFinal(login) {
      if(!confirm("Deseja realmente remover este aluno da chamada?")) return;
      _prodCache = _prodCache.filter(function(a) { return a.login !== login; });
      delete _prodConfirmadosLocal[login]; 
      desenharListaFinal(_prodCache);
      showToast("Aluno removido da lista.", "info");
  }

  function acaoFinalizarFinal() {
      if(_prodCache.length === 0 && !confirm("Nenhum aluno marcou presença. Encerrar aula vazia?")) return;
      const pendentes = _prodCache.filter(function(a){ return a.status !== 'Confirmado'; }).length;
      if (pendentes > 0 && !confirm("Atenção: " + pendentes + " alunos ainda estão pendentes de validação (✕ ou ✓). Se encerrar, eles receberão presença. Continuar?")) return;
      if (pendentes === 0 && !confirm("Validar todos os registros e salvar no banco de dados?")) return;

      clearInterval(_prodTimer);
      const listaFinal = _prodCache.map(function(a) { return {...a, status: 'Confirmado'}; });
      google.script.run.withSuccessHandler(function(res) {
          showToast(res.msg, "sucesso");
          setTimeout(voltarDashFinal, 1500);
      }).finalizarAulaDinamica(_prodAulaId, listaFinal);
  }

  function abrirModalManual() {
      document.getElementById('modal-manual').style.display = 'flex';
      document.getElementById('busca-aluno-input').value = '';
      document.getElementById('resultado-busca').innerHTML = '';
      setTimeout(function() { document.getElementById('busca-aluno-input').focus(); }, 100);
  }

  function fecharModalManual() { document.getElementById('modal-manual').style.display = 'none'; }

  function buscarAlunoDelay() {
      clearTimeout(_buscaTimer);
      _buscaTimer = setTimeout(executarBuscaManual, 600);
  }

  function executarBuscaManual() {
      const termo = document.getElementById('busca-aluno-input').value;
      if(termo.length < 3) return;
      
      const divRes = document.getElementById('resultado-busca');
      divRes.innerHTML = '<div style="color:var(--dynamic-text); opacity:0.6; padding:10px; text-align:center;"><span class="material-icons spin">sync</span></div>';

      google.script.run.withSuccessHandler(function(lista) {
          divRes.innerHTML = "";
          lista.forEach(function(a) {
              const item = document.createElement('div');
              item.className = 'item-busca';
              // 🚨 FIX: Agora passamos a.login na função onClick
              item.innerHTML = "<img src='" + a.foto + "' style='width:36px; height:36px; border-radius:50%; object-fit:cover;'>" +
                               "<div><div style='font-weight:bold; color:var(--dynamic-text);'>" + a.nome + "</div><div style='font-size:0.7rem; color:var(--dynamic-text); opacity:0.6;'>" + a.graduacao + " (@" + a.login + ")</div></div>";
              item.onclick = function() { adicionarNaLista(a.login); }; 
              divRes.appendChild(item);
          });
          const itemVisitante = document.createElement('div');
          itemVisitante.className = 'item-busca';
          itemVisitante.style.borderTop = "1px dashed rgba(255,255,255,0.2)";
          itemVisitante.style.marginTop = "5px";
          itemVisitante.innerHTML = "<div style='width:36px; height:36px; border-radius:50%; background:var(--dynamic-prim); display:flex; align-items:center; justify-content:center; color:var(--dynamic-btn-text); font-weight:900;'>+</div>" +
                                    "<div><div style='font-weight:bold; color:var(--dynamic-prim);'>Adicionar " + termo + "</div><div style='font-size:0.7rem; color:var(--dynamic-text); opacity:0.6;'>Marcar como Visitante Externo</div></div>";
          itemVisitante.onclick = function() { adicionarNaLista("VISITANTE_" + termo); };
          divRes.appendChild(itemVisitante);
      }).buscarAlunosParaManual(termo);
  }

  function adicionarNaLista(login) {
      fecharModalManual();
      showToast("Adicionando aluno...", "info");
      google.script.run.withSuccessHandler(function(res) {
          if(res.success) {
              showToast("Inclusão manual feita!", "sucesso");
              _prodConfirmadosLocal[login] = true; 
              processarPollingFinal(); 
          } else {
              showToast(res.msg, "erro");
          }
      }).adicionarAlunoManual(_prodAulaId, login);
  }

  function voltarDashFinal() {
      if(_prodTimer) clearInterval(_prodTimer);
      document.getElementById('screen-chamada-final').style.display = 'none';
      document.querySelector('.dashboard-header').style.display = 'flex';
      document.getElementById('dashboard-grid').style.display = 'grid';
  }

  function carregarMenuFinal(user) {
      document.getElementById('painel-menu').style.display = 'block';
      const div = document.getElementById('feed-aulas-instrutor');
      div.innerHTML = "<div style='color:var(--dynamic-text); opacity:0.5; padding:10px; text-align:center;'>Buscando do servidor...</div>";
      google.script.run.withSuccessHandler(function(aulas) {
          div.innerHTML = "";
          if(aulas.length===0) div.innerHTML = "<div style='color:var(--dynamic-text); opacity:0.5; padding:20px; text-align:center; border:1px dashed rgba(255,255,255,0.2); border-radius:8px;'>Nenhuma aula ativa no momento.</div>";
          aulas.forEach(function(a) {
              const txtAlunos = a.qtd === 1 ? "aluno" : "alunos";
              div.innerHTML += "<div class='aula-card-aux' onclick=\"iniciarMonitoramentoFinal('" + a.id + "','" + a.pin + "', '" + a.data + "')\">" +
                               "<div style='text-align:left;'><h4 style='color:var(--dynamic-prim); margin:0 0 5px 0; font-weight:900;'>" + a.turma + "</h4><small style='color:var(--dynamic-text); opacity:0.7; font-size:0.85rem; display:block;'>📍 " + a.academia + " <br>📅 " + a.data + "  |  ⏰ " + a.horario + "</small><div style='margin-top:8px; font-size:0.85rem; color:#4caf50; font-weight:bold;'><span class='material-icons' style='font-size:14px; vertical-align:middle;'>groups</span> " + a.qtd + " " + txtAlunos + " na sala</div></div>" +
                               "<div style='text-align:center; background:var(--dynamic-prim); padding:10px 15px; border-radius:8px; color:var(--dynamic-btn-text);'><div style='font-weight:900; font-size:1.4rem; letter-spacing:2px;'>" + a.pin + "</div><div style='font-size:0.6rem; text-transform:uppercase; font-weight:bold;'>Acessar</div></div>" +
                               "</div>";
          });
      }).buscarAulasAtivasInstrutor(user.nomeCompleto);
  }

  // --- LÓGICA CASCATA: LOCAL -> TURMA ---
  function irParaCriarFinal() {
      document.getElementById('painel-menu').style.display = 'none';
      document.getElementById('painel-criar').style.display = 'block';
      document.getElementById('txt-data-final').valueAsDate = new Date();

      const selLocal = document.getElementById('sel-local-final');
      const selTurma = document.getElementById('sel-turma-final');

      selLocal.innerHTML = "<option>Carregando...</option>";
      selTurma.innerHTML = "<option value='' disabled selected>Aguardando local...</option>";

      // 🛡️ Busca academias e cruza com as permissões do usuário
      google.script.run.withSuccessHandler(function(locais) {
          const user = JSON.parse(localStorage.getItem('userSession'));
          const isGod = user.isAdmin === true;
          // Separa as academias do professor por vírgula e limpa os espaços
          const userAcads = user.academia ? user.academia.split(',').map(a => a.trim().toLowerCase()) : [];

          selLocal.innerHTML = "<option value='' disabled selected>Selecione a Unidade</option>";
          locais.forEach(function(l) {
              // Mágica Multi-Tenancy: Mostra se for ADM ou se o local estiver na lista dele!
              if (isGod || userAcads.includes(l.trim().toLowerCase())) {
                  selLocal.innerHTML += "<option value='" + l + "'>" + l + "</option>";
              }
          });
      }).getListaAcademias();

      google.script.run.withSuccessHandler(function(turmas) {
          _todasTurmasCache = turmas || [];
      }).listarTurmasAdmin();
  }

  function filtrarTurmasPorLocal() {
      const localSelecionado = document.getElementById('sel-local-final').value;
      const selTurma = document.getElementById('sel-turma-final');

      selTurma.innerHTML = "<option value='' disabled selected>Selecione a Turma...</option>";

      const turmasDoLocal = _todasTurmasCache.filter(function(t) { 
          return t.local === localSelecionado && t.status === "Ativa"; 
      });

      if (turmasDoLocal.length === 0) {
          selTurma.innerHTML = "<option value='' disabled selected>Nenhuma turma cadastrada neste local</option>";
          return;
      }

      turmasDoLocal.forEach(function(t) {
          selTurma.innerHTML += "<option value='" + t.nome + "'>" + t.nome + " (" + t.modalidade + " - " + t.faixaEtaria + ")</option>";
      });
  }

  /**
   * 📝 QA Note: O Frontend já trabalha com manipulação segura de objetos JSON,
   * sem contato com índices de planilhas.
   */
  function salvarAulaFinal() {
      const user = JSON.parse(localStorage.getItem('userSession'));
      const localSel = document.getElementById('sel-local-final').value;
      const turmaSel = document.getElementById('sel-turma-final').value;
      const dataRaw = document.getElementById('txt-data-final').value;
      const inicioRaw = document.getElementById('txt-inicio-final').value;
      const fimRaw = document.getElementById('txt-fim-final').value;

      if(!localSel || !turmaSel || !inicioRaw) { 
          showToast("Preencha o Local, a Turma e o Horário!", "erro"); 
          return; 
      }

      const btn = document.querySelector('button[onclick="salvarAulaFinal()"]');
      const originalText = btn.innerText;
      btn.innerText = "CRIANDO SALA..."; btn.disabled = true;
      let dataFormatada = dataRaw.split('-').reverse().join('/');

      const dados = { 
          instrutor: user.nomeCompleto, 
          local: localSel, 
          turma: turmaSel, 
          data: dataRaw, 
          inicio: inicioRaw, 
          fim: fimRaw 
      };

      google.script.run.withSuccessHandler(function(res) {
          btn.innerText = originalText; btn.disabled = false;
          if(res.success) iniciarMonitoramentoFinal(res.idAula, res.pin, dataFormatada);
          else showToast("Erro: " + res.erro, "erro");
      }).iniciarAulaDinamica(dados);
  }

  // --- MÓDULO ALUNO (CHECKIN VIA MENU) ---
  function carregarAlunoFinal(user) {
      const div = document.getElementById('feed-aulas-aluno');
      div.innerHTML = "<div style='color:var(--dynamic-text); opacity:0.6; text-align:center;'>Procurando aulas...</div>";
      google.script.run.withSuccessHandler(function(aulas) {
          div.innerHTML = "";
          if(aulas.length === 0) div.innerHTML = "<div style='padding:20px; border:1px dashed rgba(255,255,255,0.2); border-radius:8px; color:var(--dynamic-text); opacity:0.6; text-align:center;'>Nenhuma sala aberta. Aguarde o instrutor.</div>";
          aulas.forEach(function(a) {
              div.innerHTML += "<div class='aula-card-aux' onclick=\"preencherPinFinal('" + a.pin + "')\"><div><h4 style='color:var(--dynamic-prim); margin:0 0 5px 0; font-weight:900;'>" + a.instrutor + "</h4><small style='color:var(--dynamic-text); opacity:0.7;'>📍 " + a.academia + " | 🥋 " + a.turma + " | ⏰ " + a.horario + "</small></div><div style='background:var(--dynamic-sec); border:1px solid var(--dynamic-prim); color:var(--dynamic-prim); padding:8px 12px; border-radius:6px; font-size:0.75rem; font-weight:bold;'>Tocar</div></div>";
          });
      }).buscarAulasDisponiveisAluno("TODOS");
  }

  function preencherPinFinal(pin) { 
      const input = document.getElementById('input-pin-aluno');
      input.value = pin;
      input.focus();
  }

  function executarCheckinFinal() {
      const pin = document.getElementById('input-pin-aluno').value;
      if(!pin || pin.length < 4) { showToast("Digite o PIN de 4 dígitos.", "erro"); return; }
      
      const user = JSON.parse(localStorage.getItem('userSession'));
      const feedback = document.getElementById('feedback-aluno');
      feedback.innerText = "Processando código..."; 
      feedback.style.color = "var(--dynamic-prim)";
      
      const btnOk = document.querySelector('#painel-aluno .cor-gold');
      btnOk.disabled = true;

      google.script.run.withSuccessHandler(function(res) {
          feedback.innerText = res.msg;
          feedback.style.color = res.success ? "#4caf50" : "#f44336";
          btnOk.disabled = false;
          if(res.success) {
            showToast("PRESENÇA CONFIRMADA!", "sucesso");
            document.getElementById('input-pin-aluno').value = "";
          }
      }).withFailureHandler(function(err) {
          // 🛡️ NOVO: Captura erros fatais do Apps Script para não morrer em silêncio
          feedback.innerText = "Erro no servidor. Tente novamente.";
          feedback.style.color = "#f44336";
          btnOk.disabled = false;
          console.error("Falha no check-in:", err);
      }).realizarCheckinAluno(user.LOGIN, pin);
  }
</script>
