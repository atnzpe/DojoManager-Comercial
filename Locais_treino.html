<style>
  /* ============================================================================
     INJEÇÃO DE CORES COM FALLBACK SEGURO
     ============================================================================ */
  :root {
    --dynamic-bg: <?=typeof bgColor !=='undefined'&& bgColor ? bgColor: '#121212'?> !important;
    --dynamic-prim: <?=typeof primaryColor !=='undefined'&& primaryColor ? primaryColor: '#FFD700'?> !important;
    --dynamic-sec: <?=typeof secondaryColor !=='undefined'&& secondaryColor ? secondaryColor: '#1e1e1e'?> !important;
    --dynamic-text: <?=typeof textColor !=='undefined'&& textColor ? textColor: '#ffffff'?> !important;
    --dynamic-btn-text: <?=typeof btnTextColor !=='undefined'&& btnTextColor ? btnTextColor: '#000000'?> !important;
  }

  /* --- ESTILOS GERAIS --- */
  .locais-view {
    display: none;
    animation: fadeIn 0.3s ease-in-out;
    padding-top: 20px;
    padding-bottom: 80px;
    max-width: 1000px;
    margin: 0 auto;
  }

  /* GRID DE LOCAIS */
  .locais-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 25px;
    padding: 20px;
  }

  .local-card {
    background-color: var(--dynamic-sec) !important;
    border: 2px solid var(--dynamic-prim) !important;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s, filter 0.3s, box-shadow 0.3s;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5) !important;
  }

  .local-card:hover {
    transform: translateY(-8px);
    filter: brightness(1.1);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7) !important;
  }

  /* MAPA EMBUTIDO */
  .map-container {
    width: 100%;
    height: 200px;
    background: #000;
    position: relative;
    border-bottom: 2px solid var(--dynamic-prim);
    overflow: hidden;
  }

  .map-container iframe {
    width: 100% !important;
    height: 100% !important;
    border: 0;
  }

  .no-map {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    background: rgba(0, 0, 0, 0.4);
    color: var(--dynamic-text);
    opacity: 0.6;
    font-size: 14px;
    flex-direction: column;
    gap: 10px;
  }

  /* CONTEÚDO DO CARD */
  .local-content {
    padding: 20px;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .local-title {
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--dynamic-prim);
    line-height: 1.2;
    text-transform: uppercase;
  }

  .local-info-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .local-info {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    color: var(--dynamic-text);
    font-size: 0.9rem;
    line-height: 1.4;
    opacity: 0.85;
  }

  .local-info .material-icons {
    font-size: 20px;
    color: var(--dynamic-prim);
    width: 20px;
  }

  .local-actions {
    padding: 15px 20px;
    background: rgba(0, 0, 0, 0.2);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    gap: 12px;
  }

  .btn-action {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 900;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    transition: 0.2s;
    border: none;
    text-transform: uppercase;
  }

  .btn-maps {
    background: transparent;
    color: var(--dynamic-text);
    border: 1px solid var(--dynamic-text);
    opacity: 0.7;
  }

  .btn-maps:hover {
    opacity: 1;
    border-color: var(--dynamic-prim);
    color: var(--dynamic-prim);
  }

  .btn-whats {
    background: #25D366;
    color: #fff;
    box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
  }

  .btn-whats:hover {
    background: #1ebe57;
    transform: scale(1.05);
  }

  /* Botão Check-in (Aula Ativa) */
  .btn-checkin-live {
    background: #4caf50;
    color: #fff;
    flex: 1.5;
    animation: pulseGlow 2s infinite;
  }

  .btn-checkin-live:hover {
    background: #43a047;
  }

  /* CABEÇALHO */
  .profile-header-nav {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
    padding: 0 20px;
  }

  .btn-back-locais {
    background: transparent;
    border: 1px solid var(--dynamic-text);
    color: var(--dynamic-text);
    opacity: 0.6;
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
  }

  .btn-back-locais:hover {
    opacity: 1;
    border-color: var(--dynamic-prim);
    color: var(--dynamic-prim);
  }

  /* LOADER */
  .spinner-locais {
    border: 4px solid rgba(255, 255, 255, 0.1);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border-left-color: var(--dynamic-prim);
    animation: spin 1s linear infinite;
    margin: 0 auto;
  }

  @keyframes pulseGlow {
    0% {
      box-shadow: 0 0 5px rgba(76, 175, 80, 0.4);
    }

    50% {
      box-shadow: 0 0 20px rgba(76, 175, 80, 0.7);
    }

    100% {
      box-shadow: 0 0 5px rgba(76, 175, 80, 0.4);
    }
  }

  @keyframes spin {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>

<div id="locais-treino-screen" class="locais-view">

  <div class="profile-header-nav">
    <button class="btn-back-locais" onclick="fecharLocaisTreino()">
      <span class="material-icons" style="font-size: 28px;">arrow_back</span>
    </button>
    <h2 style="margin:0; font-size:1.8rem; font-weight:900; color:var(--dynamic-text);">Onde Treinar</h2>
  </div>

  <div id="loading-locais-treino" style="text-align:center; margin-top:50px;">
    <div class="spinner-locais"></div>
    <p style="color:var(--dynamic-text); opacity:0.6; font-weight:bold; margin-top:15px;">Localizando academias...</p>
  </div>

  <div id="locais-treino-grid" class="locais-grid"></div>

</div>

<script>
  console.log("✅ [SAFE MODE] Locais_treino.html carregado (White-Label Integrado)");

  function abrirLocaisTreino() {
    document.getElementById('dashboard-grid').style.display = 'none';
    document.querySelector('.dashboard-header').style.display = 'none';
    document.getElementById('locais-treino-screen').style.display = 'block';

    document.getElementById('loading-locais-treino').style.display = 'block';
    document.getElementById('locais-treino-grid').innerHTML = '';
    
    // 1. Busca Aulas Live
    google.script.run.withSuccessHandler(aulasLive => {
        // 2. Busca Locais Fixos
        google.script.run.withSuccessHandler(locaisFixos => {
            renderizarLocaisTreino(locaisFixos, aulasLive);
        }).withFailureHandler(err => {
            console.error(err);
            document.getElementById('loading-locais-treino').style.display = 'none';
        }).getLocaisTreino();
    }).buscarAulasDisponiveisAluno("TODOS");
  }

  function renderizarLocaisTreino(locais, aulasLive = []) {
    document.getElementById('loading-locais-treino').style.display = 'none';
    var grid = document.getElementById('locais-treino-grid');
    grid.innerHTML = '';

    if (!locais || locais.length === 0) {
       grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--dynamic-text); opacity:0.5;"><span class="material-icons" style="font-size:48px;">location_off</span><p>Nenhuma academia ativa encontrada.</p></div>';
       return;
    }
    
    const mapLive = {};
    if(aulasLive && aulasLive.length > 0) {
        aulasLive.forEach(a => mapLive[String(a.academia).trim().toLowerCase()] = a);
    }

    var contadorAtivos = 0;

    locais.forEach(function(local) {
       var status = local.status ? String(local.status).toLowerCase().trim() : 'ativo';
       if (status !== 'ativo') return;
       contadorAtivos++;
       
       const nomeNorm = String(local.nome).trim().toLowerCase();
       const aulaAtiva = mapLive[nomeNorm];
       
       var card = document.createElement('div');
       card.className = 'local-card';
       if(aulaAtiva) {
           card.style.borderColor = "#4caf50";
       }

       // --- 1. MAPA (IFRAME CLEAN) ---
       var mapHtml = '';
       if (local.iframeHtml && local.iframeHtml.includes('<iframe')) {
           var cleanIframe = local.iframeHtml
               .replace(/width="[^"]*"/gi, 'width="100%"')
               .replace(/height="[^"]*"/gi, 'height="100%"')
               .replace(/style="[^"]*"/gi, '') 
               .replace(/<script\b[^>]*>([\s\S]*?)<\/script>/gim, ""); 

           mapHtml = '<div class="map-container">' + cleanIframe + '</div>';
       } else {
           mapHtml = '<div class="map-container no-map"><span class="material-icons" style="font-size:48px;">map</span><span>Mapa não configurado</span></div>';
       }

       // --- 2. CONTEÚDO ---
       var contentHtml = '<div class="local-content">';
       if(aulaAtiva) {
           contentHtml += '<div style="background:#4caf50; color:#fff; font-size:0.7rem; font-weight:900; padding:4px 10px; border-radius:4px; align-self:flex-start; text-transform:uppercase;">🔴 Treino agora</div>';
       }
       
       contentHtml += '<div class="local-title">' + (local.nome || 'Unidade') + '</div>';
       contentHtml += '<div class="local-info-group">';
       if (local.responsavel) contentHtml += '<div class="local-info"><span class="material-icons">person</span> ' + local.responsavel + '</div>';
       if(local.endereco) contentHtml += '<div class="local-info"><span class="material-icons">place</span> ' + local.endereco + '</div>';
       if(local.horarios) contentHtml += '<div class="local-info"><span class="material-icons">schedule</span> ' + local.horarios + '</div>';
       contentHtml += '</div></div>';

       // --- 3. AÇÕES ---
       var actionsHtml = '<div class="local-actions">';
       if (aulaAtiva) {
           actionsHtml += `<button onclick="irParaCheckinLocal('${aulaAtiva.pin}')" class="btn-action btn-checkin-live"><span class="material-icons">qr_code</span> CHECK-IN</button>`;
       }
       if(local.linkMaps) actionsHtml += '<a href="' + local.linkMaps + '" target="_blank" class="btn-action btn-maps"><span class="material-icons">near_me</span> Rota</a>';
       
       var whatsNum = local.contato ? String(local.contato).replace(/\D/g, '') : '';
       if(whatsNum.length >= 10) {
           if (!whatsNum.startsWith('55') && whatsNum.length <= 11) whatsNum = '55' + whatsNum;
           var urlWhats = "https://wa.me/" + whatsNum + "?text=" + encodeURIComponent("Kídá! Gostaria de informações sobre os treinos na unidade " + local.nome);
           actionsHtml += '<a href="' + urlWhats + '" target="_blank" class="btn-action btn-whats" style="flex:0; padding:0 15px;"><span class="material-icons">chat</span></a>';
       }
       actionsHtml += '</div>';

       card.innerHTML = mapHtml + contentHtml + actionsHtml;
       grid.appendChild(card);
    });
  }

  function fecharLocaisTreino() {
    document.getElementById('locais-treino-screen').style.display = 'none';
    document.querySelector('.dashboard-header').style.display = 'flex';
    document.getElementById('dashboard-grid').style.display = 'grid';
  }

  function irParaCheckinLocal(pin) {
      if(typeof initChamadaDinamica === 'function') {
          fecharLocaisTreino();
          initChamadaDinamica('aluno');
          setTimeout(() => {
              const input = document.getElementById('input-pin-aluno');
              if(input && pin) {
                  input.value = pin;
                  input.focus();
              }
          }, 600);
      }
  }
</script>
