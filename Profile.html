<style>
  /* =======================================================================
     MÓDULO DE PERFIL - DESIGN SÓLIDO (INDEPENDENTE)
     ======================================================================= */
  #modal-perfil {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* Fundo escurecido para isolar do resto do sistema */
    background: rgba(0, 0, 0, 0.90);
    z-index: 10000;
    display: none;
    /* Controlado pelo JS */
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
    font-family: 'Roboto', sans-serif;
  }

  /* O Card Principal do Perfil */
  #modal-perfil .profile-card {
    /* Cor secundária (Ex: Branco ou Grafite) vinda do Dashboard */
    background-color: var(--secondary-color, #1e1e1e);
    border: 2px solid var(--primary-color, #FFD700);
    border-radius: 16px;
    width: 100%;
    max-width: 400px;
    padding: 30px 25px;
    text-align: center;
    position: relative;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
  }

  /* Avatar Central */
  #modal-perfil .profile-img-container {
    width: 120px;
    height: 120px;
    margin: 0 auto 15px auto;
    border-radius: 50%;
    padding: 4px;
    position: relative;
    background-color: var(--primary-color, #FFD700);
    /* Anel ao redor da foto */
  }

  #modal-perfil .profile-img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid var(--secondary-color, #1e1e1e);
    background-color: #333;
  }

  /* Botão Lápis (Câmera) - Editar Foto */
  #modal-perfil .edit-photo-btn {
    position: absolute;
    bottom: 0;
    right: 0;
    background-color: var(--primary-color, #FFD700);
    color: var(--btn-text-color, #000);
    width: 35px;
    height: 35px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 3px solid var(--secondary-color, #1e1e1e);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    transition: transform 0.2s;
  }

  #modal-perfil .edit-photo-btn:hover {
    transform: scale(1.1);
    filter: brightness(1.1);
  }

  /* Textos Principais - Forçando a cor do Texto Global */
  #modal-perfil .profile-name {
    font-size: 1.6rem;
    font-weight: 900;
    margin-bottom: 5px;
    color: var(--text-color, #fff);
  }

  #modal-perfil .profile-login {
    font-size: 0.95rem;
    color: var(--text-color, #ccc);
    opacity: 0.8;
    margin-bottom: 20px;
    font-family: monospace;
    font-weight: bold;
  }

  /* Faixa/Graduação Destaque */
  #modal-perfil .profile-badge {
    display: inline-block;
    padding: 8px 25px;
    border-radius: 30px;
    background-color: var(--primary-color, #FFD700);
    color: var(--btn-text-color, #000);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 0.9rem;
    margin-bottom: 25px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
  }

  /* Grid de Estatísticas (Academia e Exame) */
  #modal-perfil .profile-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    /* Fundo levemente translúcido usando a cor do texto para contraste */
    background-color: rgba(128, 128, 128, 0.15);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 25px;
    border: 1px solid rgba(128, 128, 128, 0.2);
  }

  #modal-perfil .stat-item {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  #modal-perfil .stat-item:first-child {
    border-right: 1px solid rgba(128, 128, 128, 0.3);
  }

  #modal-perfil .stat-label {
    font-size: 0.7rem;
    font-weight: bold;
    text-transform: uppercase;
    color: var(--text-color, #fff);
    opacity: 0.6;
  }

  #modal-perfil .stat-value {
    font-size: 1rem;
    font-weight: 900;
    color: var(--text-color, #fff);
  }

  /* Botoes de Ação (Senhas e IDs) */
  #modal-perfil .profile-actions-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
    width: 100%;
  }

  #modal-perfil .btn-prof {
    padding: 12px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: bold;
    text-transform: uppercase;
    transition: all 0.2s ease-in-out;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex: 1;
    border: none;
    background-color: var(--primary-color, #FFD700);
    color: var(--btn-text-color, #000);
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
  }

  #modal-perfil .btn-prof:hover {
    filter: brightness(1.15);
    transform: translateY(-2px);
  }

  /* Botão Voltar (Sólido e Diferenciado) */
  #modal-perfil .btn-back {
    width: 100%;
    background-color: #333;
    color: #fff;
    border: 1px solid #555;
  }

  #modal-perfil .btn-back:hover {
    background-color: #444;
    color: #fff;
  }

  /* Sub-Modais (Formulários de Edição) */
  #modal-perfil .sub-modal {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 320px;
    background-color: var(--secondary-color, #1e1e1e);
    border: 2px solid var(--primary-color, #FFD700);
    border-radius: 12px;
    padding: 25px;
    display: none;
    z-index: 10001;
    box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9);
  }

  #modal-perfil .sub-input {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    background-color: rgba(128, 128, 128, 0.1);
    border: 1px solid rgba(128, 128, 128, 0.5);
    color: var(--text-color, #fff);
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 1rem;
  }

  #modal-perfil .sub-input:focus {
    border-color: var(--primary-color, #FFD700);
    outline: none;
    background-color: rgba(128, 128, 128, 0.2);
  }

  #modal-perfil .btn-close-sub {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: none;
    color: #ff5252;
    cursor: pointer;
    font-size: 26px;
    opacity: 0.8;
  }

  #modal-perfil .btn-close-sub:hover {
    opacity: 1;
    transform: scale(1.1);
  }
</style>

<div id="modal-perfil">
  <div class="profile-card">

    <div class="profile-img-container">
      <img id="p-foto" src="" class="profile-img" onerror="this.src='https://ui-avatars.com/api/?name=User&background=333&color=fff&size=200'">
      <div class="edit-photo-btn" onclick="abrirEditFoto()">
        <span class="material-icons" style="font-size:18px">edit</span>
      </div>
    </div>

    <h2 id="p-nome" class="profile-name">Carregando...</h2>
    <p id="p-login" class="profile-login">@usuario</p>

    <div id="p-faixa" class="profile-badge">FAIXA</div>

    <div class="profile-stats">
      <div class="stat-item">
        <span class="stat-label">Academia</span>
        <span id="p-academia" class="stat-value">---</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Próximo Exame</span>
        <span id="p-exame" class="stat-value">---</span>
      </div>
    </div>

    <div class="profile-actions-row">
      <button class="btn-prof" onclick="abrirTrocaSenha()">
        <span class="material-icons" style="font-size:18px">lock</span> Senha
      </button>
      <button class="btn-prof" onclick="gerarPDFCarteirinha()">
        <span class="material-icons" style="font-size:18px">badge</span> Carteira
      </button>
    </div>

    <button class="btn-prof btn-back" onclick="fecharPerfil()">
      <span class="material-icons" style="font-size: 18px;">arrow_back</span> Fechar
    </button>

    <div id="modal-senha" class="sub-modal">
      <button class="btn-close-sub" type="button" onclick="fecharSubModal('modal-senha')">×</button>
      <h3 style="margin-top:0; color:var(--primary-color); margin-bottom: 20px;">Alterar Senha</h3>
      <form onsubmit="salvarNovaSenha(event)">
        <input type="password" id="senha-antiga" class="sub-input" placeholder="Senha Atual" required>
        <input type="password" id="senha-nova" class="sub-input" placeholder="Nova Senha" required>
        <button type="submit" class="btn-prof" style="width:100%">Confirmar</button>
      </form>
    </div>

    <div id="modal-foto" class="sub-modal">
      <button class="btn-close-sub" type="button" onclick="fecharSubModal('modal-foto')">×</button>
      <h3 style="margin-top:0; color:var(--primary-color); margin-bottom: 10px;">Nova Foto</h3>
      <p style="font-size:12px; color:var(--text-color); opacity: 0.7; margin-bottom: 15px;">Cole o link público da
        imagem ou do Google Drive.</p>
      <form onsubmit="salvarNovaFoto(event)">
        <input type="text" id="link-foto" class="sub-input" placeholder="https://..." required>
        <button type="submit" class="btn-prof" style="width:100%">Atualizar Foto</button>
      </form>
    </div>

  </div>
</div>

<script>
  let userCache = {};

  function carregarDadosPerfil(user) {
     console.log("🛡️ [MILITARY LOG] Profile Injetado e Iniciado.");

     if(!user) {
        alert("Erro de sessão. Faça login novamente.");
        return;
     }

     userCache = user; 

     try {
        const setTextSafe = (id, text) => { const el = document.getElementById(id); if(el) el.textContent = text; };
        const setSrcSafe = (id, src) => { const el = document.getElementById(id); if(el) el.src = src; };

        // Fallback UI Avatars Dinâmico
        const nomeLimpo = encodeURIComponent(user.nomeCompleto || 'Aluno');
        const fallback = `https://ui-avatars.com/api/?name=${nomeLimpo}&background=1e1e1e&color=fff&size=200`;
        
        setSrcSafe('p-foto', user.fotoUrl || fallback);
        setTextSafe('p-nome', user.nomeCompleto || "Nome Indisponível");
        setTextSafe('p-login', "@" + (user.LOGIN || "---"));
        setTextSafe('p-faixa', user.graduacao || "Iniciante");
        setTextSafe('p-academia', user.academia || "---");
        setTextSafe('p-exame', user.proximoExame || "A definir");

        document.getElementById('modal-perfil').style.display = 'flex';

     } catch (e) {
        console.error("🚨 Erro UI Perfil:", e);
     }
  }

  function fecharPerfil() {
     document.getElementById('modal-perfil').style.display = 'none';
     fecharSubModal('modal-senha');
     fecharSubModal('modal-foto');
  }

  function abrirTrocaSenha() { document.getElementById('modal-senha').style.display = 'block'; }
  function abrirEditFoto() { document.getElementById('modal-foto').style.display = 'block'; }
  function fecharSubModal(id) { document.getElementById(id).style.display = 'none'; }

  function salvarNovaSenha(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const txtOrig = btn.innerText;
      btn.innerText = "Enviando..."; btn.disabled = true;

      const form = { cpf: userCache.LOGIN, senha_antiga: document.getElementById('senha-antiga').value, senha_nova: document.getElementById('senha-nova').value };

      google.script.run.withSuccessHandler(res => {
          alert(res); btn.innerText = txtOrig; btn.disabled = false;
          if(res.includes('✅')) { e.target.reset(); fecharSubModal('modal-senha'); }
      }).withFailureHandler(err => {
          alert("Erro: " + err.message); btn.innerText = txtOrig; btn.disabled = false;
      }).trocarSenhaUsuario(form);
  }

  function salvarNovaFoto(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const txtOrig = btn.innerText;
      btn.innerText = "Atualizando..."; btn.disabled = true;
      
      const novoLink = document.getElementById('link-foto').value;
      const form = { aluno_login: userCache.LOGIN, nova_foto: novoLink };

      google.script.run.withSuccessHandler(res => {
          alert(res);
          if(res.includes('✅')) {
              document.getElementById('p-foto').src = novoLink;
              userCache.fotoUrl = novoLink;
              try {
                  const prefix = typeof CacheSystem !== 'undefined' ? CacheSystem.PREFIX : 'fbkmkln_cache_';
                  localStorage.setItem(prefix + 'userSession', JSON.stringify({ value: userCache, expiry: Date.now() + 3600000 }));
              } catch(ex) { }
              try { document.getElementById('header-img').src = novoLink; } catch(ex){}
              fecharSubModal('modal-foto'); e.target.reset();
          }
          btn.innerText = txtOrig; btn.disabled = false;
      }).withFailureHandler(err => {
          alert("Erro: " + err.message); btn.innerText = txtOrig; btn.disabled = false;
      }).atualizarFotoPerfil(form);
  }

  function gerarPDFCarteirinha() { alert("⏳ A geração de PDF da carteirinha estará disponível na próxima atualização!"); }
</script>
