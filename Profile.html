<style>
  /* --- ESTILOS DO MODAL DE PERFIL --- */
  .profile-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(5px);
    z-index: 10000;
    display: none;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
  }

  .profile-card {
    /* Usa a Cor Secundária (Fundo do Card) */
    background-color: var(--dynamic-sec) !important;
    /* Borda com a Cor Primária (Marca) */
    border: 2px solid var(--dynamic-prim) !important;
    border-radius: 20px;
    width: 100%;
    max-width: 380px;
    padding: 30px;
    text-align: center;
    position: relative;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    /* Cor do Texto Geral */
    color: var(--dynamic-text) !important;
    font-family: 'Roboto', sans-serif;
  }

  /* Detalhe de topo com a Cor Primária */
  .profile-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 4px;
    background-color: var(--dynamic-prim) !important;
    border-radius: 0 0 10px 10px;
  }

  .profile-img-container {
    width: 120px;
    height: 120px;
    margin: 20px auto;
    border-radius: 50%;
    padding: 4px;
    position: relative;
    /* Gradiente entre a Marca e o Fundo Geral */
    background: linear-gradient(45deg, var(--dynamic-prim), var(--dynamic-bg));
  }

  .profile-img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid var(--dynamic-sec);
  }

  .edit-photo-btn {
    position: absolute;
    bottom: 0;
    right: 0;
    background-color: var(--dynamic-prim) !important;
    color: var(--dynamic-btn-text) !important;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 2px solid var(--dynamic-sec);
    transition: 0.2s;
  }

  .profile-name {
    font-size: 1.5rem;
    font-weight: 900;
    margin-bottom: 5px;
  }

  .profile-login {
    font-size: 0.9rem;
    opacity: 0.6;
    margin-bottom: 20px;
    font-family: monospace;
  }

  /* Badge da Faixa/Graduação */
  .profile-badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 20px;
    background-color: rgba(0, 0, 0, 0.2);
    color: var(--dynamic-prim) !important;
    border: 1px solid var(--dynamic-prim) !important;
    font-weight: 900;
    text-transform: uppercase;
    font-size: 0.85rem;
    margin-bottom: 25px;
  }

  .profile-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    background: rgba(0, 0, 0, 0.15);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 25px;
  }

  .stat-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .stat-value {
    font-size: 0.95rem;
    font-weight: 900;
  }

  /* Botões de Ação */
  .btn-profile-main {
    background-color: var(--dynamic-prim) !important;
    color: var(--dynamic-btn-text) !important;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-weight: 900;
    cursor: pointer;
    transition: 0.2s;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-profile-outline {
    background: transparent;
    border: 1px solid var(--dynamic-text) !important;
    color: var(--dynamic-text) !important;
    padding: 12px;
    border-radius: 8px;
    font-weight: 900;
    cursor: pointer;
    transition: 0.2s;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0.7;
  }

  .btn-profile-outline:hover {
    opacity: 1;
    background: rgba(255, 255, 255, 0.05);
  }

  /* Sub-modais de edição */
  .sub-modal {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 320px;
    background-color: var(--dynamic-sec) !important;
    border: 2px solid var(--dynamic-prim) !important;
    border-radius: 12px;
    padding: 20px;
    display: none;
    z-index: 10001;
  }

  .sub-input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--dynamic-text);
    border-radius: 6px;
    box-sizing: border-box;
  }
</style>

<div id="modal-perfil" class="profile-overlay">
  <div class="profile-card">
    <div class="profile-img-container">
      <img id="p-foto" src="" class="profile-img" onerror="this.src='https://ui-avatars.com/api/?name=User&background=333&color=fff'">
      <div class="edit-photo-btn" onclick="abrirEditFoto()">
        <span class="material-icons" style="font-size:16px">edit</span></div>
    </div>

    <div id="p-nome" class="profile-name">Carregando...</div>
    <div id="p-login" class="profile-login">@usuario</div>
    <div id="p-faixa" class="profile-badge">FAIXA</div>

    <div class="profile-stats">
      <div class="stat-item" style="border-right: 1px solid rgba(255,255,255,0.1);">
        <span class="stat-label">Academia</span>
        <span id="p-academia" class="stat-value">...</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Próximo Exame</span>
        <span id="p-exame" class="stat-value">...</span>
      </div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:15px">
      <button class="btn-profile-outline" onclick="abrirTrocaSenha()">
        <span class="material-icons" style="font-size:18px">lock</span> Senha
      </button>
      <button class="btn-profile-main" onclick="gerarPDFCarteirinha()">
        <span class="material-icons" style="font-size:18px">badge</span> Carteira
      </button>
    </div>

    <button class="btn-profile-outline" style="width:100%" onclick="fecharPerfil()">
      <span class="material-icons">arrow_back</span> VOLTAR
    </button>

    <div id="modal-senha" class="sub-modal">
      <h4 style="margin-top:0; color:var(--dynamic-prim)">Alterar Senha</h4>
      <form onsubmit="salvarNovaSenha(event)">
        <input type="password" id="senha-antiga" class="sub-input" placeholder="Senha Atual" required>
        <input type="password" id="senha-nova" class="sub-input" placeholder="Nova Senha" required>
        <button type="submit" class="btn-profile-main" style="width:100%">SALVAR</button>
        <button type="button" class="btn-profile-outline" style="width:100%; margin-top:10px; border:none !important" onclick="fecharSubModal('modal-senha')">CANCELAR</button>
      </form>
    </div>

    <div id="modal-foto" class="sub-modal">
      <h4 style="margin-top:0; color:var(--dynamic-prim)">Nova Foto</h4>
      <p style="font-size:12px; opacity:0.7">Cole a URL da sua foto (Drive ou Web).</p>
      <form onsubmit="salvarNovaFoto(event)">
        <input type="text" id="link-foto" class="sub-input" placeholder="https://..." required>
        <button type="submit" class="btn-profile-main" style="width:100%">ATUALIZAR</button>
        <button type="button" class="btn-profile-outline" style="width:100%; margin-top:10px; border:none !important" onclick="fecharSubModal('modal-foto')">CANCELAR</button>
      </form>
    </div>
  </div>
</div>

<script>
  // Cache seguro do usuário para operações de edição
  let userCache = {};

  /**
   * CARREGAMENTO BLINDADO DE PERFIL
   */
  function carregarDadosPerfil(user) {
     console.log("[PROFILE] Iniciando renderização...", user);

     // 1. Verificação de Segurança
     if(!user) {
        console.error("[PROFILE] Erro: Objeto user é null.");
        alert("Erro de sessão. Faça login novamente.");
        return;
     }

     userCache = user; // Armazena para uso nas edições

     try {
        const setTextSafe = (id, text) => {
           const el = document.getElementById(id);
           if(el) el.textContent = text;
        };
        const setSrcSafe = (id, src) => {
           const el = document.getElementById(id);
           if(el) el.src = src;
        };

        // 2. Preenchimento de Dados
        setSrcSafe('p-foto', user.fotoUrl || "https://lh3.googleusercontent.com/d/1mVV2idWbyfoOP4EV76I1fHV_PaoEUcdv");
        setTextSafe('p-nome', user.nomeCompleto || "Nome Indisponível");
        setTextSafe('p-login', "@" + (user.LOGIN || "---"));
        setTextSafe('p-faixa', user.graduacao || "Iniciante");
        
        setTextSafe('p-academia', user.academia || "---");
        setTextSafe('p-exame', user.proximoExame || "A definir");

        // 3. Exibição
        const modal = document.getElementById('modal-perfil');
        if(modal) modal.style.display = 'flex';

     } catch (e) {
        console.error("[PROFILE] Exceção:", e);
        alert("Erro ao abrir perfil.");
     }
  }

  function fecharPerfil() {
     const modal = document.getElementById('modal-perfil');
     if(modal) modal.style.display = 'none';
     fecharSubModal('modal-senha');
     fecharSubModal('modal-foto');
  }

  // --- SUB-MODAIS ---
  function abrirTrocaSenha() { document.getElementById('modal-senha').style.display = 'block'; }
  function abrirEditFoto() { document.getElementById('modal-foto').style.display = 'block'; }
  function fecharSubModal(id) { document.getElementById(id).style.display = 'none'; }

  // --- LÓGICA DE AÇÃO DO USUÁRIO ---

  function salvarNovaSenha(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const txtOrig = btn.innerText;
      btn.innerText = "..."; btn.disabled = true;

      const form = {
          cpf: userCache.LOGIN, // Mapeia LOGIN para o campo que o backend espera (cpf)
          senha_antiga: document.getElementById('senha-antiga').value,
          senha_nova: document.getElementById('senha-nova').value
      };

      google.script.run
        .withSuccessHandler(res => {
            alert(res);
            btn.innerText = txtOrig; btn.disabled = false;
            if(res.includes('✅')) { e.target.reset(); fecharSubModal('modal-senha'); }
        })
        .withFailureHandler(err => {
            alert("Erro: " + err.message);
            btn.innerText = txtOrig; btn.disabled = false;
        })
        .trocarSenhaUsuario(form);
  }

  function salvarNovaFoto(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const txtOrig = btn.innerText;
      btn.innerText = "..."; btn.disabled = true;
      
      const novoLink = document.getElementById('link-foto').value;
      const form = {
          aluno_login: userCache.LOGIN,
          nova_foto: novoLink
      };

      google.script.run
        .withSuccessHandler(res => {
            alert(res);
            if(res.includes('✅')) {
                // Atualiza visualmente e no cache local
                document.getElementById('p-foto').src = novoLink;
                userCache.fotoUrl = novoLink;
                localStorage.setItem('userSession', JSON.stringify(userCache));
                // Tenta atualizar header se possível
                try { document.getElementById('header-img').src = novoLink; } catch(ex){}
                fecharSubModal('modal-foto');
                e.target.reset();
            }
            btn.innerText = txtOrig; btn.disabled = false;
        })
        .withFailureHandler(err => {
            alert("Erro: " + err.message);
            btn.innerText = txtOrig; btn.disabled = false;
        })
        .atualizarFotoPerfil(form);
  }

  function gerarPDFCarteirinha() {
     // Placeholder mantido conforme solicitado
     alert("⏳ A geração de PDF estará disponível na próxima atualização!");
  }
</script>
