<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    /* ============================================================================
       INJEÇÃO DE CORES COM FALLBACK SEGURO
       ============================================================================ */
    :root {
      --dynamic-bg: <?=typeof bgColor !=='undefined'&& bgColor ? bgColor: '#121212'?> !important;
      --dynamic-prim: <?=typeof primaryColor !=='undefined'&& primaryColor ? primaryColor: '#FFD700'?> !important;
      --dynamic-sec: <?=typeof secondaryColor !=='undefined'&& secondaryColor ? secondaryColor: '#1e1e1e'?> !important;
      --dynamic-text: <?=typeof textColor !=='undefined'&& textColor ? textColor: '#ffffff'?> !important;
      --dynamic-btn-text: <?=typeof btnTextColor !=='undefined'&& btnTextColor ? btnTextColor: '#000000'?> !important;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--dynamic-bg);
      /* Caso você passe uma URL de fundo para essa página pelo backend */
      background-image: url('<?= typeof bgUrl !== "undefined" ? bgUrl : "" ?>');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Roboto', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--dynamic-text);
    }

    /* Película escura caso tenha imagem de fundo */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: -1;
    }

    .rec-card {
      background-color: var(--dynamic-sec);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
      width: 90%;
      max-width: 360px;
      text-align: center;
      border: 2px solid var(--dynamic-prim);
      box-sizing: border-box;
      animation: fadeIn 0.4s ease-out;
    }

    h2 {
      margin-bottom: 10px;
      color: var(--dynamic-prim);
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    p {
      font-size: 13px;
      color: var(--dynamic-text);
      opacity: 0.7;
      margin-bottom: 25px;
      line-height: 1.4;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 5px;
      color: var(--dynamic-text);
      opacity: 0.8;
      font-size: 11px;
      font-weight: bold;
    }

    .input-field {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background-color: rgba(0, 0, 0, 0.4);
      color: var(--dynamic-text);
      font-size: 14px;
      box-sizing: border-box;
      transition: 0.3s;
    }

    .input-field:focus {
      border-color: var(--dynamic-prim);
      outline: none;
      background-color: rgba(0, 0, 0, 0.6);
      box-shadow: 0 0 5px var(--dynamic-prim);
    }

    .btn-action {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background-color: var(--dynamic-prim);
      color: var(--dynamic-btn-text);
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 15px;
      text-transform: uppercase;
    }

    .btn-action:hover {
      filter: brightness(1.15);
      transform: translateY(-2px);
    }

    .btn-back {
      background: transparent;
      color: var(--dynamic-text);
      border: 1px solid rgba(255, 255, 255, 0.3);
      margin-top: 10px;
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--dynamic-text);
      color: var(--dynamic-text);
    }

    .alert-box {
      margin-top: 15px;
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      display: none;
    }

    .alert-error {
      background: rgba(244, 67, 54, 0.1);
      color: #ff5252;
      border: 1px solid #ff5252;
    }

    .alert-success {
      background: rgba(76, 175, 80, 0.1);
      color: #4caf50;
      border: 1px solid #4caf50;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="overlay"></div>

  <div class="rec-card">
    <span style="font-size:48px; color:var(--dynamic-prim); display:block; margin-bottom:10px;">🔒</span>

    <h2>Redefinir Senha</h2>
    <p>Para sua segurança, é necessário confirmar sua <b>senha atual</b> para definir uma nova.</p>

    <form id="form-reset" onsubmit="handleReset(event)">

      <div class="input-group">
        <label>SEU CPF (Somente números)</label>
        <input type="text" id="cpf" class="input-field" placeholder="000.000.000-00" required>
      </div>

      <div class="input-group">
        <label>SENHA ATUAL (Antiga)</label>
        <input type="password" id="senha_antiga" class="input-field" placeholder="••••••" required>
      </div>

      <div class="input-group">
        <label>NOVA SENHA</label>
        <input type="password" id="senha_nova" class="input-field" placeholder="Digite uma senha forte" required>
      </div>

      <div class="input-group">
        <label>CONFIRMAR NOVA SENHA</label>
        <input type="password" id="senha_confirma" class="input-field" placeholder="Repita a nova senha" required>
      </div>

      <button type="submit" class="btn-action" id="btn-submit">SALVAR NOVA SENHA</button>
      <button type="button" class="btn-action btn-back" onclick="voltarLogin()">VOLTAR AO LOGIN</button>
    </form>

    <div id="feedback" class="alert-box"></div>

    <div style="margin-top:25px; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px;">
      <p style="margin:0; font-size:11px; color:var(--dynamic-text); opacity:0.6;">
        <span style="color:var(--dynamic-prim); font-weight:bold;">⚠️ Esqueceu a senha antiga?</span><br>
          Por segurança, o reset forçado só pode ser feito diretamente na secretaria da sua Unidade.
      </p>
    </div>
  </div>

  <script>
    console.log("✅ [SAFE MODE] RecuperarSenha.html carregado (White-Label)");

    function handleReset(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        const feedback = document.getElementById('feedback');
        
        const cpf = document.getElementById('cpf').value.trim();
        const antiga = document.getElementById('senha_antiga').value;
        const nova = document.getElementById('senha_nova').value;
        const confirma = document.getElementById('senha_confirma').value;

        if(nova !== confirma) {
            mostrarErro("A nova senha e a confirmação não coincidem.");
            return;
        }
        if(nova.length < 4) {
            mostrarErro("A nova senha deve ter no mínimo 4 caracteres.");
            return;
        }

        btn.innerText = "VERIFICANDO DADOS...";
        btn.disabled = true;
        feedback.style.display = 'none';

        const form = { cpf: cpf, senha_antiga: antiga, senha_nova: nova };

        google.script.run
          .withSuccessHandler(res => {
              feedback.className = "alert-box alert-success";
              feedback.innerText = res;
              feedback.style.display = "block";
              btn.innerText = "SUCESSO!";
              
              setTimeout(() => { voltarLogin(); }, 2000);
          })
          .withFailureHandler(err => {
              btn.innerText = "SALVAR NOVA SENHA";
              btn.disabled = false;
              mostrarErro(err.message);
          })
          .trocarSenhaUsuario(form);
      }

      function mostrarErro(msg) {
        const fb = document.getElementById('feedback');
        fb.className = "alert-box alert-error";
        fb.innerText = msg;
        fb.style.display = "block";
      }

      function voltarLogin() {
        google.script.run.withSuccessHandler(url => {
            window.top.location.href = url + "?page=login";
        }).getScriptUrl();
      }
  </script>
</body>

</html>
