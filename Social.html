<style>
  /* ============================================================================
     INJEÇÃO DE CORES COM FALLBACK SEGURO
     ============================================================================ */
  :root {
    --dynamic-bg: <?=typeof bgColor !=='undefined'&& bgColor ? bgColor: '#121212'?> !important;
    --dynamic-prim: <?=typeof primaryColor !=='undefined'&& primaryColor ? primaryColor: '#FFD700'?> !important;
    --dynamic-sec: <?=typeof secondaryColor !=='undefined'&& secondaryColor ? secondaryColor: '#1e1e1e'?> !important;
    --dynamic-text: <?=typeof textColor !=='undefined'&& textColor ? textColor: '#ffffff'?> !important;
    --dynamic-btn-text: <?=typeof btnTextColor !=='undefined'&& btnTextColor ? btnTextColor: '#000000'?> !important;
  }

  /* --- ESTILOS GERAIS --- */
  .social-view {
    display: none;
    animation: fadeIn 0.3s ease-out;
    padding-top: 20px;
    padding-bottom: 40px;
    max-width: 600px;
    margin: 0 auto;
    text-align: center;
  }

  /* CABEÇALHO PADRÃO */
  .profile-header-nav {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 30px;
    padding: 0 15px;
  }

  .btn-back-social {
    background: transparent;
    border: 1px solid var(--dynamic-text);
    color: var(--dynamic-text);
    opacity: 0.6;
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
  }

  .btn-back-social:hover {
    opacity: 1;
    border-color: var(--dynamic-prim);
    color: var(--dynamic-prim);
    transform: translateX(-3px);
  }

  /* CONTAINER E TEXTOS */
  .social-container {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 0 15px;
  }

  .social-desc {
    color: var(--dynamic-text);
    opacity: 0.8;
    margin-bottom: 35px;
    font-size: 1rem;
    line-height: 1.6;
    padding: 0 20px;
  }

  /* BOTÕES DE REDES SOCIAIS (Preservam a cor da marca oficial) */
  .btn-social {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    padding: 18px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 900;
    font-size: 1.1rem;
    color: #ffffff !important;
    /* Sempre branco para contrastar com as marcas */
    transition: transform 0.2s, filter 0.2s, box-shadow 0.2s;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .btn-social:hover {
    transform: translateY(-5px);
    filter: brightness(1.1);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
  }

  .btn-social .material-icons {
    font-size: 32px;
  }

  .btn-yt {
    background: #FF0000;
    /* Vermelho YouTube */
  }

  .btn-insta {
    background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    /* Gradiente Instagram */
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>

<div id="social-screen" class="social-view">

  <div class="profile-header-nav">
    <button class="btn-back-social" onclick="fecharSocial()">
      <span class="material-icons" style="font-size: 28px;">arrow_back</span>
    </button>
    <h2 style="margin:0; font-size:1.8rem; font-weight:900; color:var(--dynamic-text);">Mídias Sociais</h2>
  </div>

  <p class="social-desc">
    Siga <b style="color:var(--dynamic-prim);">nossos perfis oficiais</b> nas redes sociais para ficar por dentro das
    novidades, eventos, seminários e dicas exclusivas de treino.
  </p>

  <div class="social-container">
    <a href="#" id="btn-link-yt" target="_blank" class="btn-social btn-yt">
      <span class="material-icons">smart_display</span> Acessar Canal no YouTube
    </a>

    <a href="#" id="btn-link-insta" target="_blank" class="btn-social btn-insta">
      <span class="material-icons">camera_alt</span> Seguir no Instagram
    </a>
  </div>

</div>

<script>
  console.log("✅ [SAFE MODE] Social.html corrigido (Lendo variáveis globais)");

  function abrirSocial() {
    document.getElementById('dashboard-grid').style.display = 'none';
    document.querySelector('.dashboard-header').style.display = 'none';
    document.getElementById('social-screen').style.display = 'block';

    // Injeta os links reais nos botões usando as variáveis globais do Dashboard!
    document.getElementById('btn-link-yt').href = LINK_YT_APP;
    document.getElementById('btn-link-insta').href = LINK_INSTA_APP;
  }

  function fecharSocial() {
    document.getElementById('social-screen').style.display = 'none';
    document.querySelector('.dashboard-header').style.display = 'flex';
    document.getElementById('dashboard-grid').style.display = 'grid';
  }
</script>
