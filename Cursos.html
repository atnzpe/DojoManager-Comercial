<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
  /* Injeta as cores para garantir que o CSS interno as reconheça caso o arquivo seja carregado solto */
  :root {
    --primary-color: <?=primaryColor ?> !important;
    --secondary-color: <?=secondaryColor ?> !important;
    --text-color: <?=textColor ?> !important;
    --btn-text-color: <?=btnTextColor ?> !important;
  }
</style>



<style>
  /* --- ESTILOS GERAIS DA TELA DE CURSOS --- */
  .cursos-view {
    display: none;
    animation: fadeIn 0.3s ease-in-out;
    padding-top: 20px;
    padding-bottom: 40px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
    box-sizing: border-box;
    /* Evita que o fundo do Dashboard transborde e prejudique a leitura, 
       mas ainda permite que a imagem de fundo principal (body) apareça */
    background: transparent;
  }

  /* HEADER DE NAVEGAÇÃO */
  .profile-header-nav {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
    padding: 0 20px;
  }

  .btn-back {
    background: none;
    border: none;
    color: var(--text-color, #fff);
    cursor: pointer;
    padding: 0;
    display: block;
    transition: transform 0.2s;
  }

  .btn-back:hover {
    transform: scale(1.1);
    color: var(--primary-color);
  }

  /* FILTROS */
  .filter-container {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 10px;
  }

  .filter-chip {
    background: rgba(0, 0, 0, 0.4);
    color: var(--text-color);
    opacity: 0.7;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.2);
    transition: all 0.3s;
    font-weight: 500;
  }

  .filter-chip:hover {
    background: rgba(0, 0, 0, 0.6);
    opacity: 1;
    border-color: var(--text-color);
  }

  .filter-chip.active {
    background: var(--primary-color);
    color: var(--btn-text-color, #000);
    border-color: var(--primary-color);
    font-weight: bold;
    opacity: 1;
  }

  /* GRID DE CURSOS */
  .courses-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    padding: 20px;
  }

  .course-card {
    background: var(--secondary-color, #1e1e1e);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s, border-color 0.2s;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
  }

  .course-card:hover {
    transform: translateY(-4px);
    border-color: var(--primary-color);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
  }

  /* IMAGEM COM ZOOM */
  .course-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    background: #000;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    cursor: zoom-in;
    transition: opacity 0.2s;
  }

  .course-img:hover {
    opacity: 0.9;
  }

  .course-content {
    padding: 15px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* STATUS BADGES */
  .status-badge {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    margin-bottom: 10px;
    text-transform: uppercase;
    align-self: flex-start;
  }

  .st-abertas {
    background: rgba(46, 139, 87, 0.2);
    color: #4caf50;
    border: 1px solid #2e8b57;
  }

  .st-breve {
    background: rgba(255, 193, 7, 0.2);
    color: #ffc107;
    border: 1px solid #ffc107;
  }

  .st-encerradas {
    background: rgba(244, 67, 54, 0.2);
    color: #f44336;
    border: 1px solid #d32f2f;
  }

  .course-title {
    font-size: 1.1rem;
    font-weight: bold;
    color: var(--text-color, #fff);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .course-meta {
    font-size: 0.85rem;
    color: var(--text-color);
    opacity: 0.7;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* DESCRIÇÃO COM SCROLL */
  .course-desc {
    font-size: 0.9rem;
    color: var(--text-color);
    opacity: 0.8;
    margin: 10px 0 15px 0;
    line-height: 1.5;
    flex: 1;
    max-height: 150px;
    overflow-y: auto;
    display: block;
    padding-right: 5px;
  }

  .course-desc::-webkit-scrollbar {
    width: 4px;
  }

  .course-desc::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.2);
  }

  .course-desc::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 2px;
  }

  /* BOTÃO INSCRIÇÃO */
  .btn-inscricao {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    font-size: 13px;
    transition: background 0.2s, filter 0.2s;
    margin-top: auto;
  }

  .btn-inscricao.primary {
    background: var(--primary-color, #ffd700);
    color: var(--btn-text-color, #000);
  }

  .btn-inscricao.primary:hover {
    filter: brightness(1.1);
  }

  .btn-inscricao.disabled {
    background: rgba(0, 0, 0, 0.5);
    color: #666;
    cursor: not-allowed;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .spinner-cursos {
    border: 4px solid rgba(255, 255, 255, 0.1);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border-left-color: var(--primary-color);
    animation: spin 1s linear infinite;
    margin: 0 auto;
  }

  /* LIGHTBOX (MODAL DE ZOOM) */
  #lightbox-modal {
    display: none;
    position: fixed;
    z-index: 10000;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.9);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    animation: fadeIn 0.2s;
    backdrop-filter: blur(5px);
  }

  #lightbox-img {
    max-width: 90%;
    max-height: 80vh;
    border: 2px solid var(--primary-color);
    border-radius: 8px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
  }

  .lightbox-close {
    margin-top: 20px;
    color: var(--text-color, #fff);
    font-size: 1.2rem;
    cursor: pointer;
    background: var(--secondary-color, #333);
    padding: 10px 20px;
    border-radius: 30px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    transition: 0.2s;
  }

  .lightbox-close:hover {
    background: var(--primary-color);
    color: var(--btn-text-color);
  }

  @keyframes spin {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }

    to {
      opacity: 1;
    }
  }
</style>

<div id="cursos-screen" class="cursos-view">

  <div class="profile-header-nav" id="cursos-header-nav">
    <button id="btn-back-cursos" class="btn-back" onclick="fecharCursos()">
       <span class="material-icons" style="font-size: 32px">arrow_back</span>
    </button>
    <h2 style="margin: 0; font-size: 1.8rem; color: var(--text-color, #fff);">Cursos e Eventos</h2>
  </div>

  <div class="filter-container">
    <div class="filter-chip active" onclick="filtrarCursos('Abertas', this)">Inscrições Abertas</div>
    <div class="filter-chip" onclick="filtrarCursos('Breve', this)">Em Breve</div>
    <div class="filter-chip" onclick="filtrarCursos('Encerradas', this)">Encerrados</div>
  </div>

  <div id="loading-cursos" style="text-align: center; margin-top: 50px">
    <div class="spinner-cursos"></div>
    <p style="color: var(--text-color); opacity: 0.7; margin-top: 10px">Carregando agenda...</p>
  </div>

  <div id="cursos-grid" class="courses-grid"></div>

  <div id="empty-msg"
    style="text-align: center; color: var(--text-color); opacity: 0.5; display: none; margin-top: 30px">
    Nenhum evento encontrado nesta categoria.
  </div>
</div>

<div id="lightbox-modal" onclick="fecharLightbox()">
  <img id="lightbox-img" src="" onclick="event.stopPropagation()">
  <button class="lightbox-close" onclick="fecharLightbox()">Fechar</button>
</div>

<script>
  console.log("✅ [SAFE MODE] Cursos.html atualizado: White-Label Integrado");

  var todosCursos = [];
  var isUsuarioLogado = false;

  // --- FUNÇÕES DE ZOOM ---
  function abrirLightbox(url) {
      const modal = document.getElementById('lightbox-modal');
      const img = document.getElementById('lightbox-img');
      img.src = url;
      modal.style.display = 'flex';
  }
  
  function fecharLightbox() {
      document.getElementById('lightbox-modal').style.display = 'none';
  }

  function abrirCursos() {
    try {
        const userSession = localStorage.getItem('userSession');
        isUsuarioLogado = (userSession && userSession !== '{}');

        const dashGrid = document.getElementById("dashboard-grid");
        const dashHeader = document.querySelector(".dashboard-header");
        const cursosScreen = document.getElementById("cursos-screen");
        
        const btnBack = document.getElementById('btn-back-cursos');
        if (btnBack) btnBack.style.display = 'block';

        if (dashGrid) dashGrid.style.display = "none";
        if (dashHeader) dashHeader.style.display = "none";
        if (cursosScreen) cursosScreen.style.display = "block";

        const loading = document.getElementById("loading-cursos");
        const grid = document.getElementById("cursos-grid");
        const msg = document.getElementById("empty-msg");

        if (loading) loading.style.display = "block";
        if (grid) grid.innerHTML = "";
        if (msg) msg.style.display = "none";

        if (typeof CacheSystem !== 'undefined') {
            const cached = CacheSystem.get('cursos_list');
            if (cached) {
                renderizarCursos(cached);
                return; 
            }
        }

        if (typeof google !== 'undefined' && google.script) {
            google.script.run
                .withSuccessHandler(function(cursos) {
                    if (typeof CacheSystem !== 'undefined') {
                        CacheSystem.set('cursos_list', cursos, 360);
                    }
                    renderizarCursos(cursos);
                })
                .withFailureHandler(function(err) {
                    if (loading) loading.style.display = "none";
                    console.error("Erro crítico:", err);
                    alert("Erro crítico: " + err.message);
                })
                .getCursosList();
        } else {
            console.error("Ambiente Google Script não detectado.");
        }
    } catch (e) {
        console.error("Erro em abrirCursos:", e);
    }
  }

  function renderizarCursos(cursos) {
    try {
        todosCursos = cursos || [];
        const loading = document.getElementById("loading-cursos");
        if (loading) loading.style.display = "none";
        aplicarFiltro("Abertas");
    } catch (e) {
        console.error("Erro em renderizarCursos:", e);
    }
  }

  function filtrarCursos(status, chipElement) {
    var chips = document.querySelectorAll(".filter-chip");
    for (var i = 0; i < chips.length; i++) chips[i].classList.remove("active");
    if (chipElement) chipElement.classList.add("active");
    aplicarFiltro(status);
  }

  function aplicarFiltro(filtro) {
    try {
        var container = document.getElementById("cursos-grid");
        var msg = document.getElementById("empty-msg");
        
        if (!container) return;
        container.innerHTML = "";

        if (!todosCursos || todosCursos.length === 0) {
            if (msg) msg.style.display = "block";
            return;
        }

        var filtrados = todosCursos.filter(function (c) {
            return (c.status && c.status.toLowerCase().indexOf(filtro.toLowerCase()) !== -1);
        });

        if (filtrados.length === 0) {
            if (msg) msg.style.display = "block";
            return;
        } else {
            if (msg) msg.style.display = "none";
        }

        filtrados.forEach(function (curso) {
            var card = document.createElement("div");
            card.className = "course-card";

            var statusLower = (curso.status || "").toLowerCase();
            var badgeClass = "st-abertas";
            if (statusLower.indexOf("breve") !== -1) badgeClass = "st-breve";
            if (statusLower.indexOf("encerrad") !== -1) badgeClass = "st-encerradas";

            var isAberto = statusLower.indexOf("abertas") !== -1;
            var btnClass = isAberto && curso.linkInscricao ? "btn-inscricao primary" : "btn-inscricao disabled";
            var btnText = "Inscreva-se";
            if (statusLower.indexOf("breve") !== -1) btnText = "Aguarde";
            if (statusLower.indexOf("encerrad") !== -1) btnText = "Encerrado";

            var btnHtml = '<button class="' + btnClass + '">' + btnText + '</button>';
            // Alterado para um Placeholder genérico
            var imgUrl = curso.imagem || "https://via.placeholder.com/400x200/1e1e1e/333?text=Imagem+Indisponivel";

            var metaDataHtml = '';
            if (curso.data) metaDataHtml += '<div class="course-meta"><span class="material-icons" style="font-size:16px">calendar_today</span> ' + curso.data + '</div>';
            if (curso.vagas) metaDataHtml += '<div class="course-meta"><span class="material-icons" style="font-size:16px">group</span> Vagas: ' + curso.vagas + '</div>';

            card.innerHTML = 
                '<img src="' + imgUrl + '" class="course-img" onclick="abrirLightbox(\'' + imgUrl + '\')" onerror="this.src=\'https://via.placeholder.com/400x200/1e1e1e/333?text=Imagem+Indisponivel\'">' +
                '<div class="course-content">' +
                    '<span class="status-badge ' + badgeClass + '">' + (curso.status || "Indefinido") + '</span>' +
                    '<div class="course-title">' + (curso.nome || "Curso sem nome") + '</div>' +
                    metaDataHtml + 
                    '<div class="course-desc">' + (curso.descricao || '') + '</div>' +
                    btnHtml +
                '</div>';
            
            var btn = card.querySelector('button');
            if (btn && !btn.className.includes('lightbox-close')) {
                if (isAberto && curso.linkInscricao) {
                    btn.onclick = function() { window.open(curso.linkInscricao, '_blank'); };
                } else {
                    btn.disabled = true;
                }
            }

            container.appendChild(card);
        });
    } catch (e) {
        console.error("Erro em aplicarFiltro:", e);
    }
  }

  function fecharCursos() {
    try {
        if (isUsuarioLogado && document.getElementById('dashboard-grid')) {
            const cursosScreen = document.getElementById("cursos-screen");
            const dashHeader = document.querySelector(".dashboard-header");
            const dashGrid = document.getElementById("dashboard-grid");

            if (cursosScreen) cursosScreen.style.display = "none";
            if (dashHeader) dashHeader.style.display = "flex";
            if (dashGrid) dashGrid.style.display = "grid";
        } else {
            if (typeof google !== 'undefined' && google.script) {
                 google.script.run.withSuccessHandler(function(url){
                      window.top.location.href = url + "?page=login";
                 }).getScriptUrl();
            }
        }
    } catch (e) {
        console.error("Erro em fecharCursos:", e);
    }
  }

  document.addEventListener("DOMContentLoaded", function() {
      if (!document.getElementById('dashboard-grid')) {
          console.log("🚀 [AUTO-START] Modo Visitante.");
          abrirCursos();
      }
  });
</script>
