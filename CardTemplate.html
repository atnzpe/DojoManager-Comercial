<!DOCTYPE html>
<html>

<head>
  <style>
    /* ============================================================================
       CONFIGURAÇÕES DE IMPRESSÃO (A4) E RESET
       ============================================================================ */
    @page {
      margin: 0;
      size: A4 portrait;
    }

    body {
      margin: 0;
      padding: 20mm;
      /* Afasta da borda da folha A4 */
      font-family: 'Helvetica', 'Arial', sans-serif;
      -webkit-print-color-adjust: exact;
      background-color: #ffffff;
      /* Fundo sempre branco para impressão */
    }

    /* --- Container do Cartão (Medidas Oficiais ISO 7810 - CR80) --- */
    .card {
      position: relative;
      width: 85.6mm;
      height: 53.98mm;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      page-break-inside: avoid;
      margin-bottom: 10mm;
      border: 1px dashed #cccccc;
      /* Guia de corte suave */
      border-radius: 3mm;
      /* Borda levemente arredondada como um cartão real */
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    /* --- Tipografia Padrão --- */
    .field {
      position: absolute;
      color: #000080;
      /* Azul Marinho (Contraste alto) */
      font-size: 8pt;
      line-height: 1.2;
      text-transform: uppercase;
      font-weight: bold;
    }

    .label {
      font-weight: normal;
      font-size: 6pt;
      display: block;
      margin-bottom: 2px;
      color: #555555;
      /* Rótulo mais discreto */
    }

    /* --- POSICIONAMENTO FRENTE --- */
    .photo-box {
      position: absolute;
      top: 18mm;
      left: 5mm;
      width: 22mm;
      height: 29mm;
      object-fit: cover;
      border: 1.5px solid #000080;
      /* Borda da foto */
      background: #ffffff;
      border-radius: 2px;
    }

    .frente-nome {
      top: 18mm;
      left: 32mm;
      width: 50mm;
    }

    .frente-grad {
      top: 28mm;
      left: 32mm;
      width: 50mm;
    }

    .frente-acad {
      top: 38mm;
      left: 32mm;
      width: 50mm;
    }

    /* --- POSICIONAMENTO VERSO --- */
    .verso-cpf {
      top: 10mm;
      left: 6mm;
    }

    .verso-filiacao {
      top: 18mm;
      left: 6mm;
      width: 60mm;
    }

    .verso-nasc-box {
      top: 32mm;
      left: 6mm;
    }

    .verso-validade-box {
      top: 32mm;
      left: 45mm;
    }

    .verso-validade-val {
      font-weight: bold;
      color: #d32f2f;
      /* Validade em vermelho para destaque */
      font-size: 9pt;
      background: rgba(255, 255, 255, 0.8);
      /* Fundo branco leve para leitura */
      padding: 1px 4px;
      border-radius: 2px;
    }

    .disclaimer {
      position: absolute;
      top: 4mm;
      width: 100%;
      text-align: center;
      font-size: 5pt;
      color: #555555;
      font-style: normal;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .rodape-verso {
      position: absolute;
      bottom: 4mm;
      left: 6mm;
      font-size: 5.5pt;
      color: #333333;
      line-height: 1.3;
    }
  </style>
</head>

<body>

  <div class="card" style="background-image: url('<?= bgFrente ?>');">
    <img src="<?= fotoUrl ?>" class="photo-box" onerror="this.src='https://ui-avatars.com/api/?background=random&color=fff&name=<?= encodeURIComponent(nome) ?>'">

    <div class="field frente-nome">
      <span class="label">NOME COMPLETO</span>
      <?= nome ?>
    </div>

    <div class="field frente-grad">
      <span class="label">GRADUAÇÃO ATUAL</span>
      <?= graduacao ?>
    </div>

    <div class="field frente-acad">
      <span class="label">ACADEMIA / UNIDADE</span>
      <?= academia ?>
    </div>
  </div>

  <div class="card" style="background-image: url('<?= bgVerso ?>');">
    <div class="disclaimer">Documento de identificação interno desportivo</div>

    <div class="field verso-cpf">
      <span class="label">REGISTRO (CPF)</span>
      <?= cpf ?>
    </div>

    <div class="field verso-filiacao">
      <span class="label">FILIAÇÃO (PAI / MÃE)</span>
      <?= filiacao ?>
    </div>

    <div class="field verso-nasc-box">
      <span class="label">DATA DE NASCIMENTO</span>
      <?= nascimento ?>
    </div>

    <div class="field verso-validade-box">
      <span class="label">VALIDADE OFICIAL</span>
      <span class="verso-validade-val"><?= validade ?></span>
    </div>

    <div class="rodape-verso">
      <b>Data de Emissão:</b>
      <?= emissao ?><br>
      <b>Sistema:</b> DojoManager SaaS
    </div>
  </div>

</body>

</html>
