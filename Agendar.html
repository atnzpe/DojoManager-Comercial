  <style>
    /* --- ESTILOS EXCLUSIVOS DESTE MÓDULO (LEAD CONVERSION) --- */
    body {
      background-color: transparent !important;
    }

    .bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('<?= bgUrl ?>');

      background-position: center;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      z-index: -1;
    }

    .agendar-container {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      min-height: 100vh;
      animation: fadeIn 0.4s ease-out;
    }

    .header-nav {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);

      flex: 1;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 900;

      text-transform: uppercase;

      display: none;

      border: 1px solid rgba(255, 255, 255, 0.1);

      animation: slideUp 0.4s ease-out;

    .academy-name {
      margin-top: 0;
      color: var(--primary-color);
      font-size: 1.3rem;
      margin-bottom: 15px;
      text-transform: uppercase;
      font-weight: 900;
    }

    .detail-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      align-items: flex-start;

    .d-icon {

      font-size: 20px;
      margin-top: 2px;

    .d-text {
      color: var(--text-color);
      opacity: 0.9;

    .map-embed {
      width: 100%;
      height: 180px;

      border-radius: 8px;

      width: 100% !important;

      border: 0;
    }

    /* 🚨 ESTILOS DOS CHIPS DE TURMAS (NOVIDADE) */
    .turmas-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;

      margin-bottom: 15px;
    }

    .chip-turma {
      background: rgba(0, 0, 0, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .chip-turma:hover {
      background: rgba(0, 0, 0, 0.5);
    }

    .chip-turma.selected {
      border-color: var(--primary-color);
      background: rgba(255, 215, 0, 0.1);
      /* Um brilho subtil da cor principal */
    }

    .chip-title {
      font-weight: 900;
      color: var(--primary-color);
      font-size: 1rem;
    }

    .chip-details {
      font-size: 0.8rem;
      color: var(--text-color);
      opacity: 0.8;
      display: flex;

      gap: 5px;

    .btn-whatsapp {
      background-color: #25D366;
      color: #ffffff;
      width: 100%;
      margin-top: 10px;
      font-size: 1.1rem;
      padding: 16px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.1s;
      text-transform: uppercase;
      box-shadow: 0 4px 10px rgba(37, 211, 102, 0.2);

    .btn-whatsapp:hover {
      background-color: #1ebe57;
      transform: translateY(-2px);
    }

    .btn-whatsapp:active {
      transform: scale(0.98);

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);

        transform: translateY(0);

    }

    @keyframes fadeIn {

<body>
  <div class="bg-layer"></div>
  <div class="overlay"></div>

  <div class="agendar-container">

    <div class="header-nav">
      <button onclick="voltarLogin()" style="background:none; border:none; cursor:pointer; color:var(--text-color); padding:5px;">
        <span class="material-icons" style="font-size: 28px;">arrow_back</span>
      </button>
      <div class="header-title">Aula Experimental</div>
    </div>

    <p class="intro-text">
      Informe o seu nome e escolha a unidade para iniciar o seu treino gratuito.
    </p>

    <div class="form-field">
      <label>Como gostaria de ser chamado?</label>
      <input type="text" id="user-name" class="input-field" placeholder="Seu nome ou apelido">
    </div>

    <div class="form-field">
      <label>Onde deseja treinar?</label>

      <div id="loading-locais" style="text-align:center; color:var(--text-color); opacity: 0.7; padding: 10px;">
        <span class="material-icons spinner" style="display:inline-block; animation: spin 1s linear infinite; color: var(--primary-color);">refresh</span><br>Carregando unidades...
      </div>

      <select id="location-select" class="input-field" style="display:none" onchange="selecionarLocal()">
        <option value="" disabled selected>Toque para selecionar...</option>
      </select>
    </div>

    <div id="details-area">
      <h3 id="sel-nome" class="academy-name">Nome da Academia</h3>

      <div class="detail-row">
        <span class="material-icons d-icon">place</span>
        <span id="sel-end" class="d-text">Endereço...</span>
      </div>

      <div id="map-box" class="map-embed" style="display:none;"></div>

      <div id="area-turmas" style="margin-top:20px; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 15px;">
        <label class="d-text" style="font-weight:900; color:var(--text-color); text-transform:uppercase; font-size:0.85rem;">Selecione a Turma de Interesse:</label>
        <div id="chips-turmas" class="turmas-container"></div>
      </div>

      <button id="btn-finalizar" class="btn-whatsapp" onclick="enviarWhatsApp()">
        <span class="material-icons">chat</span> Agendar Agora
      </button>
    </div>
    <div class="developer-footer">
      ⚡ Powered by <a href="https://wa.me/5581992467787?text=Olá! Gostaria de saber mais sobre o sistema DojoManager."
        target="_blank">DojoManager SaaS</a>
    </div>

  </div>

  <script>
    /**
     * ============================================================================
     * CONTROLLER JAVASCRIPT: Lógica de Agendamento Inteligente (Multi-Tabelas)
     * ============================================================================
     */

    var locaisCache = [];
    var turmasCache = [];
    var localSelecionado = null;
    var turmaSelecionadaObj = null;

    window.onload = function() {
      // Dispara a busca das duas tabelas em simultâneo!
      google.script.run.withSuccessHandler(locais => {
          locaisCache = locais;
          verificarCarregamentoPronto();
      }).getLocaisTreino();

      google.script.run.withSuccessHandler(turmas => {
          turmasCache = turmas;
          verificarCarregamentoPronto();
      }).listarTurmasAdmin();
    };

    function verificarCarregamentoPronto() {
        // Só constrói a tela quando ambas as tabelas chegarem do servidor
        if (locaisCache.length > 0 && turmasCache.length > 0) {
            popularListaLocais();
        }
    }

    function popularListaLocais() {
      var select = document.getElementById('location-select');
      document.getElementById('loading-locais').style.display = 'none';
      select.style.display = 'block';

      if(!locaisCache || locaisCache.length === 0) {
         select.add(new Option("Nenhuma academia disponível no momento", ""));
         select.disabled = true;
         return;
      }

      locaisCache.forEach(function(l) {
         if (String(l.status).toLowerCase() === 'ativo') {
             select.add(new Option(l.nome + (l.cidade ? " (" + l.cidade + ")" : ""), l.nome));
         }
      });
    }

    function selecionarLocal() {
      var nome = document.getElementById('location-select').value;
      localSelecionado = locaisCache.find(function(l) { return l.nome === nome; });
      turmaSelecionadaObj = null; // Reseta a turma escolhida caso ele mude de academia

      if (localSelecionado) {
        document.getElementById('sel-nome').textContent = localSelecionado.nome;
        document.getElementById('sel-end').textContent = localSelecionado.endereco || "Endereço sob consulta";
        
        var mapBox = document.getElementById('map-box');
        mapBox.innerHTML = '';
        mapBox.style.display = 'none';

        if (localSelecionado.iframeHtml && localSelecionado.iframeHtml.includes('<iframe')) {
            try {
                var cleanHtml = localSelecionado.iframeHtml
                    .replace(/width\s*=\s*["']?[^"']*["']?/gi, 'width="100%"')
                    .replace(/height\s*=\s*["']?[^"']*["']?/gi, 'height="100%"')
                    .replace(/""/g, '"');
                mapBox.innerHTML = cleanHtml;
                mapBox.style.display = 'block';
            } catch(e) {}
        }

        // 🚨 RENDERIZAÇÃO DAS TURMAS DO LOCAL
        const turmasDoLocal = turmasCache.filter(t => String(t.local).toLowerCase() === String(localSelecionado.nome).toLowerCase() && t.status === "Ativa");
        const containerTurmas = document.getElementById('chips-turmas');
        containerTurmas.innerHTML = "";

        if (turmasDoLocal.length > 0) {
            turmasDoLocal.forEach(t => {
                const div = document.createElement('div');
                div.className = 'chip-turma';
                div.innerHTML = `
                    <span class="chip-title">${t.nome}</span>
                    <span class="chip-details"><span class="material-icons" style="font-size:14px;">calendar_month</span> ${t.dias}</span>
                    <span class="chip-details"><span class="material-icons" style="font-size:14px;">schedule</span> ${t.inicio} às ${t.fim}</span>
                `;
                
                div.onclick = function() {
                    // Remove seleção visual dos outros botões
                    document.querySelectorAll('.chip-turma').forEach(el => el.classList.remove('selected'));
                    // Adiciona brilho a este botão
                    this.classList.add('selected');
                    turmaSelecionadaObj = t; // Salva o objeto inteiro para usarmos no WhatsApp
                };
                containerTurmas.appendChild(div);
            });
        } else {
            containerTurmas.innerHTML = "<p style='font-size:0.85rem; color:var(--text-color); opacity:0.6; margin:0;'>Nenhuma turma cadastrada. Fale conosco para informações.</p>";
        }

        document.getElementById('details-area').style.display = 'block';
        
        setTimeout(function() {
            document.getElementById('area-turmas').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 150);
      }
    }

    function enviarWhatsApp() {
      var nomeUser = document.getElementById('user-name').value.trim();
      
      if (!nomeUser) {
        alert("Por favor, diga-nos o seu nome primeiro.");
        document.getElementById('user-name').focus();
        return;
      }

      // Se a academia tem turmas cadastradas, obriga a selecionar uma
      const temTurmasNoLocal = document.querySelectorAll('.chip-turma').length > 0;
      if (temTurmasNoLocal && !turmaSelecionadaObj) {
        alert("Por favor, selecione qual turma você tem interesse tocando em uma das opções acima!");
        return;
      }

      if (localSelecionado && localSelecionado.contato) {
        var num = String(localSelecionado.contato).replace(/\D/g, '');

        if (num.length >= 10) {
           if (num.substring(0,2) !== '55') num = '55' + num;
           
           // Constrói a mensagem dinâmica
           var msg = `Olá! Me chamo *${nomeUser}*. Gostaria de agendar uma aula experimental na *${localSelecionado.nome}*.`;
           
           if (turmaSelecionadaObj) {
               msg += `\n\nTenho interesse na turma:\n🥋 *${turmaSelecionadaObj.nome}*\n📅 ${turmaSelecionadaObj.dias}\n⏰ ${turmaSelecionadaObj.inicio} às ${turmaSelecionadaObj.fim}`;
           }
           
           var url = "https://wa.me/" + num + "?text=" + encodeURIComponent(msg);
           window.open(url, '_blank');
        } else {
           alert("O número de WhatsApp desta academia está incorreto no sistema.");
        }
      } else {
        alert("Desculpe, esta unidade não possui telefone de contato cadastrado.");
      }
    }

    function voltarLogin() {
      google.script.run
        .withSuccessHandler(function(url) { window.top.location.href = url + "?page=login"; })
        .getScriptUrl();
    }
  </script>
</body>

</html>
