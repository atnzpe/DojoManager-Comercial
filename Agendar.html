<!DOCTYPE html>
<html lang="pt-br">

<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <meta name="theme-color" content="<?= primaryColor ?>">

  <style>
    /* Injeção das variáveis do backend */
    :root {
      --primary-color: <?=primaryColor ?> !important;
      --secondary-color: <?=secondaryColor ?> !important;
      --text-color: <?=textColor ?> !important;
      --btn-text-color: <?=btnTextColor ?> !important;
    }
  </style>

  <?!= include('Style'); ?>

  <style>
    /* --- ESTILOS DE FUNDO DINÂMICO --- */
    .bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('<?= bgUrl ?>');
      background-size: cover;
      background-position: center;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      z-index: -1;
    }

    /* --- DESIGN SYSTEM (LANDING PAGE) --- */
    body {
      color: var(--text-color, #fff);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: transparent;
    }

    .agendar-container {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* Cabeçalho */
    .header-nav {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header-title {
      flex: 1;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary-color);
      margin-right: 32px;
    }

    .intro-text {
      text-align: center;
      color: var(--text-color);
      opacity: 0.8;
      margin-bottom: 25px;
      font-size: 1rem;
      line-height: 1.5;
    }

    /* Inputs */
    .input-group {
      margin-bottom: 20px;
    }

    .input-label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-color);
      opacity: 0.7;
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
    }

    .custom-input {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.4);
      color: var(--text-color);
      font-size: 1.1rem;
      box-sizing: border-box;
      transition: all 0.3s;
    }

    .custom-input:focus {
      border-color: var(--primary-color);
      outline: none;
      background: rgba(0, 0, 0, 0.6);
    }

    .custom-input option {
      background-color: var(--secondary-color);
      color: var(--text-color);
    }

    /* Card de Detalhes */
    #details-area {
      display: none;
      background: var(--secondary-color);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      margin-top: 10px;
      animation: slideUp 0.4s ease-out;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .academy-name {
      margin-top: 0;
      color: var(--primary-color);
      font-size: 1.3rem;
      margin-bottom: 15px;
    }

    .detail-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      align-items: flex-start;
    }

    .d-icon {
      color: var(--primary-color);
      opacity: 0.8;
      font-size: 20px;
      margin-top: 2px;
    }

    .d-text {
      color: var(--text-color);
      opacity: 0.9;
      font-size: 0.95rem;
      line-height: 1.4;
      flex: 1;
    }

    /* Mapa Responsivo */
    .map-embed {
      width: 100%;
      height: 180px;
      background: #000;
      border-radius: 8px;
      margin: 15px 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .map-embed iframe {
      width: 100% !important;
      height: 100% !important;
      border: 0;
    }

    /* Botão CTA do WhatsApp (Mantido em verde para conversão) */
    .btn-whatsapp {
      background-color: #25D366;
      color: #ffffff;
      /* Fixo branco por ser verde escuro */
      width: 100%;
      margin-top: 10px;
      font-size: 1.1rem;
      padding: 16px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.1s;
      text-transform: uppercase;
      box-shadow: 0 4px 10px rgba(37, 211, 102, 0.2);
    }

    .btn-whatsapp:hover {
      background-color: #1ebe57;
      transform: translateY(-2px);
    }

    .btn-whatsapp:active {
      transform: scale(0.98);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="bg-layer"></div>
  <div class="overlay"></div>

  <div class="agendar-container">

    <div class="header-nav">
      <button onclick="voltarLogin()" style="background:none; border:none; cursor:pointer; color:var(--text-color); padding:5px;">
        <span class="material-icons" style="font-size: 28px;">arrow_back</span>
      </button>
      <div class="header-title">Aula Experimental</div>
    </div>

    <p class="intro-text">
      Informe seu nome e escolha a unidade para iniciar seu treino gratuito.
    </p>

    <div class="input-group">
      <label class="input-label">Como gostaria de ser chamado?</label>
      <input type="text" id="user-name" class="custom-input" placeholder="Seu nome ou apelido">
    </div>

    <div class="input-group">
      <label class="input-label">Onde deseja treinar?</label>

      <div id="loading-locais" style="text-align:center; color:var(--text-color); opacity: 0.7; padding: 10px;">
        <span class="material-icons" style="animation: spin 1s infinite linear; color: var(--primary-color);">refresh</span><br>Carregando unidades...
      </div>

      <select id="location-select" class="custom-input" style="display:none" onchange="selecionarLocal()">
        <option value="" disabled selected>Toque para selecionar...</option>
      </select>
    </div>

    <div id="details-area">
      <h3 id="sel-nome" class="academy-name">Nome da Academia</h3>

      <div class="detail-row">
        <span class="material-icons d-icon">place</span>
        <span id="sel-end" class="d-text">Endereço...</span>
      </div>
      <div class="detail-row">
        <span class="material-icons d-icon">schedule</span>
        <span id="sel-hora" class="d-text">Horários...</span>
      </div>

      <div id="map-box" class="map-embed" style="display:none;"></div>

      <button id="btn-finalizar" class="btn-whatsapp" onclick="enviarWhatsApp()">
        <span class="material-icons">chat</span> Agendar Agora
      </button>
    </div>

  </div>

  <script>
    var locaisCache = [];
    var localSelecionado = null;

    window.onload = function() {
      google.script.run
        .withSuccessHandler(popularLista)
        .withFailureHandler(err => {
           document.getElementById('loading-locais').innerHTML = "<span style='color:#cf6679'>Erro ao carregar locais.</span>";
        })
        .getLocaisTreino();
    };

    function popularLista(locais) {
      locaisCache = locais;
      var select = document.getElementById('location-select');
      
      document.getElementById('loading-locais').style.display = 'none';
      select.style.display = 'block';

      if(!locais || locais.length === 0) {
         var opt = document.createElement('option');
         opt.text = "Nenhuma academia disponível";
         select.add(opt);
         select.disabled = true;
         return;
      }

      locais.forEach(function(l) {
         var opt = document.createElement('option');
         opt.value = l.nome;
         opt.text = l.nome + (l.cidade ? " (" + l.cidade + ")" : "");
         select.add(opt);
      });
    }

    function selecionarLocal() {
      var nome = document.getElementById('location-select').value;
      localSelecionado = locaisCache.find(function(l) { return l.nome === nome; });

      if (localSelecionado) {
        document.getElementById('sel-nome').textContent = localSelecionado.nome;
        document.getElementById('sel-end').textContent = localSelecionado.endereco || "Endereço sob consulta";
        document.getElementById('sel-hora').textContent = (localSelecionado.dias || "") + " " + (localSelecionado.horarios || "");
        
        var mapBox = document.getElementById('map-box');
        mapBox.innerHTML = '';
        mapBox.style.display = 'none';

        if (localSelecionado.iframeHtml && localSelecionado.iframeHtml.includes('<iframe')) {
            try {
                var cleanHtml = localSelecionado.iframeHtml
                    .replace(/width\s*=\s*["']?[^"']*["']?/gi, 'width="100%"')
                    .replace(/height\s*=\s*["']?[^"']*["']?/gi, 'height="100%"')
                    .replace(/""/g, '"');
                mapBox.innerHTML = cleanHtml;
                mapBox.style.display = 'block';
            } catch(e) {}
        }

        document.getElementById('details-area').style.display = 'block';
        
        setTimeout(function() {
            document.getElementById('btn-finalizar').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 150);
      }
    }

    function enviarWhatsApp() {
      var nomeUser = document.getElementById('user-name').value.trim();
      
      if (!nomeUser) {
        alert("Por favor, digite seu nome.");
        document.getElementById('user-name').focus();
        return;
      }

      if (localSelecionado && localSelecionado.contato) {
        var num = localSelecionado.contato.replace(/\D/g, '');
        if (num.length >= 10) {
           if (num.substring(0,2) !== '55') num = '55' + num;
           
           var msg = "Olá! Me chamo *" + nomeUser + "*. Gostaria de agendar uma aula experimental na *" + localSelecionado.nome + "*.";
           
           var url = "https://wa.me/" + num + "?text=" + encodeURIComponent(msg);
           window.open(url, '_blank');
        } else {
           alert("Erro: Número de WhatsApp da academia inválido.");
        }
      } else {
        alert("Esta unidade não possui contato cadastrado.");
      }
    }

    function voltarLogin() {
      google.script.run
        .withSuccessHandler(function(url) { window.top.location.href = url + "?page=login"; })
        .getScriptUrl();
    }
  </script>
</body>

</html>
