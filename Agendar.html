        target="_blank" style="

  <script>
    /**
     * ============================================================================
     * CONTROLLER JAVASCRIPT: Lógica de Agendamento Inteligente (Multi-Tabelas)
     * (MANTIDO 100% ORIGINAL CONFORME SOLICITADO PELO COMANDANTE)
     * ============================================================================
     */

    var locaisCache = [];
    var turmasCache = [];
    var localSelecionado = null;
    var turmaSelecionadaObj = null;

    window.onload = function() {
      // 🛡️ API Pública: Busca locais sem exigir login (Visitantes)
      google.script.run.withSuccessHandler(locais => {
          locaisCache = locais;
          verificarCarregamentoPronto();
      }).getLocaisTreinoPublico();

      // 🛡️ API Pública: Busca turmas sem exigir login (Visitantes)
      google.script.run.withSuccessHandler(turmas => {
          turmasCache = turmas;
          verificarCarregamentoPronto();
      }).listarTurmasPublico();
    };

    function verificarCarregamentoPronto() {
        // Só constrói a tela quando ambas as tabelas chegarem do servidor
        if (locaisCache.length > 0 && turmasCache.length > 0) {
            popularListaLocais();
        }
    }

    function popularListaLocais() {
      var select = document.getElementById('location-select');
      document.getElementById('loading-locais').style.display = 'none';
      select.style.display = 'block';

      if(!locaisCache || locaisCache.length === 0) {
         select.add(new Option("Nenhuma academia disponível no momento", ""));
         select.disabled = true;
         return;
      }

      locaisCache.forEach(function(l) {
         if (String(l.status).toLowerCase() === 'ativo') {
             select.add(new Option(l.nome + (l.cidade ? " (" + l.cidade + ")" : ""), l.nome));
         }
      });
    }

    function selecionarLocal() {
      var nome = document.getElementById('location-select').value;
      localSelecionado = locaisCache.find(function(l) { return l.nome === nome; });
      turmaSelecionadaObj = null; // Reseta a turma escolhida caso ele mude de academia

      if (localSelecionado) {
        document.getElementById('sel-nome').textContent = localSelecionado.nome;
        document.getElementById('sel-end').textContent = localSelecionado.endereco || "Endereço sob consulta";
        
        var mapBox = document.getElementById('map-box');
        mapBox.innerHTML = '';
        mapBox.style.display = 'none';

        if (localSelecionado.iframeHtml && localSelecionado.iframeHtml.includes('<iframe')) {
            try {
                var cleanHtml = localSelecionado.iframeHtml
                    .replace(/width\s*=\s*["']?[^"']*["']?/gi, 'width="100%"')
                    .replace(/height\s*=\s*["']?[^"']*["']?/gi, 'height="100%"')
                    .replace(/""/g, '"');
                mapBox.innerHTML = cleanHtml;
                mapBox.style.display = 'block';
            } catch(e) {}
        }

        // 🚨 RENDERIZAÇÃO DAS TURMAS DO LOCAL
        const turmasDoLocal = turmasCache.filter(t => String(t.local).toLowerCase() === String(localSelecionado.nome).toLowerCase() && t.status === "Ativa");
        const containerTurmas = document.getElementById('chips-turmas');
        containerTurmas.innerHTML = "";

        if (turmasDoLocal.length > 0) {
            turmasDoLocal.forEach(t => {
                const div = document.createElement('div');
                div.className = 'chip-turma';
                div.innerHTML = `
                    <span class="chip-title">${t.nome}</span>
                    <span class="chip-details"><span class="material-icons" style="font-size:14px;">calendar_month</span> ${t.dias}</span>
                    <span class="chip-details"><span class="material-icons" style="font-size:14px;">schedule</span> ${t.inicio} às ${t.fim}</span>
                `;
                
                div.onclick = function() {
                    // Remove seleção visual dos outros botões
                    document.querySelectorAll('.chip-turma').forEach(el => el.classList.remove('selected'));
                    // Adiciona brilho a este botão
                    this.classList.add('selected');
                    turmaSelecionadaObj = t; // Salva o objeto inteiro para usarmos no WhatsApp
                };
                containerTurmas.appendChild(div);
            });
        } else {
            containerTurmas.innerHTML = "<p style='font-size:0.85rem; color:var(--text-color); opacity:0.6; margin:0;'>Nenhuma turma cadastrada. Fale conosco para informações.</p>";
        }

        document.getElementById('details-area').style.display = 'block';
        
        setTimeout(function() {
            document.getElementById('area-turmas').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 150);
      }
    }

    function enviarWhatsApp() {
      var nomeUser = document.getElementById('user-name').value.trim();
      
      if (!nomeUser) {
        alert("Por favor, diga-nos o seu nome primeiro.");
        document.getElementById('user-name').focus();
        return;
      }

      // Se a academia tem turmas cadastradas, obriga a selecionar uma
      const temTurmasNoLocal = document.querySelectorAll('.chip-turma').length > 0;
      if (temTurmasNoLocal && !turmaSelecionadaObj) {
        alert("Por favor, selecione qual turma você tem interesse tocando em uma das opções acima!");
        return;
      }

      if (localSelecionado && localSelecionado.contato) {
        var num = String(localSelecionado.contato).replace(/\D/g, '');

        if (num.length >= 10) {
           if (num.substring(0,2) !== '55') num = '55' + num;
           
           // Constrói a mensagem dinâmica
           var msg = `Olá! Me chamo *${nomeUser}*. Gostaria de agendar uma aula experimental na *${localSelecionado.nome}*.`;
           
           if (turmaSelecionadaObj) {
               msg += `\n\nTenho interesse na turma:\n🥋 *${turmaSelecionadaObj.nome}*\n📅 ${turmaSelecionadaObj.dias}\n⏰ ${turmaSelecionadaObj.inicio} às ${turmaSelecionadaObj.fim}`;
           }
           
           var url = "https://wa.me/" + num + "?text=" + encodeURIComponent(msg);
           window.open(url, '_blank');
        } else {
           alert("O número de WhatsApp desta academia está incorreto no sistema.");
        }
      } else {
        alert("Desculpe, esta unidade não possui telefone de contato cadastrado.");
      }
    }

    function voltarLogin() {
      google.script.run
        .withSuccessHandler(function(url) { window.top.location.href = url + "?page=login"; })
        .getScriptUrl();
    }
  </script>
