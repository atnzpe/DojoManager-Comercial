<style>
  /* ============================================================================
     INJEÇÃO DE CORES COM FALLBACK SEGURO
     ============================================================================ */
  :root {
    --dynamic-bg: <?=typeof bgColor !=='undefined'&& bgColor ? bgColor: '#121212'?> !important;
    --dynamic-prim: <?=typeof primaryColor !=='undefined'&& primaryColor ? primaryColor: '#FFD700'?> !important;
    --dynamic-sec: <?=typeof secondaryColor !=='undefined'&& secondaryColor ? secondaryColor: '#1e1e1e'?> !important;
    --dynamic-text: <?=typeof textColor !=='undefined'&& textColor ? textColor: '#ffffff'?> !important;
    --dynamic-btn-text: <?=typeof btnTextColor !=='undefined'&& btnTextColor ? btnTextColor: '#000000'?> !important;
  }

  /* --- ESTILOS DO RANKING --- */
  .ranking-view {
    padding: 20px;
    display: none;
    animation: fadeIn 0.3s;
    padding-bottom: 120px;
    max-width: 800px;
    margin: 0 auto;
  }

  /* CABEÇALHO E NAVEGAÇÃO */
  .profile-header-nav {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 15px;
  }

  .btn-back-rank {
    background: transparent;
    border: 1px solid var(--dynamic-text);
    color: var(--dynamic-text);
    opacity: 0.6;
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
  }

  .btn-back-rank:hover {
    opacity: 1;
    border-color: var(--dynamic-prim);
    color: var(--dynamic-prim);
    transform: translateX(-3px);
  }

  /* FILTROS (LOCAL VS GERAL) */
  .scope-filter {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 25px;
  }

  .scope-btn {
    background: rgba(0, 0, 0, 0.4);
    color: var(--dynamic-text);
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: bold;
    transition: all 0.3s;
    opacity: 0.7;
  }

  .scope-btn.active {
    background: var(--dynamic-prim);
    color: var(--dynamic-btn-text);
    border-color: var(--dynamic-prim);
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
    opacity: 1;
    font-weight: 900;
  }

  /* LISTA AGRUPADA (RANKING CARDS) */
  .ranking-list {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .rank-group {
    background-color: var(--dynamic-sec);
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    overflow: hidden;
    position: relative;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
  }

  /* CORES DOS METAIS DO PÓDIO (FIXAS - NÃO HERDAM O WHITE-LABEL PARA MANTER A SEMÂNTICA) */
  .group-1 {
    border-left: 5px solid #FFD700;
    box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2);
  }

  .group-2 {
    border-left: 5px solid #C0C0C0;
    box-shadow: 0 4px 15px rgba(192, 192, 192, 0.1);
  }

  .group-3 {
    border-left: 5px solid #CD7F32;
    box-shadow: 0 4px 15px rgba(205, 127, 50, 0.1);
  }

  .group-common {
    border-left: 5px solid rgba(255, 255, 255, 0.2);
  }

  .txt-1 {
    color: #FFD700 !important;
  }

  .txt-2 {
    color: #C0C0C0 !important;
  }

  .txt-3 {
    color: #CD7F32 !important;
  }

  /* CABEÇALHO DO CARD */
  .rank-header {
    background: rgba(0, 0, 0, 0.3);
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  .rank-pos-badge {
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--dynamic-text);
  }

  .rank-score-badge {
    background: rgba(255, 255, 255, 0.1);
    padding: 6px 12px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: bold;
    color: var(--dynamic-text);
  }

  /* LINHAS DE ALUNOS NO CARD */
  .rank-rows-container {
    display: flex;
    flex-direction: column;
  }

  .rank-row {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 15px 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .rank-row:last-child {
    border-bottom: none;
  }

  .rank-avatar {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--dynamic-prim);
    background: #000;
  }

  .rank-info {
    flex: 1;
  }

  .rank-name {
    font-weight: 900;
    color: var(--dynamic-text);
    font-size: 1rem;
  }

  .rank-details {
    font-size: 0.8rem;
    color: var(--dynamic-text);
    opacity: 0.6;
    margin-top: 3px;
  }

  /* BOTÃO FLUTUANTE (GERAR PÓDIO) */
  .fab-rank {
    position: fixed;
    bottom: 30px;
    left: 25px;
    /* Lado Esquerdo */
    background: var(--dynamic-prim) !important;
    color: var(--dynamic-btn-text) !important;
    border: none;
    border-radius: 50px;
    padding: 15px 25px;
    font-weight: 900;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    z-index: 99999;
    transition: transform 0.2s, filter 0.2s;
  }

  .fab-rank:hover {
    filter: brightness(1.15);
    transform: scale(1.05);
  }

  /* --- MODAL PODIUM (CARD INSTAGRAM/IMPRESSÃO) --- */
  #podium-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    z-index: 100000;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    backdrop-filter: blur(8px);
  }

  .podium-card {
    width: 90%;
    max-width: 380px;
    background-color: var(--dynamic-sec);
    border: 3px solid var(--dynamic-prim);
    border-radius: 20px;
    padding: 25px 20px;
    text-align: center;
    box-shadow: 0 0 50px rgba(0, 0, 0, 0.6);
  }

  .podium-header {
    margin-bottom: 25px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    padding-bottom: 15px;
  }

  .podium-title {
    color: var(--dynamic-prim);
    font-size: 1.8rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin: 0;
  }

  .podium-subtitle {
    color: var(--dynamic-text);
    opacity: 0.8;
    font-size: 0.9rem;
    margin-top: 8px;
    font-weight: bold;
  }

  /* Grid Pódio 3 Lugares */
  .podium-grid {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 8px;
    margin-bottom: 20px;
    height: 190px;
  }

  .podium-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    width: 32%;
    height: 100%;
    position: relative;
  }

  .podium-avatar {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #000;
    margin-bottom: -15px;
    z-index: 5;
    background: #111;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6);
  }

  /* As barras do pódio mantêm as cores dos metais */
  .podium-place {
    width: 100%;
    border-radius: 8px 8px 0 0;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 8px;
    font-weight: 900;
    color: rgba(0, 0, 0, 0.7);
    font-size: 1.6rem;
  }

  .place-1 {
    height: 110px;
    background: linear-gradient(to bottom, #FFD700, #B8860B);
    order: 2;
    z-index: 2;
    border-color: #FFD700;
  }

  .place-2 {
    height: 80px;
    background: linear-gradient(to bottom, #C0C0C0, #757575);
    order: 1;
    opacity: 0.95;
    border-color: #C0C0C0;
  }

  .place-3 {
    height: 60px;
    background: linear-gradient(to bottom, #CD7F32, #8B4513);
    order: 3;
    opacity: 0.95;
    border-color: #CD7F32;
  }

  .podium-name {
    font-size: 0.8rem;
    color: var(--dynamic-text);
    margin-top: 15px;
    font-weight: 900;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .podium-count {
    font-size: 0.75rem;
    color: var(--dynamic-prim);
    margin-top: 3px;
    font-weight: bold;
  }

  .podium-footer {
    font-size: 0.65rem;
    color: var(--dynamic-text);
    opacity: 0.5;
    margin-top: 25px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    padding-top: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* BOTÕES DO MODAL PÓDIO */
  .modal-actions {
    display: flex;
    gap: 15px;
    margin-top: 25px;
    width: 90%;
    max-width: 380px;
  }

  .btn-action-podium {
    flex: 1;
    background: transparent;
    border: 2px solid var(--dynamic-text);
    color: var(--dynamic-text);
    padding: 14px;
    border-radius: 50px;
    font-weight: 900;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    transition: 0.2s;
  }

  .btn-action-podium:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  .btn-gold {
    background: var(--dynamic-prim);
    border-color: var(--dynamic-prim);
    color: var(--dynamic-btn-text);
  }

  .btn-gold:hover {
    filter: brightness(1.15);
    background: var(--dynamic-prim);
  }

  /* MODO IMPRESSÃO PDF */
  @media print {
    body * {
      visibility: hidden;
    }

    #podium-modal,
    #card-to-print,
    #card-to-print * {
      visibility: visible;
    }

    #podium-modal {
      position: absolute;
      left: 0;
      top: 0;
      background: white;
    }

    #card-to-print {
      box-shadow: none;
      border: 2px solid #000;
      color: #000 !important;
      background: #fff !important;
    }

    .podium-title,
    .podium-subtitle,
    .podium-name,
    .podium-count {
      color: #000 !important;
    }

    .modal-actions {
      display: none;
    }
  }

  .spinner-rank {
    border: 4px solid rgba(255, 255, 255, 0.1);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border-left-color: var(--dynamic-prim);
    animation: spin 1s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }

    to {
      opacity: 1;
    }
  }
</style>

<div id="ranking-screen" class="ranking-view">
  <div class="profile-header-nav">
    <button class="btn-back-rank" onclick="fecharRanking()">
      <span class="material-icons" style="font-size: 28px;">arrow_back</span>
    </button>
    <h2 style="margin:0; font-size:1.8rem; font-weight:900; color:var(--dynamic-text)">Ranking Mensal</h2>
  </div>

  <div style="text-align:center; margin-bottom:20px;">
    <div style="font-size:1.1rem; color:var(--dynamic-prim); font-weight:900; text-transform:uppercase;"
      id="rank-mes-ano">...</div>
  </div>

  <div class="scope-filter">
    <button class="scope-btn active" id="btn-scope-local" onclick="mudarEscopoRanking('local')">Minha Academia</button>
    <button class="scope-btn" id="btn-scope-geral" onclick="mudarEscopoRanking('geral')">Ranking Geral</button>
  </div>

  <div id="ranking-container" class="ranking-list">
    <div class="spinner-rank" style="margin: 30px auto;"></div>
  </div>

  <button id="btn-gerar-card" class="fab-rank" style="display:none;" onclick="gerarCardPodium()">
    <span class="material-icons">emoji_events</span> TOP 3 CARD
  </button>
</div>

<div id="podium-modal">
  <div class="podium-card" id="card-to-print">
    <div class="podium-header">
      <h1 class="podium-title">DESTAQUES</h1>
      <div class="podium-subtitle" id="podium-subtitle">...</div>
    </div>
    <div class="podium-grid" id="podium-content"></div>
    <div class="podium-footer" id="podium-footer">DojoManager System</div>
  </div>
  <div class="modal-actions">
    <button class="btn-action-podium" onclick="fecharPodium()">FECHAR</button>
    <button class="btn-action-podium btn-gold" onclick="window.print()"><span class="material-icons">print</span> SALVAR PDF</button>
  </div>
</div>

<script>
  console.log("✅ [SAFE MODE] Ranking.html carregado (White-Label Integrado)");

  let listaCompletaRanking = [];
  let listaExibidaRanking = [];
  let userRanking = {};
  let escopoAtual = 'local';

  function tratarErroImagem(img, nome) {
      img.onerror = null; 
      img.src = 'https://ui-avatars.com/api/?background=random&color=fff&name=' + encodeURIComponent(nome);
  }

  function abrirRanking() {
    try {
      userRanking = JSON.parse(localStorage.getItem('userSession') || '{}');
      if (!userRanking.academia) throw new Error("Sessão inválida.");
    } catch (e) {
      console.error(e);
      alert("Erro de sessão. Retorne ao painel e tente novamente.");
      return;
    }

    document.getElementById('dashboard-grid').style.display = 'none';
    document.querySelector('.dashboard-header').style.display = 'none';
    document.getElementById('ranking-screen').style.display = 'block';

    const hoje = new Date();
    const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    document.getElementById('rank-mes-ano').textContent = `${meses[hoje.getMonth()]} de ${hoje.getFullYear()}`;

    // Validação de Permissões para mostrar o Botão de Gerar Pódio (Instrutor/Admin)
    const nivel = String(userRanking.nivel || "").toLowerCase();
    const grad = String(userRanking.graduacao || "").toLowerCase();
    const isInstrutor = userRanking.isInstrutor || nivel.includes('admin') || grad.includes('mestre');
    
    document.getElementById('btn-gerar-card').style.display = isInstrutor ? 'flex' : 'none';

    listaCompletaRanking = []; 
    mudarEscopoRanking('local');
  }

  function mudarEscopoRanking(tipo) {
    escopoAtual = tipo;
    document.getElementById('btn-scope-local').className = (tipo === 'local') ? 'scope-btn active' : 'scope-btn';
    document.getElementById('btn-scope-geral').className = (tipo === 'geral') ? 'scope-btn active' : 'scope-btn';
    
    if(listaCompletaRanking.length > 0) {
        filtrarERenderizar();
    } else {
        const hoje = new Date();
        buscarDadosBackend(hoje.getMonth() + 1, hoje.getFullYear());
    }
  }

  function buscarDadosBackend(mes, ano) {
    const div = document.getElementById('ranking-container');
    div.innerHTML = '<div class="spinner-rank" style="margin: 30px auto;"></div>';
    
    if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(lista => {
              if (!Array.isArray(lista)) {
                 div.innerHTML = '<p style="color:#ff5252; text-align:center; font-weight:bold;">Erro: Dados corrompidos.</p>';
                 return;
              }
              listaCompletaRanking = lista;
              filtrarERenderizar();
          })
          .withFailureHandler(err => {
              div.innerHTML = `<p style="color:#ff5252; text-align:center; font-weight:bold;">Erro de Servidor: ${err.message}</p>`;
          })
          .getRankingPresenca(mes, ano);
    }
  }

  function filtrarERenderizar() {
    const div = document.getElementById('ranking-container');
    div.innerHTML = "";
    
    if (escopoAtual === 'local') {
        const minhaAcad = String(userRanking.academia).trim().toUpperCase();
        listaExibidaRanking = listaCompletaRanking.filter(r => String(r.academia).trim().toUpperCase() === minhaAcad);
    } else {
        listaExibidaRanking = listaCompletaRanking; 
    }

    if(listaExibidaRanking.length === 0) {
        div.innerHTML = `<div style="text-align:center; padding:40px; color:var(--dynamic-text); opacity:0.5;"><span class="material-icons" style="font-size:48px; margin-bottom:10px;">event_busy</span><p style="font-weight:bold; margin:0;">Nenhuma presença confirmada ainda.</p></div>`;
        return;
    }

    const grupos = new Map();
    listaExibidaRanking.forEach(aluno => {
        const score = aluno.count;
        if (!grupos.has(score)) grupos.set(score, []);
        grupos.get(score).push(aluno);
    });

    const scoresOrdenados = Array.from(grupos.keys()).sort((a, b) => b - a);

    scoresOrdenados.forEach((score, index) => {
        const rankPos = index + 1;
        const alunosEmpatados = grupos.get(score);
        
        let groupClass = 'group-common';
        let textClass = '';
        if (rankPos === 1) { groupClass = 'group-1'; textClass = 'txt-1'; }
        else if (rankPos === 2) { groupClass = 'group-2'; textClass = 'txt-2'; }
        else if (rankPos === 3) { groupClass = 'group-3'; textClass = 'txt-3'; }

        const groupDiv = document.createElement('div');
        groupDiv.className = `rank-group ${groupClass}`;

        const icon = (rankPos <= 3) ? 'emoji_events' : 'leaderboard';
        const headerHtml = `
            <div class="rank-header">
                <div class="rank-pos-badge ${textClass}">
                    <span class="material-icons" style="font-size:18px; vertical-align:middle; margin-right:5px;">${icon}</span>
                    ${rankPos}º Lugar
                </div>
                <div class="rank-score-badge">${score} Aula(s)</div>
            </div>
        `;

        let rowsHtml = '<div class="rank-rows-container">';
        alunosEmpatados.forEach(aluno => {
            rowsHtml += `
                <div class="rank-row">
                    <img src="${aluno.foto}" class="rank-avatar" style="border-color: ${rankPos===1 ? '#FFD700' : (rankPos===2 ? '#C0C0C0' : (rankPos===3 ? '#CD7F32' : 'var(--dynamic-prim)'))}" onerror="tratarErroImagem(this, '${aluno.login}')">
                    <div class="rank-info">
                        <div class="rank-name">${aluno.nome}</div>
                        <div class="rank-details">${aluno.academia}</div>
                    </div>
                </div>
            `;
        });
        rowsHtml += '</div>';

        groupDiv.innerHTML = headerHtml + rowsHtml;
        div.appendChild(groupDiv);
    });
  }

  function gerarCardPodium() {
    if(listaExibidaRanking.length === 0) { alert("Sem dados suficientes para formar o pódio."); return; }
    
    const grupos = new Map();
    listaExibidaRanking.forEach(aluno => {
        if (!grupos.has(aluno.count)) grupos.set(aluno.count, []);
        grupos.get(aluno.count).push(aluno);
    });
    const scoresOrdenados = Array.from(grupos.keys()).sort((a, b) => b - a);

    const container = document.getElementById('podium-content');
    container.innerHTML = "";
    
    const ordemVisual = [2, 1, 3]; 

    ordemVisual.forEach(rankAlvo => {
        const scoreDoRank = scoresOrdenados[rankAlvo - 1]; 
        
        if (scoreDoRank !== undefined) {
            const alunosDoRank = grupos.get(scoreDoRank);
            const aluno = alunosDoRank[0]; 
            const isEmpate = alunosDoRank.length > 1;
            let nomeDisplay = aluno.nome.split(' ')[0];
            if (isEmpate) nomeDisplay += ` (+${alunosDoRank.length-1})`;

            let placeClass = `place-${rankAlvo}`;
            let orderCss = (rankAlvo === 1) ? 2 : (rankAlvo === 2 ? 1 : 3);

            const html = `
                <div class="podium-item" style="order:${orderCss}">
                    <img src="${aluno.foto}" class="podium-avatar" onerror="tratarErroImagem(this, '${aluno.login}')">
                    <div class="podium-place ${placeClass}">${rankAlvo}º</div>
                    <div class="podium-name">${nomeDisplay}</div>
                    <div class="podium-count">${aluno.count} Aulas</div>
                </div>
            `;
            container.innerHTML += html;
        } else {
            let orderCss = (rankAlvo === 1) ? 2 : (rankAlvo === 2 ? 1 : 3);
            container.innerHTML += `<div class="podium-item" style="order:${orderCss}; opacity:0;"></div>`;
        }
    });

    const nomeContexto = (escopoAtual === 'local') ? userRanking.academia : "Ranking Geral";
    document.getElementById('podium-subtitle').textContent = nomeContexto + " | " + document.getElementById('rank-mes-ano').textContent;
    document.getElementById('podium-modal').style.display = 'flex';
  }

  function fecharPodium() { document.getElementById('podium-modal').style.display = 'none'; }
  
  function fecharRanking() { 
      document.getElementById('ranking-screen').style.display = 'none'; 
      document.querySelector('.dashboard-header').style.display = 'flex'; 
      document.getElementById('dashboard-grid').style.display = 'grid'; 
  }
</script>
