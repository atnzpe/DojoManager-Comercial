<!DOCTYPE html>
<html lang="pt-br">

<head>
  <base target="_top" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  
  <style>
    /**
     * ============================================================================
     * INJEÇÃO DE VARIÁVEIS DO BACKEND (WHITE-LABEL)
     * ============================================================================
     */
    :root {
      --dynamic-bg: <?= bgColor ?> !important;
      --dynamic-prim: <?= primaryColor ?> !important;
      --dynamic-sec: <?= secondaryColor ?> !important;
      --dynamic-text: <?= textColor ?> !important;
      --dynamic-btn-text: <?= btnTextColor ?> !important;
    }

    /* ============================================================================
      CSS ESPECÍFICO DO DASHBOARD (CARDS E WIDGETS)
      ============================================================================
    */
    
    body {
      margin: 0;
      font-family: "Roboto", sans-serif;
      /* O corpo agora puxa a cor de fundo injetada (A 5ª cor) */
      background-color: var(--bg-color);
      color: var(--text-color);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 20px;
      margin-bottom: 20px;
    }

    .header-logo {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary-color);
    }

    /* WIDGET DE TREINO HOJE */
    .widget-hoje {
      background: linear-gradient(135deg, rgba(0,0,0,0.4), var(--secondary-color));
      border-left: 5px solid var(--primary-color);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      display: none; 
      animation: slideDown 0.5s ease;
    }

    .widget-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .widget-title { color: var(--primary-color); font-weight: bold; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
    .lista-treinos-hoje { display: flex; flex-direction: column; gap: 10px; }

    .item-treino {
      background: rgba(255, 255, 255, 0.05);
      padding: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center;
    }

    .info-treino h4 { margin: 0; color: var(--text-color); font-size: 0.95rem; }
    .info-treino p { margin: 3px 0 0; color: rgba(255, 255, 255, 0.6); font-size: 0.8rem; }

    .btn-rota-sm {
      background: rgba(0,0,0,0.5); color: var(--primary-color); border: 1px solid var(--primary-color);
      border-radius: 20px; padding: 5px 12px; font-size: 0.75rem; font-weight: bold; cursor: pointer;
      text-decoration: none; display: flex; align-items: center; gap: 5px; transition: 0.2s;
    }
    .btn-rota-sm:hover { background: var(--primary-color); color: var(--btn-text-color); }

    /* GRID DOS BOTÕES PRINCIPAIS */
    .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

    .dash-card {
      background: var(--secondary-color);
      border-radius: 12px; padding: 20px; cursor: pointer; display: flex; flex-direction: column; gap: 8px;
      border: 1px solid transparent; transition: 0.2s; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    .dash-card:hover { transform: translateY(-3px); border-color: var(--primary-color); filter: brightness(1.1); }

    .card-icon { color: var(--text-color); font-size: 28px; }
    .card-title { font-weight: 700; color: var(--text-color); }
    .card-subtitle { font-size: 0.85rem; color: rgba(255,255,255,0.6); }

    .card-special { border: 1px solid rgba(255, 255, 255, 0.1); background: linear-gradient(135deg, var(--secondary-color), rgba(0,0,0,0.5)); }
    .card-special .card-icon { color: var(--primary-color); }

    /* AVISOS E CARREGAMENTO */
    #error-banner { display: none; background: var(--error-color); color: #fff; padding: 10px; text-align: center; margin-bottom: 10px; border-radius: 5px; font-weight: bold; }
    #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
    .spinner-main { border: 4px solid rgba(255, 255, 255, 0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: var(--primary-color); animation: spin 1s linear infinite; margin-bottom: 15px; }

    /* ESTILOS SUPORTE FLUTUANTE (FAB) */
    #btn-ajuda-fab {
      position: fixed; bottom: 20px; right: 20px; background-color: var(--primary-color); color: var(--btn-text-color);
      width: 56px; height: 56px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4); cursor: pointer; z-index: 9990; transition: transform 0.2s;
    }
    #btn-ajuda-fab:hover { transform: scale(1.1); }

    /* Modal Ajuda */
    .modal-overlay-ajuda { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(3px); }
    .modal-box-ajuda { background: var(--secondary-color); width: 90%; max-width: 400px; padding: 25px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); border: 1px solid var(--primary-color); }
    .modal-header-ajuda { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
    .modal-header-ajuda h3 { margin: 0; color: var(--text-color); font-size: 18px; }
    .btn-close-ajuda { background: none; border: none; cursor: pointer; color: var(--text-color); opacity: 0.6; }
    
    .input-ajuda { width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; box-sizing: border-box; margin-top: 5px; font-family: sans-serif; background: rgba(0,0,0,0.3); color: var(--text-color); }
    
    .btn-enviar-ajuda { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; background: var(--primary-color); color: var(--btn-text-color); transition: 0.2s; }
    .btn-enviar-ajuda:hover { filter: brightness(1.1); }
    .btn-enviar-ajuda:disabled { background: #444; color: #888; cursor: not-allowed; }

    .btn-manual { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); color: var(--text-color); border: 1px solid var(--text-color); border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
    .btn-manual:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
    
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
  
  <?!= include('Style'); ?>
</head>

  <script>
    const LOGO_PADRAO = "<?= logoUrl ?>";
    let currentUser = {};
    const LISTA_INSTRUTOR = ["INSTRUTOR N1", "INSTRUTOR N2", "INSTRUTOR N3", "PROFESSOR", "MESTRE", "VERDE ESCURO", "AZUL ESCURO", "MARROM", "PRETA", "PRETA E BRANCA"];
    const LISTA_ADMIN = ["MESTRE", "ADMIN", "PRETA E BRANCA", "VERMELHA"];

    const CacheSystem = {
      PREFIX: 'fbkmkln_cache_',
      set: function(key, data, minutes = 60) {
        try {
          const payload = { value: data, expiry: Date.now() + (minutes * 60 * 1000), version: '1.0' };
          localStorage.setItem(this.PREFIX + key, JSON.stringify(payload));
        } catch (e) { console.warn("Cache Full", e); }
      },
      get: function(key) {
        try {
          const recordStr = localStorage.getItem(this.PREFIX + key);
          if (!recordStr) return null;
          const record = JSON.parse(recordStr);
          if (Date.now() > record.expiry) { localStorage.removeItem(this.PREFIX + key); return null; }
          return record.value;
        } catch (e) { return null; }
      },
      clearAll: function() {
        Object.keys(localStorage).forEach(k => { if(k.startsWith(this.PREFIX)) localStorage.removeItem(k); });
      }
    };

    function criarCardTreino(nome, hora, detalhe, checkinAtivo, linkMaps, pin, corDetalhe = "#888") {
        const div = document.createElement('div');
        div.className = 'item-treino';
        let areaBotoes = '<div style="display:flex; gap:8px; align-items:center;">';
        
        if (linkMaps) { areaBotoes += `<a href="${linkMaps}" target="_blank" class="btn-rota-sm" title="Ver Rota"><span class="material-icons" style="font-size:16px">near_me</span></a>`; }
        if (checkinAtivo) { areaBotoes += `<button onclick="irParaCheckin('${pin}')" class="btn-rota-sm" style="background:var(--success-color); border-color:var(--success-color); color:#000;"><span class="material-icons" style="font-size:14px">qr_code</span> CHECK-IN</button>`; } 
        if (!checkinAtivo && !linkMaps) { areaBotoes += `<span style="font-size:0.65rem; color:var(--text-color); opacity:0.5; border:1px solid rgba(255,255,255,0.2); padding:2px 6px; border-radius:4px;">Aguarde</span>`; }
        areaBotoes += '</div>';

        div.innerHTML = `
            <div class="info-treino">
                <h4 style="color:${checkinAtivo ? 'var(--primary-color)' : 'var(--text-color)'}">${nome}</h4>
                <p><span class="material-icons" style="font-size:12px; vertical-align:middle">schedule</span> ${hora}</p>
                <p style="font-size:0.7rem; color:${corDetalhe}; margin-top:4px;">${detalhe}</p>
            </div>
            ${areaBotoes}
        `;
        return div;
    }

    function irParaCheckin(pin) {
        if(typeof initChamadaDinamica === 'function') {
            initChamadaDinamica('aluno');
            setTimeout(() => { const input = document.getElementById('input-pin'); if(input && pin) input.value = pin; }, 500);
        } else { alert("Módulo de chamada carregando..."); }
    }

    function carregarTreinosDeHoje() {
        const diasSemana = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
        const diaHojeStr = diasSemana[new Date().getDay()];
        
        document.getElementById('lbl-dia-semana').textContent = `(${diaHojeStr})`;
        const container = document.getElementById('lista-hoje-container');
        container.innerHTML = '<div style="text-align:center;color:var(--text-color);opacity:0.5;">Buscando treinos...</div>';

        google.script.run.withSuccessHandler(aulasLive => {
            google.script.run.withSuccessHandler(locaisFixos => {
                container.innerHTML = ""; let encontrouAlgum = false;
                
                if (aulasLive && aulasLive.length > 0) {
                    aulasLive.forEach(aula => {
                        encontrouAlgum = true;
                        const localObj = locaisFixos ? locaisFixos.find(l => l.nome.trim().toLowerCase() === String(aula.academia).trim().toLowerCase()) : null;
                        const isLocalConhecido = !!localObj;
                        
                        let detalheTexto = isLocalConhecido ? `Aula Ativa com ${aula.instrutor.split(' ')[0]}` : `⚠️ Consulte ${aula.instrutor.split(' ')[0]} para o local exato.`;
                        let corTexto = isLocalConhecido ? "var(--text-color)" : "var(--primary-color)";
                        let linkMapa = isLocalConhecido ? localObj.linkMaps : null;

                        container.appendChild(criarCardTreino(aula.academia, aula.horario, detalheTexto, true, linkMapa, aula.pin, corTexto));
                    });
                }

                if (locaisFixos) {
                    locaisFixos.forEach(local => {
                        const diasLocal = String(local.dias).toLowerCase();
                        if (diasLocal.includes(diaHojeStr.toLowerCase().slice(0, 3)) || diasLocal.includes("todos")) {
                            if (!aulasLive.some(al => al.academia.toLowerCase() === local.nome.toLowerCase())) {
                                encontrouAlgum = true;
                                container.appendChild(criarCardTreino(local.nome, local.horarios, local.cidade || "Unidade Oficial", false, local.linkMaps));
                            }
                        }
                    });
                }
                document.getElementById('widget-treino-hoje').style.display = encontrouAlgum ? 'block' : 'none';
            }).getLocaisTreino();
        }).buscarAulasDisponiveisAluno("TODOS");
    }

    window.onload = function () {
      try {
        const s = localStorage.getItem("userSession");
        if (!s) { logout(); return; }
        renderizarDashboard(JSON.parse(s));
        carregarTreinosDeHoje();
      } catch (e) { logout(); }
    };

    function renderizarDashboard(user) {
      currentUser = user;
      document.getElementById("greeting").textContent = `Kidá, ${(user.nomeCompleto || user.LOGIN || "Aluno").split(" ")[0]}!`;
      if (user.fotoUrl) document.getElementById("header-img").src = user.fotoUrl;

      const grid = document.getElementById("dashboard-grid");
      grid.innerHTML = "";
      
      getMenuCards(user).forEach(item => {
        const div = document.createElement("div");
        div.className = item.special ? "dash-card card-special" : "dash-card";
        div.onclick = () => handleAction(item.action);
        div.innerHTML = `<span class="material-icons card-icon">${item.icon}</span><div class="card-title">${item.title}</div><div class="card-subtitle">${item.subtitle}</div>`;
        grid.appendChild(div);
      });

      document.getElementById("loading-screen").style.display = "none";
      document.getElementById("main-content").style.display = "block";
    }

    function getMenuCards(user) {
      const list = [
        { title: "Perfil do Aluno", subtitle: "Dados e carteirinha", icon: "person", action: "perfil" },
        { title: "Vídeo Aulas", subtitle: "Vídeos separados por Graduação", icon: "ondemand_video", action: "videos" },
        { title: "Programa Técnico", subtitle: "PDFs das faixas", icon: "description", action: "programa" },
        { title: "Cursos e Eventos", subtitle: "Faça sua inscrição", icon: "school", action: "cursos" },
        { title: "Ranking", subtitle: "Destaques do mês", icon: "emoji_events", action: "ranking" },
        { title: "Loja", subtitle: "Equipamentos de treino", icon: "shopping_cart", action: "shop" },
        { title: "Locais de Treino", subtitle: "Aulas em Aberto", icon: "location_on", action: "locais" },
        { title: "Mídias Sociais", subtitle: "Nossas redes", icon: "groups", action: "social" },
        { title: "Biblioteca", subtitle: "Manuais e livros", icon: "menu_book", action: "biblioteca" },
        { title: "Certificados", subtitle: "Diplomas e Certificados", icon: "workspace_premium", action: "certificados" },
        { title: "Financeiro", subtitle: "Pagamentos e Planos", icon: "attach_money", action: "financeiro" },
      ];

      const grad = String(user.graduacao || "").toUpperCase();
      const nivel = String(user.nivel || "").toUpperCase();
      const ehInstrutor = user.isInstrutor === true || LISTA_INSTRUTOR.some(f => grad.includes(f) || nivel.includes(f));
      const ehAdmin = LISTA_ADMIN.some(f => grad.includes(f) || nivel.includes(f));

      if (ehInstrutor || ehAdmin) {
        list.push({ title: "Lista de Presença", subtitle: "Gerenciar Aula", icon: "qr_code_2", action: "chamada_instrutor", special: true });
        list.push({ title: "Gestão de Alunos", subtitle: "Cadastros e Edição", icon: "manage_accounts", action: "view_instrutor", special: true });
        list.push({ title: "Cadastrar Aluno", subtitle: "Link Externo", icon: "person_add", action: "form_cadastro", special: true });
      } else {
        list.push({ title: "Check-in Aula", subtitle: "Marcar Presença", icon: "qr_code_scanner", action: "chamada_aluno", special: true });
      }

      if (ehAdmin) { list.push({ title: "Painel Admin", subtitle: "Gestão Total", icon: "settings_suggest", action: "view_admin", special: true }); }
      return list;
    }

    function handleAction(action) {
      if (action === "chamada_instrutor") { if(typeof initChamadaDinamica === 'function') initChamadaDinamica('instrutor'); else alert("Módulo carregando..."); return; }
      if (action === "chamada_aluno") { if(typeof initChamadaDinamica === 'function') initChamadaDinamica('aluno'); else alert("Módulo carregando..."); return; }
      if (action === "view_admin") { abrirAdminView(); if (typeof carregarAlunos === 'function') carregarAlunos(); return; }
      if (action === "view_instrutor") { if(typeof abrirGestaoAlunos === 'function') abrirGestaoAlunos(); else alert("Erro: Módulo não carregado."); return; }
      if (action === "shop") { window.open("https://wa.me/5581997629232", "_blank"); return; }
      if (action === "form_cadastro") { window.open("https://forms.gle/3vXp86VCmuLzHrk46", "_blank"); return; }

      const map = { 
          "perfil": () => carregarDadosPerfil(currentUser), 
          "programa": () => abrirPrograma(currentUser), 
          "biblioteca": () => abrirBiblioteca(), 
          "videos": () => abrirVideoteca(), 
          "locais": () => abrirLocaisTreino(), 
          "cursos": () => abrirCursos(), 
          "social": () => abrirSocial(),
          "financeiro": () => abrirFinanceiro(), 
          "ranking": () => abrirRanking(), 
          "certificados": () => abrirCertificados()
      };
      if (map[action]) map[action]();
    }

    function abrirAdminView() { document.getElementById("main-content").style.display = "none"; document.getElementById("admin-module-wrapper").style.display = "block"; }
    window.fecharAdmin = function () { document.getElementById("admin-module-wrapper").style.display = "none"; document.getElementById("main-content").style.display = "block"; };
    
    function logout() { localStorage.removeItem("userSession"); CacheSystem.clearAll(); google.script.run.withSuccessHandler(u => window.top.location.href = u + "?page=login").getScriptUrl(); }

    function abrirModalAjuda() {
        try { if(currentUser) { document.getElementById('sup_login').value = currentUser.LOGIN || "Desconhecido"; document.getElementById('sup_nome').value = currentUser.nomeCompleto || "Desconhecido"; } } catch(e) {}
        document.getElementById('modal-ajuda').style.display = 'flex';
    }
    function fecharModalAjuda() { document.getElementById('modal-ajuda').style.display = 'none'; }
    function irParaManual() { const btn = document.querySelector('.btn-manual'); btn.innerHTML = "CARREGANDO..."; google.script.run.withSuccessHandler(url => window.top.location.href = url + "?page=ajuda").getScriptUrl(); }

    function enviarAjuda(e) {
        e.preventDefault(); const btn = document.querySelector('.btn-enviar-ajuda'); const originalTxt = btn.innerText; btn.innerText = "ENVIANDO..."; btn.disabled = true;
        const form = document.querySelector('#modal-ajuda form');
        google.script.run.withSuccessHandler(res => { alert(res); form.reset(); fecharModalAjuda(); btn.innerText = originalTxt; btn.disabled = false;
        }).withFailureHandler(err => { alert("Erro: " + err.message); btn.innerText = originalTxt; btn.disabled = false; }).salvarTicketSuporte(form);
    }
  </script>
</body>
</html>
