  <style>
    /* 1. MOTOR DO DESIGN SYSTEM (White-Label) */
    :root {
      --primary-color: <?=primaryColor ?> !important;
      --secondary-color: <?=secondaryColor ?> !important;
      --text-color: <?=textColor ?> !important;
      --btn-text-color: <?=btnTextColor ?> !important;
      --border-radius: 12px;
    }

    /* 2. ESTRUTURA BASE E FUNDO (Padrão Unificado) */
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      background-color: transparent !important;
      color: var(--text-color);
      font-family: 'Roboto', sans-serif;
      overflow-y: auto;
    }

    .bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('<?= bgUrl ?>');
      background-size: cover;
      background-position: center;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      /* Escurecido para DCU */
      z-index: -1;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--primary-color);
      padding-bottom: 20px;
      margin-bottom: 30px;
    }

    .header-logo {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary-color);
      background-color: var(--secondary-color);
    }

    /* 3. GRID E CARDS SÓLIDOS (Correção UX) */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      /* Mais compacto para mobile */
      gap: 12px;
    }

    .dash-card {
      background-color: var(--secondary-color) !important;
      /* COR SÓLIDA */
      border: 1px solid var(--primary-color);
      /* BORDA DEFINIDA */
      border-radius: var(--border-radius);
      padding: 20px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* Centralizado para melhor leitura */
      text-align: center;
      gap: 10px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.5);
      transition: transform 0.2s, filter 0.2s;
    }

    .dash-card:hover {
      transform: translateY(-5px);
      filter: brightness(1.2);
    }

    .card-icon {
      color: var(--primary-color);
      font-size: 40px;
    }

    .card-title {
      font-weight: 900;
      font-size: 0.95rem;
      color: var(--text-color);
      text-transform: uppercase;
      line-height: 1.2;
    }

    .card-subtitle {
      font-size: 0.75rem;
      color: var(--text-color);
      opacity: 0.6;
    }

    /* CARD ESPECIAL (Check-in / Chamada) */
    .card-special {
      background-color: var(--primary-color) !important;
      border-color: var(--text-color);
    }

    .card-special .card-icon,
    .card-special .card-title,
    .card-special .card-subtitle {
      color: var(--btn-text-color) !important;
      opacity: 1;
    }

    /* WIDGET DE TREINO */
    .widget-hoje {
      background-color: var(--secondary-color);
      border: 2px solid var(--primary-color);
      border-radius: var(--border-radius);
      padding: 18px;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
      display: none;
      animation: slideDown 0.5s ease;
    }

    .item-treino {
      background: rgba(0, 0, 0, 0.4);
      /* Fundo interno escuro para contraste */
      padding: 12px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* BOTÃO DE SUPORTE (FAB) */
    #btn-ajuda-fab {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background-color: var(--primary-color);
      color: var(--btn-text-color);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.8);
      cursor: pointer;
      z-index: 9990;
      transition: 0.3s;
    }

    /* LOADING SCREEN */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--secondary-color);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .spinner-main {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid var(--primary-color);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

  <script>
    // Lógica de Inicialização e Renderização permanece a mesma, 
    // mas as funções de estilo agora usam as classes sólidas.
    
    var currentUser = {};
    var LISTA_INSTRUTOR = ["INSTRUTOR N1", "INSTRUTOR N2", "INSTRUTOR N3", "PROFESSOR", "MESTRE", "VERDE ESCURO", "AZUL ESCURO", "MARROM", "PRETA", "PRETA E BRANCA"];
    var LISTA_ADMIN = ["MESTRE", "ADMIN", "PRETA E BRANCA", "VERMELHA"];

    window.onload = function () {
      try {
        var sessionData = localStorage.getItem("userSession");
        if (!sessionData) { logout(); return; }
        renderizarDashboard(JSON.parse(sessionData));
        carregarTreinosDeHoje();
      } catch (e) {
        logout();
      }
    };

    function renderizarDashboard(user) {
      currentUser = user;
      var pNome = user.nomeCompleto ? user.nomeCompleto.split(" ")[0] : "Aluno";
      document.getElementById("greeting").textContent = "Olá, " + pNome + "!";
      if (user.fotoUrl) document.getElementById("header-img").src = user.fotoUrl;

      var grid = document.getElementById("dashboard-grid");
      grid.innerHTML = "";
      
      var cards = getMenuCards(user);
      cards.forEach(function(item) {
        var div = document.createElement("div");
        div.className = item.special ? "dash-card card-special" : "dash-card";
        div.onclick = function() { handleAction(item.action); };
        div.innerHTML = '<span class="material-icons card-icon">' + item.icon + '</span>' +
                        '<div class="card-title">' + item.title + '</div>' +
                        '<div class="card-subtitle">' + item.subtitle + '</div>';
        grid.appendChild(div);
      });

      document.getElementById("loading-screen").style.display = "none";
      document.getElementById("main-content").style.display = "block";
    }

    function getMenuCards(user) {
      var list = [
        { title: "Meu Perfil", subtitle: "Dados e carteira", icon: "person", action: "perfil" },
        { title: "Vídeo Aulas", subtitle: "Treino técnico", icon: "play_circle", action: "videos" },
        { title: "Programa Técnico", subtitle: "Documentação", icon: "menu_book", action: "programa" },
        { title: "Ranking", subtitle: "Destaques", icon: "workspace_premium", action: "ranking" },
        { title: "Financeiro", subtitle: "Status de Plano", icon: "payments", action: "financeiro" },
        { title: "Locais de Treino", subtitle: "Onde treinar", icon: "map", action: "locais" }
      ];

      var grad = String(user.graduacao || "").toUpperCase();
      var nivel = String(user.nivel || "").toUpperCase();
      var ehInstrutor = user.isInstrutor === true || LISTA_INSTRUTOR.some(function(f){ return grad.includes(f) || nivel.includes(f); });
      var ehAdmin = LISTA_ADMIN.some(function(f){ return grad.includes(f) || nivel.includes(f); });

      if (ehInstrutor || ehAdmin) {
        list.push({ title: "Lista Presença", subtitle: "Painel Instrutor", icon: "qr_code_2", action: "chamada_instrutor", special: true });
        list.push({ title: "Gestão Alunos", subtitle: "Administrativo", icon: "groups", action: "view_instrutor", special: true });
      } else {
        list.push({ title: "Check-in Aula", subtitle: "Marcar Presença", icon: "fingerprint", action: "chamada_aluno", special: true });
      }

      if (ehAdmin) {
        list.push({ title: "Admin", subtitle: "Configurações", icon: "settings", action: "view_admin", special: true });
      }
      return list;
    }

    function handleAction(action) {
      if (action === "view_admin") { 
        document.getElementById("main-content").style.display = "none"; 
        document.getElementById("admin-module-wrapper").style.display = "block"; 
        if (typeof carregarAlunos === 'function') carregarAlunos(); 
        return; 
      }
      // Outras ações... (financeiro, perfil, etc chamam as funções dos includes)
      var map = {
        "perfil": function() { if(typeof carregarDadosPerfil === 'function') carregarDadosPerfil(currentUser); },
        "financeiro": function() { if(typeof abrirFinanceiro === 'function') abrirFinanceiro(); },
        "locais": function() { if(typeof abrirLocaisTreino === 'function') abrirLocaisTreino(); },
        "videos": function() { if(typeof abrirVideoteca === 'function') abrirVideoteca(); },
        "programa": function() { if(typeof abrirPrograma === 'function') abrirPrograma(currentUser); },
        "ranking": function() { if(typeof abrirRanking === 'function') abrirRanking(); },
        "chamada_instrutor": function() { if(typeof initChamadaDinamica === 'function') initChamadaDinamica('instrutor'); },
        "chamada_aluno": function() { if(typeof initChamadaDinamica === 'function') initChamadaDinamica('aluno'); },
        "view_instrutor": function() { if(typeof abrirGestaoAlunos === 'function') abrirGestaoAlunos(); }
      };
      if (map[action]) map[action]();
    }

    function logout() { localStorage.clear(); google.script.run.withSuccessHandler(function(u){ window.top.location.href = u + "?page=login"; }).getScriptUrl(); }
    function abrirModalAjuda() { document.getElementById('modal-ajuda').style.display = 'flex'; }
    function fecharModalAjuda() { document.getElementById('modal-ajuda').style.display = 'none'; }
    function irParaManual() { google.script.run.withSuccessHandler(function(url){ window.top.location.href = url + "?page=ajuda"; }).getScriptUrl(); }

    // Função de carregar treinos (resumida para o exemplo)
    function carregarTreinosDeHoje() {
       google.script.run.withSuccessHandler(function(aulasLive) {
          var container = document.getElementById('lista-hoje-container');
          if (aulasLive && aulasLive.length > 0) {
            document.getElementById('widget-treino-hoje').style.display = 'block';
            container.innerHTML = "";
            aulasLive.forEach(function(aula) {
              var item = document.createElement('div');
              item.className = "item-treino";
              item.innerHTML = "<span><b>" + aula.academia + "</b><br><small>" + aula.horario + "</small></span>" +
                               "<button class='btn-rota-sm' onclick='handleAction(\"chamada_aluno\")'>CHECK-IN</button>";
              container.appendChild(item);
            });
          }
       }).buscarAulasDisponiveisAluno("TODOS");
    }
  </script>
</body>
