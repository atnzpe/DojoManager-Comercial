<!DOCTYPE html>
<html lang="pt-br">

<head>
  <base target="_top" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <style>
    /* =======================================================================
       1. DESIGN SYSTEM - BASE (INJETADO DIRETAMENTE)
       ======================================================================= */
    :root {
      --bg-color: #121212;
      --surface-color: <?=secondaryColor ?> !important;
      --input-bg: #2d2d2d;

      /* Variáveis da Planilha (Aba Config) */
      --primary-color: <?=primaryColor ?> !important;
      --secondary-color: <?=secondaryColor ?> !important;
      --text-color: <?=textColor ?> !important;
      --btn-text-color: <?=btnTextColor ?> !important;

      --primary-hover: #ffca28;
      --text-secondary: #b0b0b0;
      --error-color: #cf6679;
      --success-color: #00e676;
      --border-radius: 12px;
    }

    /* RESET E FUNDO (IDÊNTICO AO LOGIN) */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      background-color: transparent !important;
      color: var(--text-color);
      font-family: 'Roboto', sans-serif;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('<?= bgUrl ?>');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.65);
      z-index: -1;
    }

    /* COMPONENTES DE UI */
    .primary-button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--border-radius);
      font-size: 1.1rem;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      transition: 0.2s;
      background-color: var(--primary-color);
      color: var(--btn-text-color);
    }

    .primary-button:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
    }

    /* DASHBOARD CARDS (ESTILO SÓLIDO DO ADMIN) */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .dash-card {
      background-color: var(--secondary-color);
      border-radius: 16px;
      padding: 25px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid var(--primary-color);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      transition: all 0.3s ease;
    }

    .dash-card:hover {
      transform: translateY(-5px);
      filter: brightness(1.2);
    }

    .card-icon {
      color: var(--primary-color);
      font-size: 32px;
    }

    .card-title {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-color);
    }

    .card-subtitle {
      font-size: 0.85rem;
      color: var(--text-color);
      opacity: 0.7;
    }

    /* LOAD SCREEN */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--secondary-color);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .spinner-main {
      border: 4px solid transparent;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border-top-color: var(--primary-color);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg)
      }

      100% {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

<body>
  <div class="bg-layer"></div>
  <div class="overlay"></div>

  <div id="loading-screen">
    <div class="spinner-main"></div>
    <div style="color:var(--text-color); margin-top:15px; font-weight:bold;">Sincronizando...</div>
  </div>

  <div class="container" id="main-content" style="display:none">
    <header
      style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:15px;">
      <div style="display:flex; gap:15px; align-items:center;">
        <img id="header-img" src="" style="width:55px; height:55px; border-radius:50%; border:2px solid var(--primary-color);" onerror="this.src='https://ui-avatars.com/api/?name=User&background=333&color=fff'" />
        <h1 id="greeting" style="margin:0; font-size:1.5rem;">Olá!</h1>
      </div>
      <button onclick="logout()" style="background:none; border:none; color:var(--text-color); cursor:pointer;"><span class="material-icons" style="font-size:32px">logout</span></button>
    </header>

    <div id="widget-treino-hoje" class="widget-hoje">
      <div class="widget-header">
        <div class="widget-title">
          <span class="material-icons">event_available</span> TREINOS DE HOJE
          <span id="lbl-dia-semana" style="color:var(--text-color); opacity:0.8; font-weight:normal; margin-left:5px"></span>
        </div>
        <span class="material-icons" style="color:var(--text-color); opacity:0.5; font-size:20px; cursor:pointer; transition:0.2s;" onmouseover="this.style.opacity=1" onclick="this.parentElement.parentElement.style.display='none'">close</span>
      </div>
      <div id="lista-hoje-container" class="lista-treinos-hoje"></div>
    </div>

    <div id="dashboard-grid" class="grid-container"></div>

    <?!= include('Profile');?>
    <?!= include('Programa');?>
    <?!= include('Biblioteca');?>
    <?!= include('Videoteca'); ?>
    <?!= include('Locais_treino'); ?>
    <?!= include('Cursos'); ?>
    <?!= include('Social'); ?>
    <?!= include('Instrutor'); ?>
    <?!= include('GestaoAlunos'); ?>
    <?!= include('Certificados'); ?>
    <?!= include('Ranking');?>
    <?!= include('ChamadaDinamica'); ?>
    <?!= include('Financeiro'); ?>
  </div>
  

  <div id="admin-module-wrapper" style="display:none;">
    <?!= include('Adm'); ?>
  </div>

  <div id="btn-ajuda-fab" onclick="abrirModalAjuda()" title="Precisa de ajuda?">
    <span class="material-icons">support_agent</span>
  </div>

  <div id="modal-ajuda" class="modal-overlay-ajuda">
    <div class="modal-box-ajuda">
      <div class="modal-header-ajuda">
        <h3><span class="material-icons" style="vertical-align:bottom; color:var(--primary-color)">support_agent</span>
          Central de Ajuda</h3>
        <button onclick="fecharModalAjuda()" class="btn-close-ajuda"><span class="material-icons">close</span></button>
      </div>
      <button onclick="irParaManual()" class="btn-manual"><span class="material-icons">menu_book</span> LER MANUAL DO APP</button>
      <div
        style="display:flex; align-items:center; margin: 15px 0; color:var(--text-color); opacity:0.6; font-size:11px;">
        <hr style="flex:1; border:0; border-top:1px solid rgba(255,255,255,0.2);">
        <span style="padding:0 10px;">OU RELATE UM PROBLEMA</span>
        <hr style="flex:1; border:0; border-top:1px solid rgba(255,255,255,0.2);">
      </div>
      <form onsubmit="enviarAjuda(event)">
        <input type="hidden" name="sup_login" id="sup_login">
        <input type="hidden" name="sup_nome" id="sup_nome">
        <div style="margin-bottom:10px">
          <label style="font-size:11px; font-weight:bold; color:var(--text-color); opacity:0.8;">TIPO</label>
          <select name="sup_tipo" class="input-ajuda" required>
            <option value="" disabled selected style="color:#000">Selecione...</option>
            <option value="Dúvida" style="color:#000">Dúvida</option>
            <option value="Sugestão" style="color:#000">Sugestão</option>
            <option value="Erro" style="color:#000">Erro / Bug</option>
          </select>
        </div>
        <div style="margin-bottom:10px">
          <label style="font-size:11px; font-weight:bold; color:var(--text-color); opacity:0.8;">ASSUNTO</label>
          <input type="text" name="sup_assunto" class="input-ajuda" required>
        </div>
        <div style="margin-bottom:15px">
          <label style="font-size:11px; font-weight:bold; color:var(--text-color); opacity:0.8;">MENSAGEM</label>
          <textarea name="sup_msg" class="input-ajuda" rows="3" required></textarea>
        </div>
        <button type="submit" class="btn-enviar-ajuda">ENVIAR MENSAGEM</button>
      </form>
    </div>
  </div>

  <script>
    console.log("🛡️ [MILITARY LOG] Dashboard Boot Sequence Initiated.");

    const LOGO_PADRAO = "<?= logoUrl ?>";
    let currentUser = {};
    const LISTA_INSTRUTOR = ["INSTRUTOR N1", "INSTRUTOR N2", "INSTRUTOR N3", "PROFESSOR", "MESTRE", "VERDE ESCURO", "AZUL ESCURO", "MARROM", "PRETA", "PRETA E BRANCA"];
    const LISTA_ADMIN = ["MESTRE", "ADMIN", "PRETA E BRANCA", "VERMELHA"];

    const CacheSystem = {
      PREFIX: 'fbkmkln_cache_',
      set: function(key, data, minutes = 60) { try { localStorage.setItem(this.PREFIX + key, JSON.stringify({ value: data, expiry: Date.now() + (minutes * 60 * 1000) })); } catch (e) {} },
      get: function(key) { try { const recordStr = localStorage.getItem(this.PREFIX + key); if (!recordStr) return null; const record = JSON.parse(recordStr); if (Date.now() > record.expiry) { localStorage.removeItem(this.PREFIX + key); return null; } return record.value; } catch (e) { return null; } },
      clearAll: function() { Object.keys(localStorage).forEach(k => { if(k.startsWith(this.PREFIX)) localStorage.removeItem(k); }); }
    };

    function criarCardTreino(nome, hora, detalhe, checkinAtivo, linkMaps, pin, corDetalhe = "var(--text-color)") {
        const div = document.createElement('div');
        div.className = 'item-treino';
        let areaBotoes = '<div style="display:flex; gap:8px; align-items:center;">';
        
        if (linkMaps) { areaBotoes += `<a href="${linkMaps}" target="_blank" class="btn-rota-sm" style="background:var(--secondary-color); color:var(--primary-color);" title="Rota"><span class="material-icons" style="font-size:16px">near_me</span></a>`; }
        if (checkinAtivo) { areaBotoes += `<button onclick="irParaCheckin('${pin}')" class="btn-rota-sm" style="background:var(--primary-color); border-color:var(--primary-color); color:var(--btn-text-color);"><span class="material-icons" style="font-size:14px">qr_code</span> CHECK-IN</button>`; } 
        if (!checkinAtivo && !linkMaps) { areaBotoes += `<span style="font-size:0.65rem; color:var(--text-color); opacity:0.6; border:1px solid rgba(255,255,255,0.2); padding:4px 8px; border-radius:4px;">Aguarde</span>`; }
        areaBotoes += '</div>';

        div.innerHTML = `<div class="info-treino"><h4 style="color:${checkinAtivo ? 'var(--primary-color)' : 'var(--text-color)'}">${nome}</h4><p><span class="material-icons" style="font-size:12px; vertical-align:middle; opacity:0.8;">schedule</span> ${hora}</p><p style="font-size:0.75rem; color:${corDetalhe}; margin-top:4px;">${detalhe}</p></div>${areaBotoes}`;
        return div;
    }

    function irParaCheckin(pin) {
        if(typeof initChamadaDinamica === 'function') {
            initChamadaDinamica('aluno');
            setTimeout(() => { const input = document.getElementById('input-pin'); if(input && pin) input.value = pin; }, 500);
        } else { alert("Carregando Módulo..."); }
    }

    function carregarTreinosDeHoje() {
        const diasSemana = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
        const hoje = new Date();
        const diaHojeStr = diasSemana[hoje.getDay()];
        document.getElementById('lbl-dia-semana').textContent = `(${diaHojeStr})`;
        const container = document.getElementById('lista-hoje-container');
        container.innerHTML = '<div style="text-align:center; color:var(--text-color); opacity:0.6; padding: 10px;">Buscando treinos...</div>';

        google.script.run.withSuccessHandler(aulasLive => {
            google.script.run.withSuccessHandler(locaisFixos => {
                container.innerHTML = "";
                let encontrouAlgum = false;
                if (aulasLive && aulasLive.length > 0) {
                    aulasLive.forEach(aula => {
                        encontrouAlgum = true;
                        const nomeLocalAtual = String(aula.academia).trim().toLowerCase();
                        const nomeInstrutor = aula.instrutor.split(' ')[0];
                        const localObj = locaisFixos ? locaisFixos.find(l => l.nome.trim().toLowerCase() === nomeLocalAtual) : null;
                        
                        let detalheTexto = localObj ? `Aula Ativa com ${nomeInstrutor}` : `⚠️ Consulte ${nomeInstrutor} para o local.`;
                        let corTexto = localObj ? "var(--text-color)" : "var(--primary-color)";
                        let linkMapa = localObj ? localObj.linkMaps : null;

                        container.appendChild(criarCardTreino(aula.academia, aula.horario, detalheTexto, true, linkMapa, aula.pin, corTexto));
                    });
                }

                if (locaisFixos) {
                    locaisFixos.forEach(local => {
                        const diasLocal = String(local.dias).toLowerCase();
                        if (diasLocal.includes(diaHojeStr.toLowerCase().slice(0, 3)) || diasLocal.includes("todos")) {
                            const jaEstaLive = aulasLive.some(al => al.academia.toLowerCase() === local.nome.toLowerCase());
                            if (!jaEstaLive) {
                                encontrouAlgum = true;
                                container.appendChild(criarCardTreino(local.nome, local.horarios, local.cidade || "Unidade", false, local.linkMaps));
                            }
                        }
                    });
                }
                document.getElementById('widget-treino-hoje').style.display = encontrouAlgum ? 'block' : 'none';
            }).getLocaisTreino();
        }).buscarAulasDisponiveisAluno("TODOS");
    }

    window.onload = function () {
      try {
        const s = localStorage.getItem("userSession");
        if (!s) { logout(); return; }
        renderizarDashboard(JSON.parse(s));
        carregarTreinosDeHoje();
      } catch (e) { logout(); }
    };

    function renderizarDashboard(user) {
      currentUser = user;
      const nome = user.nomeCompleto || user.LOGIN || "Aluno";
      document.getElementById("greeting").textContent = `Olá, ${nome.split(" ")[0]}!`;
      if (user.fotoUrl) document.getElementById("header-img").src = user.fotoUrl;

      const grid = document.getElementById("dashboard-grid");
      grid.innerHTML = "";
      getMenuCards(user).forEach(item => {
        const div = document.createElement("div");
        div.className = item.special ? "dash-card card-special" : "dash-card";
        div.onclick = () => handleAction(item.action);
        div.innerHTML = `<span class="material-icons card-icon">${item.icon}</span><div class="card-title">${item.title}</div><div class="card-subtitle">${item.subtitle}</div>`;
        grid.appendChild(div);
      });

      document.getElementById("loading-screen").style.display = "none";
      document.getElementById("main-content").style.display = "block";
    }

    function getMenuCards(user) {
      const list = [
        { title: "Perfil do Aluno", subtitle: "Dados e carteirinha", icon: "person", action: "perfil" },
        { title: "Vídeo Aulas", subtitle: "Vídeos separados por Graduação", icon: "ondemand_video", action: "videos" },
        { title: "Programa Técnico", subtitle: "Arquivos PDF", icon: "description", action: "programa" },
        { title: "Cursos e Eventos", subtitle: "Inscrições abertas", icon: "school", action: "cursos" },
        { title: "Ranking", subtitle: "Destaques do mês", icon: "emoji_events", action: "ranking" },
        { title: "Loja", subtitle: "Equipamentos e produtos", icon: "shopping_cart", action: "shop" },
        { title: "Locais de Treino", subtitle: "Unidades Disponíveis", icon: "location_on", action: "locais" },
        { title: "Mídias Sociais", subtitle: "Nossas redes", icon: "groups", action: "social" },
        { title: "Biblioteca", subtitle: "Manuais e Livros", icon: "menu_book", action: "biblioteca" },
        { title: "Certificados", subtitle: "Diplomas Oficiais", icon: "workspace_premium", action: "certificados" },
        { title: "Financeiro", subtitle: "Pagamentos e Planos", icon: "attach_money", action: "financeiro" },
      ];

      const grad = String(user.graduacao || "").toUpperCase();
      const nivel = String(user.nivel || "").toUpperCase();
      const ehInstrutor = user.isInstrutor === true || LISTA_INSTRUTOR.some(f => grad.includes(f) || nivel.includes(f));
      const ehAdmin = LISTA_ADMIN.some(f => grad.includes(f) || nivel.includes(f));

      if (ehInstrutor || ehAdmin) {
        list.push({ title: "Lista de Presença", subtitle: "Gerenciar Aula", icon: "qr_code_2", action: "chamada_instrutor", special: true });
        list.push({ title: "Gestão de Alunos", subtitle: "Cadastros e Edição", icon: "manage_accounts", action: "view_instrutor", special: true });
        list.push({ title: "Cadastrar Aluno", subtitle: "Link Externo", icon: "person_add", action: "form_cadastro", special: true });
      } else {
        list.push({ title: "Check-in Aula", subtitle: "Marcar Presença", icon: "qr_code_scanner", action: "chamada_aluno", special: true });
      }

      if (ehAdmin) {
        list.push({ title: "Painel Admin", subtitle: "Gestão Total", icon: "settings_suggest", action: "view_admin", special: true });
      }
      return list;
    }

    function handleAction(action) {
      if (action === "chamada_instrutor") { if(typeof initChamadaDinamica === 'function') initChamadaDinamica('instrutor'); return; }
      if (action === "chamada_aluno") { if(typeof initChamadaDinamica === 'function') initChamadaDinamica('aluno'); return; }
      if (action === "view_admin") { abrirAdminView(); if (typeof carregarAlunos === 'function') carregarAlunos(); return; }
      if (action === "view_instrutor") { if(typeof abrirGestaoAlunos === 'function') abrirGestaoAlunos(); return; }
      if (action === "shop") { window.open("https://wa.me/5581997629232", "_blank"); return; }
      if (action === "form_cadastro") { window.open("https://forms.gle/3vXp86VCmuLzHrk46", "_blank"); return; }

      const map = { 
          "perfil": () => carregarDadosPerfil(currentUser), "programa": () => abrirPrograma(currentUser), 
          "biblioteca": () => abrirBiblioteca(), "videos": () => abrirVideoteca(), 
          "locais": () => abrirLocaisTreino(), "cursos": () => abrirCursos(), 
          "social": () => abrirSocial(), "financeiro": () => abrirFinanceiro(), 
          "ranking": () => abrirRanking(), "certificados": () => abrirCertificados()
      };
      if (map[action]) map[action]();
    }

    function abrirAdminView() { document.getElementById("main-content").style.display = "none"; document.getElementById("admin-module-wrapper").style.display = "block"; }
    window.fecharAdmin = function () { document.getElementById("admin-module-wrapper").style.display = "none"; document.getElementById("main-content").style.display = "block"; };
    
    function logout() { localStorage.removeItem("userSession"); CacheSystem.clearAll(); google.script.run.withSuccessHandler(u => window.top.location.href = u + "?page=login").getScriptUrl(); }

    function abrirModalAjuda() {
        try { if(currentUser) { document.getElementById('sup_login').value = currentUser.LOGIN; document.getElementById('sup_nome').value = currentUser.nomeCompleto; } } catch(e) {}
        document.getElementById('modal-ajuda').style.display = 'flex';
    }
    function fecharModalAjuda() { document.getElementById('modal-ajuda').style.display = 'none'; }
    function irParaManual() { google.script.run.withSuccessHandler(url => window.top.location.href = url + "?page=ajuda").getScriptUrl(); }

    function enviarAjuda(e) {
        e.preventDefault(); const btn = document.querySelector('.btn-enviar-ajuda');
        const txt = btn.innerText; btn.innerText = "ENVIANDO..."; btn.disabled = true;
        google.script.run.withSuccessHandler(res => { alert(res); e.target.reset(); fecharModalAjuda(); btn.innerText = txt; btn.disabled = false; })
        .salvarTicketSuporte(e.target);
    }
  </script>
</body>

</html>
