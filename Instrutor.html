<!-- DOJO MANAGER - PORTAL DO ALUNO -->
<!--Página de Gestão de Turmas para Instrutores - Interface moderna e responsiva para criação de chamadas e visualização de histórico. -->

<style>
  /* --- ESTILOS GERAIS DO MÓDULO --- */
  .instrutor-view {
    display: none;
    padding-bottom: 80px;
    animation: fadeIn 0.3s;
  }

  .inst-tabs {
    display: flex;
    background: var(--secondary-color, #1e1e1e);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 20px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .inst-tab {
    flex: 1;
    text-align: center;
    padding: 12px;
    cursor: pointer;
    color: var(--text-color, #888);
    opacity: 0.6;
    font-weight: bold;
    border-radius: 8px;
    transition: 0.3s;
    font-size: 0.9rem;
  }

  .inst-tab.active {
    background: var(--primary-color, #FFD700);
    color: var(--btn-text-color, #000);
    opacity: 1;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
  }

  .call-grid,
  .filter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    background: var(--secondary-color, #1e1e1e);
    padding: 15px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    margin-bottom: 15px;
  }

  .full-col {
    grid-column: 1 / -1;
  }

  .inst-input {
    width: 100%;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: var(--text-color, #fff);
    padding: 10px;
    border-radius: 6px;
    box-sizing: border-box;
    font-size: 0.9rem;
    transition: 0.3s;
  }

  .inst-input:focus {
    border-color: var(--primary-color, #FFD700);
    outline: none;
    background: rgba(0, 0, 0, 0.5);
  }

  .inst-input option {
    background: var(--secondary-color);
    color: var(--text-color);
  }

  .student-card {
    background: var(--secondary-color, #252525);
    padding: 12px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: 0.2s;
  }

  .student-card.checked {
    background: rgba(255, 215, 0, 0.1);
    border-color: var(--primary-color, #FFD700);
  }

  .st-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    background: #000;
    border: 2px solid var(--primary-color, #444);
  }

  .hist-item {
    background: var(--secondary-color, #1e1e1e);
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .hist-info {
    flex: 1;
  }

  .hist-date {
    color: var(--primary-color, #FFD700);
    font-weight: bold;
    font-size: 0.9rem;
  }

  .hist-local {
    color: var(--text-color, #fff);
    margin: 4px 0;
    font-size: 0.95rem;
  }

  .hist-detail {
    color: var(--text-color, #888);
    opacity: 0.7;
    font-size: 0.8rem;
  }

  .btn-pdf-mini {
    background: rgba(0, 0, 0, 0.3);
    color: var(--primary-color, #FFD700);
    border: 1px solid var(--primary-color, #FFD700);
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: 0.2s;
  }

  .btn-pdf-mini:hover {
    background: var(--primary-color, #FFD700);
    color: var(--btn-text-color, #000);
  }

  /* FAB na Esquerda */
  .fab-save {
    position: fixed;
    bottom: 30px;
    left: 30px;
    background: var(--primary-color, #FFD700);
    color: var(--btn-text-color, #000);
    border: none;
    border-radius: 50px;
    padding: 15px 25px;
    font-weight: bold;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    z-index: 90;
    transition: 0.2s;
  }

  .fab-save:hover {
    filter: brightness(1.1);
    transform: scale(1.05);
  }

  /* --- MODAL RELATÓRIO A4 RESPONSIVO --- */
  #modal-relatorio {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    z-index: 10000;
    display: none;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
    padding-top: 80px;
    padding-bottom: 40px;
    box-sizing: border-box;
  }

  /* Barra de Controle FIXA no topo */
  .print-controls {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: var(--secondary-color, #1e1e1e);
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 15px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
    z-index: 10001;
    border-bottom: 1px solid var(--primary-color);
  }

  .paper-a4 {
    background: #fff;
    color: #000;
    width: 210mm;
    max-width: 95%;
    min-height: 297mm;
    padding: 15mm;
    box-sizing: border-box;
    font-family: 'Times New Roman', serif;
    position: relative;
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    margin: 0 auto;
  }

  .rep-header {
    text-align: center;
    border-bottom: 2px solid #000;
    padding-bottom: 10px;
    margin-bottom: 20px;
  }

  .rep-logo {
    height: 80px;
    object-fit: contain;
    display: block;
    margin: 0 auto 10px auto;
  }

  .rep-title {
    font-size: 18pt;
    font-weight: bold;
    margin: 10px 0;
    text-transform: uppercase;
  }

  .rep-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
    font-size: 11pt;
  }

  @media (max-width: 600px) {
    .rep-grid {
      grid-template-columns: 1fr;
    }
  }

  .rep-label {
    font-weight: bold;
  }

  .rep-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 10pt;
  }

  .rep-table th {
    border: 1px solid #000;
    padding: 8px;
    background: #eee;
    text-align: left;
  }

  .rep-table td {
    border: 1px solid #000;
    padding: 8px;
  }

  .rep-footer {
    margin-top: 40px;
    text-align: center;
    font-size: 9pt;
    padding-top: 20px;
    border-top: 1px solid #ccc;
  }

  /* MODO IMPRESSÃO (PERFEITO) */
  @media print {
    body * {
      visibility: hidden;
    }

    #modal-relatorio,
    #conteudo-relatorio,
    #conteudo-relatorio * {
      visibility: visible;
    }

    #modal-relatorio {
      position: absolute;
      left: 0;
      top: 0;
      background: white;
      padding: 0;
      margin: 0;
      display: block;
      overflow: visible;
      width: 100%;
      height: auto;
    }

    .print-controls {
      display: none !important;
    }

    .paper-a4 {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 10mm;
      box-shadow: none;
      border: none;
      min-height: auto;
    }
  }
</style>

<div id="instrutor-view" class="instrutor-view">
  <div class="profile-header-nav">
    <button class="btn-back" onclick="fecharInstrutor()"><span class="material-icons">arrow_back</span></button>
    <h2 style="margin:0; font-size:1.5rem; color:var(--text-color, #fff)">Gestão de Turmas</h2>
  </div>

  <div class="inst-tabs">
    <div class="inst-tab active" onclick="navInst('chamada', this)">Nova Chamada</div>
    <div class="inst-tab" onclick="navInst('historico', this)">Histórico</div>
  </div>

  <div id="tab-chamada">
    <div class="call-grid">
      <div><label class="adm-label">DATA</label><input type="date" id="c-data" class="inst-input"></div>
      <div><label class="adm-label">HORA</label><input type="time" id="c-hora" class="inst-input" value="19:00"></div>
      <div class="full-col">
        <label class="adm-label">MINISTRANTE</label><select id="c-ministrante" class="inst-input"><option value="" disabled selected>Carregando...</option></select>
      </div>
      <div class="full-col">
        <label class="adm-label">LOCAL</label><select id="c-local" class="inst-input" onchange="checkOutro(this)"><option value="" disabled selected>Carregando...</option></select>
        <input type="text" id="c-local-outro" class="inst-input" style="display:none; margin-top:10px;" placeholder="Digite o nome do local...">
      </div>
    </div>

    <div class="adm-toolbar">
      <input type="text" id="c-busca" class="inst-input" placeholder="Buscar aluno..." onkeyup="filtrarListaChamada()">
      <label style="display:flex; align-items:center; gap:5px; color:var(--text-color); opacity:0.8; font-size:0.9rem; margin-top:10px;">
        <input type="checkbox" id="c-todos" onchange="filtrarListaChamada()"> Incluir Visitantes
      </label>
    </div>

    <div id="lista-chamada">
      <p style="text-align:center; color:var(--text-color); opacity:0.6; margin-top:20px;">Aguardando dados...</p>
    </div>

    <button class="fab-save" onclick="salvarChamada()"><span class="material-icons">save</span> SALVAR (<span id="count-sel">0</span>)</button>
  </div>

  <div id="tab-historico" style="display:none;">
    <div class="filter-grid">
      <div><label class="adm-label">INÍCIO</label><input type="date" id="h-inicio" class="inst-input"></div>
      <div><label class="adm-label">FIM</label><input type="date" id="h-fim" class="inst-input"></div>
      <div class="full-col">
        <label class="adm-label">LOCAL</label><select id="h-local" class="inst-input"><option value="">Todos</option></select>
      </div>
      <div class="full-col">
        <button class="adm-btn" style="width:100%" onclick="carregarHistoricoFiltrado()">FILTRAR</button>
      </div>
    </div>
    <div id="historico-container"></div>
  </div>
</div>

<div id="modal-relatorio">
  <div class="print-controls">
    <button class="adm-btn" onclick="document.getElementById('modal-relatorio').style.display='none'" style="background:#444; color:#fff">FECHAR</button>
    <button class="adm-btn" onclick="window.print()">SALVAR PDF</button>
    <button class="adm-btn" onclick="compartilharRelatorio()" id="btn-share" style="display:none; background:#007bff; color:#fff">COMPARTILHAR</button>
  </div>

  <div class="paper-a4" id="conteudo-relatorio">
    <div class="rep-header">
      <img id="pdf-logo" src="https://lh3.googleusercontent.com/d/1mVV2idWbyfoOP4EV76I1fHV_PaoEUcdv" class="rep-logo">
      <div class="rep-title">Relatório de Treinamento</div>
      <div style="font-size:10pt;">Lista Oficial de Presença</div>
    </div>
    <div class="rep-grid">
      <div><span class="rep-label">Data:</span> <span id="r-data"></span></div>
      <div><span class="rep-label">Hora:</span> <span id="r-hora"></span></div>
      <div style="grid-column:1/-1"><span class="rep-label">Local:</span> <span id="r-local"></span></div>
      <div style="grid-column:1/-1"><span class="rep-label">Instrutor:</span> <span id="r-inst"></span></div>
      <div><span class="rep-label">ID Chamada:</span> <span id="r-id" style="font-family:monospace"></span></div>
    </div>
    <div style="margin-bottom:10px; font-weight:bold; border-bottom:1px solid #000;">Lista de Presença</div>
    <table class="rep-table">
      <thead>
        <tr>
          <th style="width:10%">#</th>
          <th>Nome do Aluno</th>
          <th>Assinatura / Check</th>
        </tr>
      </thead>
      <tbody id="r-lista-body"></tbody>
    </table>
    <div class="rep-footer">Relatório gerado digitalmente em <span id="r-gerado"></span>.<br>Gerado via Sistema DojoManager.
    </div>
  </div>
</div>

<script>
  let userInst = {};
  let dbAlunos = [];
  let selecao = new Set();

  function abrirTelaChamada(user) {
    userInst = user;
    selecao.clear();
    document.getElementById('dashboard-grid').style.display = 'none';
    document.querySelector('.dashboard-header').style.display = 'none';
    
    // Oculta o widget de treinos de hoje para abrir espaço
    const widgetHoje = document.getElementById('widget-treino-hoje');
    if(widgetHoje) widgetHoje.style.display = 'none';
    
    document.getElementById('instrutor-view').style.display = 'block';
    
    atualizarContador(); 
    
    const hoje = new Date();
    const passado = new Date();
    passado.setDate(hoje.getDate() - 90);
    try { 
        document.getElementById('c-data').value = hoje.toISOString().split('T')[0];
        document.getElementById('h-inicio').value = passado.toISOString().split('T')[0];
        document.getElementById('h-fim').value = hoje.toISOString().split('T')[0];
    } catch(e){}
    
    // Tenta injetar a logo no PDF se ela existir no cache/variáveis
    try {
        const logo = document.getElementById("header-img").src;
        if(logo) document.getElementById("pdf-logo").src = logo;
    } catch(e){}
    
    google.script.run.withSuccessHandler(initChamada).getDadosParaChamada();
  }

  function fecharInstrutor() {
    document.getElementById('instrutor-view').style.display = 'none';
    document.querySelector('.dashboard-header').style.display = 'flex';
    document.getElementById('dashboard-grid').style.display = 'grid';
    // O widget hoje pode ser recarregado se quiser
  }

  function navInst(tab, el) {
    document.querySelectorAll('.inst-tab').forEach(e => e.classList.remove('active'));
    if(el) el.classList.add('active');
    document.getElementById('tab-chamada').style.display = 'none';
    document.getElementById('tab-historico').style.display = 'none';
    document.getElementById('tab-'+tab).style.display = 'block';
    if(tab === 'historico') carregarHistoricoFiltrado();
  }

  function initChamada(res) {
    if(!res) return;
    dbAlunos = res.alunos || [];
    const selC = document.getElementById('c-local');
    const selH = document.getElementById('h-local');
    const selInst = document.getElementById('c-ministrante');
    
    if(selC && res.locais) {
        selC.innerHTML = '<option value="" disabled selected>Selecione...</option>';
        res.locais.forEach(l => { selC.add(new Option(l, l, false, userInst.academia === l)); });
        selC.add(new Option("Outros (Digitar)", "Outros"));
    }
    if(selH && res.locais) {
        selH.innerHTML = '<option value="">Todos os Locais</option>';
        res.locais.forEach(l => selH.add(new Option(l, l)));
    }
    if(selInst) {
        selInst.innerHTML = '';
        if(res.instrutores && res.instrutores.length > 0) {
            res.instrutores.forEach(i => selInst.add(new Option(i, i, false, i === userInst.nomeCompleto)));
        } else {
            selInst.add(new Option(userInst.nomeCompleto, userInst.nomeCompleto));
        }
    }
    filtrarListaChamada();
  }

  function checkOutro(sel) { const input = document.getElementById('c-local-outro'); if(input) input.style.display = (sel.value === 'Outros') ? 'block' : 'none'; }

  function filtrarListaChamada() {
    const termo = document.getElementById('c-busca').value.toLowerCase();
    const global = document.getElementById('c-todos').checked;
    const localInst = userInst.academia || "";
    const container = document.getElementById('lista-chamada');
    if(!container) return;
    container.innerHTML = "";
    
    const filtrados = dbAlunos.filter(a => {
        const matchNome = a.nome.toLowerCase().includes(termo);
        const matchLocal = global ? true : (a.academia === localInst);
        return matchNome && matchLocal;
    });
    
    if(filtrados.length === 0) { container.innerHTML = '<p style="text-align:center; color:var(--text-color); opacity:0.6; margin-top:20px;">Nenhum aluno encontrado.</p>'; return; }
    
    filtrados.forEach(a => {
        const div = document.createElement('div');
        const isSel = selecao.has(a.login);
        div.className = `student-card ${isSel ? 'checked' : ''}`;
        div.onclick = () => toggleSel(a.login, div);
        
        div.innerHTML = `
          <img src="${a.foto}" class="st-avatar" onerror="this.src='https://ui-avatars.com/api/?name=${a.login}'">
          <div style="flex:1">
            <div style="font-weight:bold; color:var(--text-color)">${a.nome}</div>
            <div style="font-size:0.8rem; color:var(--text-color); opacity:0.6">${a.graduacao} • ${a.academia}</div>
          </div>
          <span class="material-icons" style="color:${isSel?'var(--primary-color)':'rgba(255,255,255,0.2)'}">${isSel ? 'check_circle' : 'radio_button_unchecked'}</span>
        `;
        container.appendChild(div);
    });
  }

  function toggleSel(login, div) {
    const icon = div.querySelector('.material-icons');
    if(selecao.has(login)) { 
        selecao.delete(login); 
        div.classList.remove('checked'); 
        icon.textContent = 'radio_button_unchecked'; 
        icon.style.color = 'rgba(255,255,255,0.2)'; 
    } else { 
        selecao.add(login); 
        div.classList.add('checked'); 
        icon.textContent = 'check_circle'; 
        icon.style.color = 'var(--primary-color)'; 
    }
    atualizarContador();
  }

  function atualizarContador() { const el = document.getElementById('count-sel'); if(el) el.innerText = selecao.size; }

  function salvarChamada() {
    if(selecao.size === 0) { alert("Selecione alunos."); return; }
    let local = document.getElementById('c-local').value;
    if(local === "Outros") local = document.getElementById('c-local-outro').value;
    if(!local) { alert("Informe o local."); return; }
    
    const btn = document.querySelector('.fab-save'); 
    const txt = btn.innerHTML; 
    btn.innerText = "SALVANDO..."; 
    btn.disabled = true;
    
    const listaFinal = dbAlunos.filter(a => selecao.has(a.login));
    const payload = { 
        instrutor: document.getElementById('c-ministrante').value, 
        local: local, 
        dataTreino: document.getElementById('c-data').value, 
        horaTreino: document.getElementById('c-hora').value, 
        alunos: listaFinal 
    };
    
    google.script.run.withSuccessHandler(res => {
        alert(res.message); 
        selecao.clear(); 
        atualizarContador(); 
        filtrarListaChamada(); 
        btn.innerHTML = txt; 
        btn.disabled = false;
    }).salvarChamada(payload);
  }

  function carregarHistoricoFiltrado() {
    const div = document.getElementById('historico-container');
    if(!div) return;
    div.innerHTML = '<div class="spinner" style="margin-top:20px; border-left-color:var(--primary-color)"></div>';
    
    const filtros = { 
        inicio: document.getElementById('h-inicio').value, 
        fim: document.getElementById('h-fim').value, 
        local: document.getElementById('h-local').value, 
        instrutor: "" 
    };
    
    google.script.run.withSuccessHandler(lista => {
        div.innerHTML = "";
        if(lista.length === 0) { div.innerHTML = "<p style='text-align:center; color:var(--text-color); opacity:0.6'>Nenhum registro neste período.</p>"; return; }
        
        lista.forEach(h => {
            div.innerHTML += `
              <div class="hist-item">
                <div class="hist-info">
                  <div class="hist-date" style="color:var(--primary-color)">${h.data} - ${h.hora}</div>
                  <div class="hist-local" style="color:var(--text-color)">${h.local}</div>
                  <div class="hist-detail" style="color:var(--text-color); opacity:0.6">${h.instrutor} • ${h.qtd} Alunos</div>
                </div>
                <div class="btn-pdf-mini" onclick="gerarRelatorioPDF('${h.id}')">
                  <span class="material-icons">picture_as_pdf</span> PDF
                </div>
              </div>`;
        });
    }).getHistoricoFiltrado(filtros);
  }

  function gerarRelatorioPDF(idChamada) {
    google.script.run.withSuccessHandler(data => {
        if(!data) { alert("Erro ao carregar dados."); return; }
        document.getElementById('r-data').innerText = data.data; 
        document.getElementById('r-hora').innerText = data.hora; 
        document.getElementById('r-local').innerText = data.local; 
        document.getElementById('r-inst').innerText = data.instrutor; 
        document.getElementById('r-id').innerText = data.id; 
        document.getElementById('r-gerado').innerText = new Date().toLocaleString();
        
        const tbody = document.getElementById('r-lista-body');
        if(tbody) { 
            tbody.innerHTML = ""; 
            const nomes = data.listaNomes ? data.listaNomes.split(",") : []; 
            nomes.forEach((nome, idx) => { 
                tbody.innerHTML += `<tr><td>${idx+1}</td><td>${nome.trim()}</td><td></td></tr>`; 
            }); 
        }
        
        if(navigator.share) document.getElementById('btn-share').style.display = 'inline-flex';
        document.getElementById('modal-relatorio').style.display = 'flex';
    }).getDetalhesChamada(idChamada);
  }

  function compartilharRelatorio() {
      if(navigator.share) {
          navigator.share({
              title: 'Relatório DojoManager',
              text: 'Relatório de Treino: ' + document.getElementById('r-data').innerText,
              url: window.location.href
          }).catch(console.error);
      } else {
          alert("Função indisponível neste navegador.");
      }
  }
</script>
