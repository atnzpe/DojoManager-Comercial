  <script>
    const LOGO_PADRAO = "<?= logoUrl ?>";
    let currentUser = {};
    const LISTA_INSTRUTOR = ["INSTRUTOR N1", "INSTRUTOR N2", "INSTRUTOR N3", "PROFESSOR", "MESTRE", "VERDE ESCURO", "AZUL ESCURO", "MARROM", "PRETA", "PRETA E BRANCA"];
    const LISTA_ADMIN = ["MESTRE", "ADMIN", "PRETA E BRANCA", "VERMELHA"];

    // --- ENGINE DE CACHE (BLINDAGEM DE PERFORMANCE) ---
    const CacheSystem = {
      PREFIX: 'fbkmkln_cache_',
      set: function(key, data, minutes = 60) {
        try {
          const payload = { value: data, expiry: Date.now() + (minutes * 60 * 1000), version: '1.0' };
          localStorage.setItem(this.PREFIX + key, JSON.stringify(payload));
          console.log(`[CACHE] Salvo: ${key}`);
        } catch (e) { console.warn("Cache Full", e); }
      },
      get: function(key) {
        try {
          const recordStr = localStorage.getItem(this.PREFIX + key);
          if (!recordStr) return null;
          const record = JSON.parse(recordStr);
          if (Date.now() > record.expiry) { localStorage.removeItem(this.PREFIX + key); return null; }
          console.log(`[CACHE] Hit: ${key}`);
          return record.value;
        } catch (e) { return null; }
      },
      clearAll: function() {
        Object.keys(localStorage).forEach(k => { if(k.startsWith(this.PREFIX)) localStorage.removeItem(k); });
      }
    };

    // Função auxiliar atualizada para suportar MÚLTIPLOS BOTÕES
    function criarCardTreino(nome, hora, detalhe, checkinAtivo, linkMaps, pin, corDetalhe = "#888") {
        const div = document.createElement('div');
        div.className = 'item-treino';
        
        let areaBotoes = '<div style="display:flex; gap:8px; align-items:center;">';
        
        // 1. Botão ROTA (Se tiver link) - Ícone menor para caber
        if (linkMaps) {
            areaBotoes += `
                <a href="${linkMaps}" target="_blank" class="btn-rota-sm" style="background:#333; border:1px solid #555; color:#fff; padding:5px 8px;" title="Ver Rota">
                    <span class="material-icons" style="font-size:16px">near_me</span>
                </a>`;
        }

        // 2. Botão CHECK-IN (Se estiver ativo)
        if (checkinAtivo) {
            areaBotoes += `
                <button onclick="irParaCheckin('${pin}')" class="btn-rota-sm" style="background:#4caf50; border-color:#4caf50; color:#fff;">
                    <span class="material-icons" style="font-size:14px">qr_code</span> CHECK-IN
                </button>`;
        } 
        
        // 3. Fallback: Se não tiver nada (apenas info)
        if (!checkinAtivo && !linkMaps) {
             areaBotoes += `<span style="font-size:0.65rem; color:#666; border:1px solid #444; padding:2px 6px; border-radius:4px;">Aguarde</span>`;
        }

        areaBotoes += '</div>';

        div.innerHTML = `
            <div class="info-treino">
                <h4 style="color:${checkinAtivo ? '#FFD700' : '#fff'}">${nome}</h4>
                <p><span class="material-icons" style="font-size:12px; vertical-align:middle">schedule</span> ${hora}</p>
                <p style="font-size:0.7rem; color:${corDetalhe}; margin-top:4px;">${detalhe}</p>
            </div>
            ${areaBotoes}
        `;
        return div;
    }

    function irParaCheckin(pin) {
        // Redireciona para o módulo de chamada já injetando o PIN (opcional) ou só abrindo
        if(typeof initChamadaDinamica === 'function') {
            initChamadaDinamica('aluno');
            // Pequeno hack para preencher o PIN se quiser
            setTimeout(() => {
                const input = document.getElementById('input-pin');
                if(input && pin) input.value = pin;
            }, 500);
        } else {
            alert("Módulo de chamada carregando...");
        }
    }

    // --- LÓGICA DE TREINO DO DIA (VERSÃO FINAL 2.0: BOTÕES SIMULTÂNEOS) ---
    function carregarTreinosDeHoje() {
        const diasSemana = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
        const hoje = new Date();
        const diaHojeStr = diasSemana[hoje.getDay()];
        
        document.getElementById('lbl-dia-semana').textContent = `(${diaHojeStr})`;
        const container = document.getElementById('lista-hoje-container');
        container.innerHTML = '<div style="text-align:center;color:#888;">Buscando treinos...</div>';

        // 1. Busca Aulas LIVE (Dinâmicas)
        google.script.run.withSuccessHandler(aulasLive => {
            
            // 2. Busca Locais FIXOS (Planilha)
            google.script.run.withSuccessHandler(locaisFixos => {
                
                container.innerHTML = "";
                let encontrouAlgum = false;
                const nomesFixos = locaisFixos ? locaisFixos.map(l => l.nome.trim().toLowerCase()) : [];

                // --- A) PROCESSAR AULAS LIVE ---
                if (aulasLive && aulasLive.length > 0) {
                    aulasLive.forEach(aula => {
                        encontrouAlgum = true;
                        
                        const nomeLocalAtual = String(aula.academia).trim().toLowerCase();
                        const nomeInstrutor = aula.instrutor.split(' ')[0];
                        
                        // Busca o objeto local completo para pegar o link
                        const localObj = locaisFixos ? locaisFixos.find(l => l.nome.trim().toLowerCase() === nomeLocalAtual) : null;
                        const isLocalConhecido = !!localObj;
                        
                        let detalheTexto = "";
                        let corTexto = "#888";
                        let linkMapa = null;

                        if (isLocalConhecido) {
                            // Local Conhecido: Mostra nome instrutor + Link do Mapa
                            detalheTexto = `Aula Ativa com ${nomeInstrutor}`;
                            corTexto = "#fff";
                            linkMapa = localObj.linkMaps; // <--- PEGA O LINK DO MAPA
                        } else {
                            // Local Avulso: Alerta
                            detalheTexto = `⚠️ Consulte ${nomeInstrutor} para o local exato.`;
                            corTexto = "#FFD700";
                            linkMapa = null;
                        }

                        const div = criarCardTreino(
                            aula.academia, 
                            aula.horario, 
                            detalheTexto, 
                            true, // Check-in Ativo
                            linkMapa, // Passa o link se existir
                            aula.pin,
                            corTexto
                        );
                        container.appendChild(div);
                    });
                }

                // --- B) PROCESSAR AULAS FIXAS (Apenas as que NÃO estão Live) ---
                if (locaisFixos) {
                    locaisFixos.forEach(local => {
                        const diasLocal = String(local.dias).toLowerCase();
                        const diaBusca = diaHojeStr.toLowerCase().slice(0, 3);

                        if (diasLocal.includes(diaBusca) || diasLocal.includes("todos")) {
                            const jaEstaLive = aulasLive.some(al => al.academia.toLowerCase() === local.nome.toLowerCase());
                            
                            if (!jaEstaLive) {
                                encontrouAlgum = true;
                                const div = criarCardTreino(
                                    local.nome, 
                                    local.horarios, 
                                    local.cidade || "Unidade Oficial", 
                                    false, // Check-in Fechado
                                    local.linkMaps
                                );
                                container.appendChild(div);
                            }
                        }
                    });
                }

                document.getElementById('widget-treino-hoje').style.display = encontrouAlgum ? 'block' : 'none';

            }).getLocaisTreino();

        }).buscarAulasDisponiveisAluno("TODOS");
    }

    window.onload = function () {
      try {
        const s = localStorage.getItem("userSession");
        if (!s) { logout(); return; }
        renderizarDashboard(JSON.parse(s));

        carregarTreinosDeHoje();
      } catch (e) { logout(); }
    };

    function renderizarDashboard(user) {
      currentUser = user;
      const nome = user.nomeCompleto || user.LOGIN || "Aluno";
      document.getElementById("greeting").textContent = `Kidá, ${nome.split(" ")[0]}!`;
      if (user.fotoUrl) document.getElementById("header-img").src = user.fotoUrl;

      const grid = document.getElementById("dashboard-grid");
      grid.innerHTML = "";
      getMenuCards(user).forEach(item => {
        const div = document.createElement("div");
        div.className = item.special ? "dash-card card-special" : "dash-card";
        div.onclick = () => handleAction(item.action);
        div.innerHTML = `<span class="material-icons card-icon">${item.icon}</span><div class="card-title">${item.title}</div><div class="card-subtitle">${item.subtitle}</div>`;
        grid.appendChild(div);
      });

      document.getElementById("loading-screen").style.display = "none";
      document.getElementById("main-content").style.display = "block";
    }

    function getMenuCards(user) {
      // 1. Definição da Base de Cards (Todos veem)
      const list = [

        { title: "Perfil do Aluno", subtitle: "Dados e carteirinha", icon: "person", action: "perfil" },
        { title: "Vídeo Aulas", subtitle: "Vídeos separados por Graduação", icon: "ondemand_video", action: "videos" },
        { title: "Programa Técnico da Graduação", subtitle: "PDFs das faixas", icon: "description", action: "programa" },
        { title: "Cursos e Eventos", subtitle: "Faça aqui sua inscriçõa para Curos e Eventos abertos", icon: "school", action: "cursos" },
        { title: "Ranking", subtitle: "Destaques do mês", icon: "emoji_events", action: "ranking" },
        { title: "Loja", subtitle: "Compra e receba diacs de Equipamentos e produtos para treino", icon: "shopping_cart", action: "shop" },
        
        
        { title: "Locais de Treino", subtitle: "Locais disponivies para Treino, Aulas em Aberto", icon: "location_on", action: "locais" },
        { title: "Mídias Sociais", subtitle: "Nossas redes", icon: "groups", action: "social" },
        
        { title: "Biblioteca", subtitle: "Manuais, Livors e artigos", icon: "menu_book", action: "biblioteca" },
        { title: "Certificados", subtitle: "Diplomas e Certificados", icon: "workspace_premium", action: "certificados" },
        
        {title: "Financeiro", subtitle: "Pagamentos e Planos", icon: "attach_money", action: "financeiro" },
      ];

      // 2. Validação de Nível
      const grad = String(user.graduacao || "").toUpperCase();
      const nivel = String(user.nivel || "").toUpperCase();
      const ehInstrutor = user.isInstrutor === true || LISTA_INSTRUTOR.some(f => grad.includes(f) || nivel.includes(f));
      const ehAdmin = LISTA_ADMIN.some(f => grad.includes(f) || nivel.includes(f));

      // 3. Lógica de Chamada (Diferente para Aluno e Instrutor)
      if (ehInstrutor || ehAdmin) {
        list.push({ title: "Lista de Presença", subtitle: "Gerenciar Aula (PIN)", icon: "qr_code_2", action: "chamada_instrutor", special: true });
        list.push({ title: "Gestão de Alunos", subtitle: "Cadastros e Edição", icon: "manage_accounts", action: "view_instrutor", special: true });
        list.push({ title: "Cadastrar Aluno", subtitle: "Link Externo", icon: "person_add", action: "form_cadastro", special: true });
      } else {
        // Aluno vê apenas "Check-in"
        list.push({ title: "Check-in Aula", subtitle: "Marcar Presença", icon: "qr_code_scanner", action: "chamada_aluno", special: true });
      }

      // 4. Admin
      if (ehAdmin) {
        list.push({ title: "Painel Admin", subtitle: "Gestão Total", icon: "settings_suggest", action: "view_admin", special: true });
      }
      
      return list;
    }

    function handleAction(action) {
      // Rotas de Chamada
      if (action === "chamada_instrutor") { 
          if(typeof initChamadaDinamica === 'function') initChamadaDinamica('instrutor'); 
          else alert("Módulo de Chamada carregando...");
          return; 
      }
      if (action === "chamada_aluno") { 
          if(typeof initChamadaDinamica === 'function') initChamadaDinamica('aluno'); 
          else alert("Módulo de Chamada carregando...");
          return; 
      }

      // Rotas Especiais
      if (action === "view_admin") { abrirAdminView(); if (typeof carregarAlunos === 'function') carregarAlunos(); return; }
      if (action === "view_instrutor") { 
          if(typeof abrirGestaoAlunos === 'function') abrirGestaoAlunos(); 
          else alert("Erro: Módulo de Gestão não carregado.");
          return; 
      }
      if (action === "shop") { window.open("https://wa.me/5581997629232", "_blank"); return; }
      if (action === "form_cadastro") { window.open("https://forms.gle/3vXp86VCmuLzHrk46", "_blank"); return; }

      // Rotas Padrão
      const map = { 
          "perfil": () => carregarDadosPerfil(currentUser), 
          "programa": () => abrirPrograma(currentUser), 
          "biblioteca": () => abrirBiblioteca(), 
          "videos": () => abrirVideoteca(), 
          "locais": () => abrirLocaisTreino(), 
          "cursos": () => abrirCursos(), 
          "social": () => abrirSocial(),
          "financeiro": () => abrirFinanceiro(), 
          "ranking": () => abrirRanking(), 
          "certificados": () => abrirCertificados()
      };
      if (map[action]) map[action]();
    }

    function abrirAdminView() { document.getElementById("main-content").style.display = "none"; document.getElementById("admin-module-wrapper").style.display = "block"; }
    window.fecharAdmin = function () { document.getElementById("admin-module-wrapper").style.display = "none"; document.getElementById("main-content").style.display = "block"; };
    
    function logout() { 
        localStorage.removeItem("userSession"); 
        CacheSystem.clearAll(); 
        google.script.run.withSuccessHandler(u => window.top.location.href = u + "?page=login").getScriptUrl(); 
    }

    // --- FUNÇÕES DE SUPORTE ---
    function abrirModalAjuda() {
        try {
            if(currentUser) {
                document.getElementById('sup_login').value = currentUser.LOGIN || "Desconhecido";
                document.getElementById('sup_nome').value = currentUser.nomeCompleto || "Desconhecido";
            }
        } catch(e) {}
        document.getElementById('modal-ajuda').style.display = 'flex';
    }

    function fecharModalAjuda() { document.getElementById('modal-ajuda').style.display = 'none'; }

    // Função para abrir o Manual (Ajuda.html)
    function irParaManual() {
        const btn = document.querySelector('.btn-manual');
        btn.innerHTML = "CARREGANDO..."; 
        
        google.script.run
          .withSuccessHandler(url => {
             window.top.location.href = url + "?page=ajuda";
          })
          .getScriptUrl();
    }

    function enviarAjuda(e) {
        e.preventDefault();
        const btn = document.querySelector('.btn-enviar-ajuda');
        const originalTxt = btn.innerText;
        btn.innerText = "ENVIANDO..."; btn.disabled = true;
        const form = document.querySelector('#modal-ajuda form');
        
        google.script.run.withSuccessHandler(res => {
            alert(res); form.reset(); fecharModalAjuda(); btn.innerText = originalTxt; btn.disabled = false;
        }).withFailureHandler(err => {
            alert("Erro: " + err.message); btn.innerText = originalTxt; btn.disabled = false;
        }).salvarTicketSuporte(form);
    }
  </script>
